    <style>

        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */

        .speech-bubble {
            position: relative;
            background: #f8fafc;
            border-radius: .4em;
            color: #0f172a;
            padding: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 0.9rem;

            bottom: 0;

            height: 0;

            border-top-color: #f8fafc;
            border-bottom: 0;

            margin-bottom: -15px;

		  { name: "Candace", img: "https://i.pinimg.com/originals/72/9c/70/729c70cbfd05dafa8f7cf9700f0284e3.gif", speeches: ["Se vinco questi soldi, comprerò un mega radar per beccare Phineas e Ferb una volta per tutte! Votatemi!!", "Oh mio Dio, sono in finale?! Jeremy mi sta guardando in TV?! Devo assolutamente vincere, vi prego è questione di vita o di morte!"], alignment: 'villain' },

		  { name: "Isabella", img: "https://i.pinimg.com/1200x/8f/b6/53/8fb6531754417925d60f7ba9276d824d.jpg", speeches: ["Che fate ragazzi? State per votare per me, vero? Questo mi farà guadagnare il distintivo 'Vincitrice di Reality'!", "Le Giovani Marmotte mi hanno insegnato a sopravvivere ovunque. Spero che Phineas sia fiero di me. Votatemi, vi prego!"] },

          { name: "Sid", img: "https://i.pinimg.com/1200x/69/4a/0e/694a0eeaf3c1182a15263d580cd0f7eb.jpg", speeches: ["Ehi, guardatemi! Il re dei bradipi è in finale! Se vinco io, apro un resort di lusso con fango caldo per tutti!", "Nessuno credeva in me, dicevano 'Sid, sei solo un bradipo imbranato'. E invece eccomi qui! Votate per me, vi voglio bene!"] },
          { name: "Diego", img: "https://i.pinimg.com/736x/56/bf/be/56bfbecae5aa54c2dd6ee8620fc66361.jpg", speeches: ["Sono il predatore perfetto. Ho dominato la catena alimentare e questa gara. Scegliete il vostro leader.", "In natura sopravvive il più forte. Io sono il più forte qui dentro. Il vostro voto è solo una formalità."] },

          { name: "Corvina TT", img: "https://i.pinimg.com/736x/b8/09/d1/b809d102bfdc848380a4d73e94fe7769.jpg", speeches: ["Ho mantenuto il controllo delle mie emozioni e del gioco. Merito questa vittoria più di chiunque altro.", "Non sono brava con i discorsi. Scegliete voi, ma sappiate che i Titans non si arrendono mai."] },

		  { name: "Cyborg TT", img: "https://i.pinimg.com/736x/73/47/3c/73473c2ae7c39cf56a81d8c58ef2b153.jpg", speeches: ["BOOYAH! Sono arrivato in finale! Il mio sistema tattico ha calcolato una vittoria sicura al 100%!", "Metà uomo, metà macchina, 100% campione! Votate per me, ragazzi!"] },
		  { name: "BeastBoy TT", img: "https://i.pinimg.com/736x/26/f4/55/26f455cbc9893aa45da15904c8a45bdd.jpg", speeches: ["Amico, ho fatto di tutto per arrivare fin qui! Votatemi e prometto pizza vegetariana per tutti!", "Sono stato un leone, un'aquila e persino un T-Rex in questa stagione. Fatemi essere il vincitore, dai!"] },

          { name: "Fred", img: "https://i.pinimg.com/736x/d2/8c/36/d28c36ac805792e5624f41c3c19dcebb.jpg", speeches: ["Bene gang, dividiamoci e... ah no, ho già vinto io! Votatemi e risolveremo questo mistero con stile!", "Le trappole che ho preparato in questa stagione sono state perfette. Ammettetelo, merito di vincere!"] },

          { name: "Gwen Tennyson", img: "https://i.pinimg.com/736x/f7/59/57/f75957bd5bad8195e2322e58de3f8119.jpg" }
        ];

        // Frasi fallback generiche per i bot che non ne hanno una specifica
        const DEFAULT_SPEECHES = [
            "Ho giocato la partita migliore, le mie mosse parlano da sole. Votatemi!",
            "Sono arrivato fin qui sopravvivendo a tutto. Merito io il premio finale!",
            "Senza di me non sareste qui. Riconoscete il vero talento e datemi la vittoria.",
            "Ho fatto fuori chiunque mi ostacolasse, e ora sono qui. Merito i soldi.",
            "Abbiamo passato momenti stupendi, ma alla fine io ho giocato con più strategia. Scegliete me!"
        ];

        const DEFAULT_TEAM_NAMES = [
          "Marmotte Urlanti", "Carpe Assassine", "Criceti Radioattivi", "Avvoltoi Volanti",
          "Tigri Selvaggi", "Orsi Polari", "Lupi Mannari", "Serpenti A Sonagli"
        ];

        const VILLAIN_TEAM_NAMES = [
          "Avvoltoi Malvagi", "Corvi Cruenti", "Draghi Diabolici", "Piedini Rosa",
          "Vipere Velenose", "Iene Spietate", "Tarantole Tossiche", "Pipistrelli Predatori"
        ];

        const BRAINS = ["Marinette", "Kowalski", "Conan", "Anais", "Peridot", "Dr Doofenshmirtz", "Corvina GO", "Corvina TT", "Velma", "Stewie", "Perla", "Wanda", "Shinobu", "Tails", "Gwen Tennyson"];
        const BEAUTIES = ["Heartfixer", "Gwen", "Heather", "Rias", "Penny", "Stellarubia GO", "Fred", "Anastasia", "Ellis", "Tengen", "Zuko", "Ariana Grande", "Poison Ivy", "Simba", "Leon"];
        const BRAWNS = ["Kagami", "Alejandro", "Lightning", "Bowser", "Brago", "Garnet", "Nicole", "Johnny Bravo", "Robin TT", "Hunter", "Tom", "Tanjiro", "Superboy", "Kratos", "Po"];

        const HEROES = ["Marinette", "Adrien", "Owen", "Lindsay", "Yoshi", "Luigi", "Zatch Bell", "Steven", "Ponygon", "Jake DC", "Finn", "Mortino", "Spongebob", "Sonic", "Robin TT", "Aang"];
        const VILLAINS_LIST = ["Dr Eggman", "Chrysalis", "Heather", "Alejandro", "Bowser", "Vicky", "Stewie", "Fiore", "Shego", "Scar", "Yzma", "Malefica", "Ghostface", "Plankton", "Poison Ivy"];
        const NEUTRALS = ["Kratos", "Squiddi", "Mr Krab", "Zuko", "Bowser Jr", "Trixie", "Anastasia", "Re Ghiaccio", "Francine", "Dr Doofenshmirtz", "Vanessa", "Bart", "Brago", "Wario", "Waluigi", "Duncan"];

        const App = () => {
          const [user, setUser] = useState(null);
          const [nickname, setNickname] = useState('');
          const [currentView, setCurrentView] = useState('auth');
          const [lobbies, setLobbies] = useState([]);
          const [currentLobbyId, setCurrentLobbyId] = useState(null);
          const [lobbyData, setLobbyData] = useState(null);
          const [errorMsg, setErrorMsg] = useState('');
          const [muted, setMuted] = useState(false);

          const toggleMute = () => {
              isGlobalMuted = !isGlobalMuted;
              setMuted(isGlobalMuted);
          };

          // AUTH SETUP
          useEffect(() => {
            const initAuth = async () => {
              if (!auth) return;
              try {
                 await signInAnonymously(auth);
              } catch (e) {
                 console.error("Errore Autenticazione:", e);
              }
            };
            
            initAuth();
            
            if (auth) {
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }
          }, []);

          // FETCH LOBBIES E CLEANUP
          useEffect(() => {
            if (!user || !db) return;
            
            const cleanupOldLobbies = async () => {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'lobbies'));
                const now = Date.now();
                
                querySnapshot.docs.forEach(async (docSnap) => {
                    const data = docSnap.data();
                    if (data.status === 'waiting' && data.timestamp) {
                        const docTime = data.timestamp.toMillis();
                        if (docTime < (now - TEN_MINUTES_MS)) {
                            try {
                                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', docSnap.id));
                                console.log(`Lobby ${docSnap.id} eliminata per inattività.`);
                            } catch(e) {
                                console.error("Errore eliminazione lobby inattiva:", e);
                            }
                        }
                    }
                });
            };

            cleanupOldLobbies();

            const q = collection(db, 'artifacts', appId, 'public', 'data', 'lobbies');
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const now = Date.now();
              
              const activeLobbies = snapshot.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(l => {
                     if (l.status !== 'waiting') return false;
                     if (!l.timestamp) return false;
                     return l.timestamp.toMillis() > (now - TEN_MINUTES_MS);
                });

              activeLobbies.sort((a, b) => b.timestamp.toMillis() - a.timestamp.toMillis());
              setLobbies(activeLobbies);
            }, (error) => {
                console.error("Errore fetch lobbies:", error);
                setErrorMsg("Errore di connessione al database. Controlla le regole Firestore.");
            });
            return () => unsubscribe();
          }, [user]);

          // SYNC LOBBY
          useEffect(() => {
            if (!user || !currentLobbyId || !db) return;
            const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', currentLobbyId), (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                setLobbyData(data);
                if (data.status === 'playing') setCurrentView('game');
              } else {
                setLobbyData(null);
                setCurrentLobbyId(null);
                setCurrentView('browser');
              }
            });
            return () => unsub();
          }, [currentLobbyId, user]);

          const createLobby = async (config) => {
            if (!user || !db) return;
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            const newLobbyRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'lobbies'));
            
            const initialData = {
              hostId: user.uid,
              hostName: nickname,
              code: code,
              status: 'waiting',
              config: {
                ...config,
                redemption: config.redemption || { enabled: false, count: 0, episodes: [] },
                theme: config.theme || 'Tutti'
              }, 
              currentSeasonIndex: 0,
              seasonWinners: [],
              rankings: [], 
              players: [{
                uid: user.uid,
                name: nickname,
                character: null,
                isBot: false,
                status: 'active',
                team: null,
                relationships: {},
                alliances: [],
                diceRoll: null,
                immunityWins: 0,
                totalVotesReceived: 0,
                nextRollNerf: false 
              }],
              round: 0,
              phase: 'setup',
              logs: [`Lobby creata da ${nickname}. Codice: ${code}`],
              chat: [], 
              votes: {},
              readyPlayers: [], 
              immunity: [],
              losingTeam: null,
              ceremonyData: null,
              challengeData: null, 
              finalData: null, 
              redemptionData: null,
              idolData: null,
              twistData: null,
              timestamp: serverTimestamp()
            };

            await setDoc(newLobbyRef, initialData);
            setCurrentLobbyId(newLobbyRef.id);
            setCurrentView('lobby');
          };

          const joinLobby = async (lobbyId) => {
            if (!user || !db) return;
            const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId);
            const snap = await getDoc(lobbyRef);
            if (!snap.exists()) return;
            const data = snap.data();
            
            if (data.players.length >= data.config.maxPlayers) return setErrorMsg("Lobby piena.");

            await updateDoc(lobbyRef, {
              players: arrayUnion({
                uid: user.uid,
                name: nickname,
                character: null,
                isBot: false,
                status: 'active',
                team: null,
                relationships: {},
                alliances: [],
                diceRoll: null,
                immunityWins: 0,
                totalVotesReceived: 0,
                nextRollNerf: false 
              })
            });
            setCurrentLobbyId(lobbyId);
            setCurrentView('lobby');
          };

          if (!app) {
              return (
                  <div className="flex items-center justify-center h-screen bg-slate-900 text-white p-8 text-center">
                      <div>
                          <h1 className="text-3xl font-bold text-red-500 mb-4">Caricamento Firebase...</h1>
                      </div>
                  </div>
              );
          }

          return (
            <div className="min-h-screen bg-slate-900 text-slate-100 font-sans relative">
              <button onClick={toggleMute} className="fixed top-4 left-4 z-[9999] bg-black/70 p-3 rounded-full text-white hover:bg-black transition border border-white/20 shadow-lg" title={muted ? "Attiva Suoni" : "Disattiva Suoni"}>
                  {muted ? <VolumeX size={20}/> : <Volume2 size={20}/>}
              </button>
              {currentView === 'auth' && (
                <AuthScreen nickname={nickname} setNickname={setNickname} onEnter={() => setCurrentView('browser')} />
              )}
              {currentView === 'browser' && (
                <BrowserScreen 
                  user={user} nickname={nickname} lobbies={lobbies} 
                  onCreate={createLobby} onJoin={joinLobby} errorMsg={errorMsg}
                />
              )}
              {currentView === 'lobby' && lobbyData && (
                <LobbyRoom 
                  lobby={lobbyData} user={user} lobbyId={currentLobbyId} 
                  onLeave={() => { setCurrentLobbyId(null); setCurrentView('browser'); }} 
                />
              )}
              {currentView === 'game' && lobbyData && (
                <GameRoom 
                  lobby={lobbyData} user={user} lobbyId={currentLobbyId} 
                  onLeave={() => { setCurrentLobbyId(null); setCurrentView('browser'); }}
                />
              )}
            </div>
          );
        };

        // --- SCREENS ---

        const AuthScreen = ({ nickname, setNickname, onEnter }) => (
          <div className="flex flex-col items-center justify-center min-h-screen bg-[url('https://i.pinimg.com/originals/2b/96/96/2b969635546059637841555541578508.jpg')] bg-cover bg-center">
            <div className="bg-slate-900/90 p-8 rounded-2xl shadow-2xl backdrop-blur-sm max-w-md w-full text-center border-2 border-yellow-500">
              <h1 className="text-5xl font-black text-yellow-400 mb-2 drop-shadow-lg" style={{ WebkitTextStroke: '2px black' }}>TOTAL DRAMA</h1>
              <h2 className="text-2xl font-bold text-white mb-6 uppercase tracking-widest">Online Survivor</h2>
              <input
                type="text"
                placeholder="Il tuo Nickname"
                className="w-full bg-slate-800 border-2 border-slate-600 rounded-xl p-4 text-white text-center text-xl font-bold mb-4 focus:border-yellow-500 outline-none"
                value={nickname}
                onChange={e => setNickname(e.target.value)}
                maxLength={15}
              />
              <button
                onClick={onEnter}
                disabled={nickname.length < 2}
                className="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl text-xl uppercase transition shadow-lg disabled:opacity-50 transform hover:scale-105"
              >
                Entra nel Reality
              </button>
            </div>
          </div>
        );

        const BrowserScreen = ({ user, nickname, lobbies, onCreate, onJoin, errorMsg }) => {
          const [showConfig, setShowConfig] = useState(false);
          const [config, setConfig] = useState({ 
              maxPlayers: 22, 
              numTeams: 2, 
              numSeasons: 1, 
              mergeSize: 11,
              jurySize: 7, 
              theme: 'Tutti',
              difficulty: 'Normale',
              redemption: { enabled: false, count: 1, episodes: "" },
              advantages: { idol: 1, extraVote: 1, advantage: 1, voteSteal: 1, spyDrone: 1, mutiny: 1, safety: 1, immunitySteal: 1, legacy: 1 }
          });
          const [joinCode, setJoinCode] = useState('');

          return (
            <div className="max-w-4xl mx-auto p-4 py-8">
              {!showConfig ? (
                <>
                  <div className="flex justify-between items-center mb-8 bg-slate-800 p-6 rounded-2xl border border-slate-700">
                     <div>
                        <h2 className="text-3xl font-black text-yellow-400">LOBBY BROWSER</h2>
                        <p className="text-slate-400">Giocatore: <span className="text-white font-bold">{nickname}</span></p>
                     </div>
                     <button onClick={() => setShowConfig(true)} className="bg-green-600 hover:bg-green-500 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg transition transform hover:scale-105">
                       <UserPlus size={20} /> CREA SHOW
                     </button>
                  </div>

                  <div className="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700 mb-8">
                      <h3 className="text-xl font-bold mb-4 flex items-center gap-2"><Play size={20} className="text-purple-400"/> Unisciti con Codice</h3>
                      <div className="flex gap-2">
                        <input value={joinCode} onChange={e => setJoinCode(e.target.value)} maxLength={4} placeholder="0000" className="bg-slate-900 rounded-lg px-4 py-2 w-32 text-center text-xl tracking-widest font-mono text-white" />
                        <button onClick={() => {
                           const lobby = lobbies.find(l => l.code === joinCode);
                           if(lobby) onJoin(lobby.id);
                        }} className="bg-purple-600 px-6 py-2 rounded-lg font-bold hover:bg-purple-500 text-white">VAI</button>
                      </div>
                      {errorMsg && <p className="text-red-400 mt-2 font-bold">{errorMsg}</p>}
                   </div>

                   <div className="grid gap-4">
                     {lobbies.length === 0 ? (
                       <div className="text-center py-12 text-slate-500 italic bg-slate-800/50 rounded-xl">Nessuna partita in corso.</div>
                     ) : (
                       lobbies.map(l => (
                         <div key={l.id} className="bg-slate-800 p-4 rounded-xl flex justify-between items-center hover:bg-slate-700/50 border border-slate-700 transition">
                           <div>
                             <span className="font-bold text-lg text-white">{l.hostName}'s Show</span>
                             <div className="flex gap-2 mt-1">
                                <span className="text-xs bg-purple-900 text-purple-200 px-2 py-0.5 rounded font-mono">{l.config.theme || 'Tutti'}</span>
                                <span className={`text-xs px-2 py-0.5 rounded font-mono ${l.config.difficulty === 'Hardcore' ? 'bg-red-900 text-red-200' : 'bg-green-900 text-green-200'}`}>{l.config.difficulty || 'Normale'}</span>
                                <span className="text-xs bg-yellow-900 text-yellow-200 px-2 py-0.5 rounded font-mono">Stagioni: {l.config.numSeasons}</span>
                                <span className="text-xs bg-blue-900 text-blue-200 px-2 py-0.5 rounded font-mono">Max: {l.config.maxPlayers}</span>
                             </div>
                           </div>
                           <div className="flex items-center gap-4">
                              <span className="text-slate-400 font-mono bg-slate-900 px-2 py-1 rounded">CODE: {l.code}</span>
                              <button onClick={() => onJoin(l.id)} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-bold text-sm text-white">ENTRA</button>
                           </div>
                         </div>
                       ))
                     )}
                   </div>
                </>
              ) : (
                <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl border-2 border-yellow-500 max-w-lg mx-auto">
                  <h2 className="text-3xl font-black text-center mb-6 text-white">CONFIGURA SHOW</h2>
                  
                  <div className="space-y-6">
                    <div>
                      <label className="block text-slate-400 font-bold mb-2">Tema Stagione</label>
                      <select 
                          value={config.theme} 
                          onChange={e => {
                              const val = e.target.value;
                              if (val === 'Brains vs Beauties vs Brawns' || val === 'Eroi vs Villains vs Neutrali') {
                                  setConfig({...config, theme: val, numTeams: 3});
                              } else if (val === 'La Notte del Giudizio' || val === 'Popolarità') {
                                  setConfig({...config, theme: val, numTeams: 1, mergeSize: config.maxPlayers});
                              } else {
                                  setConfig({...config, theme: val});
                              }
                          }}
                          className="w-full bg-slate-900 border border-slate-600 text-white rounded-xl p-3 focus:border-yellow-500 outline-none font-bold"
                      >
                          <option value="Tutti">Tutti (Roster Completo)</option>
                          <option value="Villain Edition">Villain Edition (Solo Cattivi)</option>
                          <option value="Brains vs Beauties vs Brawns">Brains vs Beauties vs Brawns</option>
                          <option value="Eroi vs Villains vs Neutrali">Eroi vs Villains vs Neutrali</option>
                          <option value="La Notte del Giudizio">La Notte del Giudizio (Tutti vs Tutti, Voto ai Peggiori 2)</option>
                          <option value="Popolarità">Popolarità (Niente sfide, immunità ai più amati)</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-slate-400 font-bold mb-2">Livello di Difficoltà</label>
                      <select 
                          value={config.difficulty} 
                          onChange={e => setConfig({...config, difficulty: e.target.value})}
                          className="w-full bg-slate-900 border border-slate-600 text-white rounded-xl p-3 focus:border-red-500 outline-none font-bold"
                      >
                          <option value="Normale">Normale (I bot giocano in modo bilanciato)</option>
                          <option value="Hardcore">Hardcore (I bot sparlano degli umani ad ogni turno)</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-slate-400 font-bold mb-2">Concorrenti (8 - 100)</label>
                      <div className="flex items-center gap-4">
                        <input type="range" min="8" max="100" value={config.maxPlayers} onChange={e => {
                            const newVal = parseInt(e.target.value);
                            setConfig({
                                ...config, 
                                maxPlayers: newVal,
                                mergeSize: config.theme === 'La Notte del Giudizio' ? newVal : Math.min(config.mergeSize, newVal - 1)
                            });
                        }} className="flex-1 accent-yellow-500" />
                        <span className="text-2xl font-bold w-12 text-center">{config.maxPlayers}</span>
                      </div>
                    </div>

                    <div>
                      <label className="block text-slate-400 font-bold mb-2">Squadre (2 - 8)</label>
                      <div className="flex items-center gap-4">
                        <input type="range" min="2" max="8" value={config.numTeams} disabled={config.theme === 'Brains vs Beauties vs Brawns' || config.theme === 'Eroi vs Villains vs Neutrali' || config.theme === 'La Notte del Giudizio' || config.theme === 'Popolarità'} onChange={e => setConfig({...config, numTeams: parseInt(e.target.value)})} className="flex-1 accent-blue-500 disabled:opacity-50" />
                        <span className="text-2xl font-bold w-12 text-center">{config.theme === 'La Notte del Giudizio' || config.theme === 'Popolarità' ? 1 : config.numTeams}</span>
                      </div>
                    </div>

                    <div>
                      <label className="block text-slate-400 font-bold mb-2">Merge quando rimangono:</label>
                      <div className="flex items-center gap-4">
                        <input 
                            type="range" 
                            min="3" 
                            max={Math.max(3, config.maxPlayers - 2)} 
                            value={config.mergeSize} 
                            disabled={config.theme === 'La Notte del Giudizio' || config.theme === 'Popolarità'}
                            onChange={e => setConfig({...config, mergeSize: parseInt(e.target.value)})} 
                            className="flex-1 accent-red-500 disabled:opacity-50" 
                        />
                        <span className="text-2xl font-bold w-12 text-center">{config.mergeSize}</span>
                      </div>
                    </div>

                    <div>
                      <label className="block text-slate-400 font-bold mb-2">Stagioni (1 - 3)</label>
                      <div className="flex gap-2">
                        {[1, 2, 3].map(n => (
                          <button 
                            key={n} 
                            onClick={() => setConfig({...config, numSeasons: n})}
                            className={`flex-1 py-3 rounded-xl font-bold border-2 ${config.numSeasons === n ? 'bg-yellow-500 text-black border-yellow-500' : 'bg-slate-900 border-slate-700 text-slate-400'}`}
                          >
                            {n}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-slate-400 font-bold mb-2">Numero Giurati (Finale)</label>
                      <div className="flex items-center gap-4">
                        <input 
                            type="range" 
                            min="3" 
                            max="15" 
                            step="2"
                            value={config.jurySize} 
                            onChange={e => setConfig({...config, jurySize: parseInt(e.target.value)})} 
                            className="flex-1 accent-purple-500" 
                        />
                        <span className="text-2xl font-bold w-12 text-center text-purple-400">{config.jurySize}</span>
                      </div>
                      <p className="text-xs text-slate-500 mt-1">Gli ultimi {config.jurySize} eliminati voteranno il vincitore (50% Chance).</p>
                    </div>

                    <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                        <div className="flex justify-between items-center mb-4">
                            <label className="text-white font-bold flex items-center gap-2">
                                <Undo2 className="text-orange-400"/> Redemption?
                            </label>
                            <input 
                                type="checkbox" 
                                checked={config.redemption.enabled} 
                                onChange={e => setConfig({...config, redemption: { ...config.redemption, enabled: e.target.checked }})}
                                className="w-6 h-6 accent-orange-500"
                            />
                        </div>
                        
                        {config.redemption.enabled && (
                            <div className="space-y-4 animate-in fade-in">
                                <div>
                                    <label className="block text-slate-400 text-sm mb-1">Quanti Rientri (1-10)?</label>
                                    <input 
                                        type="number" 
                                        min="1" 
                                        max="10" 
                                        value={config.redemption.count}
                                        onChange={e => setConfig({...config, redemption: { ...config.redemption, count: parseInt(e.target.value) }})}
                                        className="w-full bg-slate-800 rounded px-2 py-1 text-white"
                                    />
                                </div>
                                <div>
                                    <label className="block text-slate-400 text-sm mb-1">In quali episodi? (es. 5, 10)</label>
                                    <input 
                                        type="text" 
                                        placeholder="Es. 5, 8"
                                        value={config.redemption.episodes}
                                        onChange={e => setConfig({...config, redemption: { ...config.redemption, episodes: e.target.value }})}
                                        className="w-full bg-slate-800 rounded px-2 py-1 text-white"
                                    />
                                    <p className="text-xs text-slate-500 mt-1">Separa i numeri degli episodi con la virgola.</p>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-700 mt-4">
                        <label className="text-white font-bold flex items-center gap-2 mb-4">
                            <Package className="text-yellow-400"/> Vantaggi Nascosti
                        </label>
                        <div className="grid grid-cols-2 gap-4">
                            {Object.entries({
                                idol: "Idolo Immunità",
                                extraVote: "Voto Extra",
                                advantage: "Bonus (+3)",
                                voteSteal: "Ruba-Voto",
                                spyDrone: "Drone Spia (x3)",
                                mutiny: "Ammutinamento",
                                safety: "Salvacondotto",
                                immunitySteal: "Ladro Collane",
                                legacy: "Testamento"
                            }).map(([key, label]) => (
                                <div key={key} className="flex justify-between items-center bg-slate-800 p-2 rounded border border-slate-700">
                                    <span className="text-xs text-slate-300 font-bold">{label}</span>
                                    <input 
                                        type="number" 
                                        min="0" max="10" 
                                        value={config.advantages[key]}
                                        onChange={e => setConfig({...config, advantages: {...config.advantages, [key]: parseInt(e.target.value)}})}
                                        className="w-12 bg-slate-900 text-white text-center rounded border border-slate-600 focus:border-yellow-500 outline-none"
                                    />
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="flex gap-4 pt-4">
                      <button onClick={() => setShowConfig(false)} className="flex-1 bg-slate-700 py-3 rounded-xl font-bold text-white">Annulla</button>
                      <button onClick={() => {
                          const parsedEpisodes = config.redemption.enabled 
                              ? config.redemption.episodes.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n))
                              : [];
                          
                          onCreate({
                              ...config,
                              redemption: {
                                  ...config.redemption,
                                  episodes: parsedEpisodes
                              }
                          });
                      }} className="flex-1 bg-green-600 hover:bg-green-500 py-3 rounded-xl font-bold text-white shadow-lg">CREA LOBBY</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const LobbyRoom = ({ lobby, user, lobbyId, onLeave }) => {
          const isHost = lobby.hostId === user.uid;

          const selectCharacter = async (char) => {
            if (lobby.players.some(p => p.character?.name === char.name)) return;
            const updatedPlayers = lobby.players.map(p => p.uid === user.uid ? { ...p, character: char } : p);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), { players: updatedPlayers });
          };

          const startSeason = async () => {
            let currentPlayers = [...lobby.players];
            const usedNames = new Set(currentPlayers.map(p => p.character?.name).filter(Boolean));
            
            // FUNZIONE FILTRO TEMA STAGIONE
            const themeFilter = (r) => {
                if (lobby.config.theme === 'Villain Edition') return r.alignment === 'villain';
                if (lobby.config.theme === 'Brains vs Beauties vs Brawns') return BRAINS.includes(r.name) || BEAUTIES.includes(r.name) || BRAWNS.includes(r.name);
                if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') return HEROES.includes(r.name) || VILLAINS_LIST.includes(r.name) || NEUTRALS.includes(r.name);
                return true; 
            };

            currentPlayers = currentPlayers.map(p => {
              if (!p.character) {
                const available = ROSTER.filter(r => !usedNames.has(r.name) && themeFilter(r));
                // FALLBACK DI SICUREZZA: se la lista filtrata è vuota, pesca da tutti
                const random = available.length > 0 
                    ? available[Math.floor(Math.random() * available.length)]
                    : ROSTER[Math.floor(Math.random() * ROSTER.length)];
                
                usedNames.add(random.name);
                return { ...p, character: random };
              }
              return p;
            });

            while (currentPlayers.length < lobby.config.maxPlayers) {
              let randomChar;
              let botName;

              if (lobby.config.theme === 'Brains vs Beauties vs Brawns' || lobby.config.theme === 'Eroi vs Villains vs Neutrali') {
                  const isTheme1 = lobby.config.theme === 'Brains vs Beauties vs Brawns';
                  
                  // Conta quanti membri ci sono attualmente per ogni fazione
                  let count1 = 0, count2 = 0, count3 = 0;
                  currentPlayers.forEach(p => {
                      const cName = p.character?.name;
                      if (isTheme1) {
                          if (BRAINS.includes(cName)) count1++;
                          else if (BEAUTIES.includes(cName)) count2++;
                          else if (BRAWNS.includes(cName)) count3++;
                      } else {
                          if (HEROES.includes(cName)) count1++;
                          else if (VILLAINS_LIST.includes(cName)) count2++;
                          else if (NEUTRALS.includes(cName)) count3++;
                      }
                  });

                  // Trova la fazione con meno membri
                  const counts = isTheme1 ? [
                      { cat: 'Brains', count: count1, arr: BRAINS },
                      { cat: 'Beauties', count: count2, arr: BEAUTIES },
                      { cat: 'Brawns', count: count3, arr: BRAWNS }
                  ] : [
                      { cat: 'Eroi', count: count1, arr: HEROES },
                      { cat: 'Villains', count: count2, arr: VILLAINS_LIST },
                      { cat: 'Neutrali', count: count3, arr: NEUTRALS }
                  ];
                  counts.sort((a, b) => a.count - b.count);

                  // Cerca un personaggio disponibile nella fazione più svantaggiata
                  let availableInCat = [];
                  for (let i = 0; i < counts.length; i++) {
                      availableInCat = ROSTER.filter(r => !usedNames.has(r.name) && counts[i].arr.includes(r.name));
                      if (availableInCat.length > 0) break;
                  }

                  if (availableInCat.length > 0) {
                      randomChar = availableInCat[Math.floor(Math.random() * availableInCat.length)];
                      botName = randomChar.name;
                      usedNames.add(botName);
                  } else {
                      // Fallback se una fazione è completamente esaurita
                      const available = ROSTER.filter(r => !usedNames.has(r.name) && themeFilter(r));
                      if (available.length > 0) {
                          randomChar = available[Math.floor(Math.random() * available.length)];
                          botName = randomChar.name;
                          usedNames.add(botName);
                      } else {
                          randomChar = ROSTER[Math.floor(Math.random() * ROSTER.length)];
                          botName = `${randomChar.name} ${Math.floor(Math.random() * 999)}`;
                      }
                  }
              } else {
                  // LOGICA NORMALE (Tutti o Villain Edition)
                  const available = ROSTER.filter(r => !usedNames.has(r.name) && themeFilter(r));
                  if (available.length > 0) {
                      randomChar = available[Math.floor(Math.random() * available.length)];
                      botName = randomChar.name;
                      usedNames.add(botName);
                  } else {
                      // FALLBACK DI SICUREZZA: cloni casuali se finiscono i personaggi
                      randomChar = ROSTER[Math.floor(Math.random() * ROSTER.length)];
                      botName = `${randomChar.name} ${Math.floor(Math.random() * 999)}`;
                  }
              }
              
              const botId = `bot_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
              currentPlayers.push({
                uid: botId,
                name: botName,
                character: randomChar,
                isBot: true,
                status: 'active',
                team: null,
                relationships: {},
                alliances: [],
                diceRoll: null,
                immunityWins: 0,
                totalVotesReceived: 0,
                nextRollNerf: false 
              });
            }

            const numTeams = lobby.config.numTeams;
            const currentTeamNames = lobby.config.theme === 'Villain Edition' ? VILLAIN_TEAM_NAMES : DEFAULT_TEAM_NAMES;

            if (lobby.config.theme === 'Brains vs Beauties vs Brawns') {
                currentPlayers = currentPlayers.map(p => {
                    let team = "Brains";
                    if (BEAUTIES.includes(p.character?.name)) team = "Beauties";
                    else if (BRAWNS.includes(p.character?.name)) team = "Brawns";
                    return { ...p, team };
                });
            } else if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') {
                currentPlayers = currentPlayers.map(p => {
                    let team = "Eroi";
                    if (VILLAINS_LIST.includes(p.character?.name)) team = "Villains";
                    else if (NEUTRALS.includes(p.character?.name)) team = "Neutrali";
                    return { ...p, team };
                });
            } else if (lobby.config.theme === 'La Notte del Giudizio' || lobby.config.theme === 'Popolarità') {
                currentPlayers = currentPlayers.map(p => ({ ...p, team: "MERGE" }));
            } else {
                for (let i = currentPlayers.length - 1; i > 0; i--) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [currentPlayers[i], currentPlayers[j]] = [currentPlayers[j], currentPlayers[i]];
                }
                currentPlayers = currentPlayers.map((p, idx) => ({
                  ...p,
                  team: currentTeamNames[idx % numTeams]
                }));
            }

            if (lobby.config.theme === 'Popolarità') {
                const bots = currentPlayers.filter(p => p.isBot);
                let potentialVillains = bots.filter(b => b.character?.alignment === 'villain');
                if (potentialVillains.length < 2) potentialVillains = bots;
                potentialVillains.sort(() => Math.random() - 0.5);
                const chosen = potentialVillains.slice(0, 2).map(b => b.uid);
                currentPlayers = currentPlayers.map(p => chosen.includes(p.uid) ? { ...p, isSeasonVillain: true } : p);
            }

            // --- SISTEMA INVENTARIO MULTIPLO ---
            const advantageConfig = lobby.config.advantages || { idol: 1, extraVote: 1, advantage: 1, voteSteal: 1, spyDrone: 1, mutiny: 1, safety: 1, immunitySteal: 1, legacy: 1 };
            
            let itemPool = [];
            Object.entries(advantageConfig).forEach(([key, count]) => {
                for(let i=0; i<count; i++) itemPool.push(key);
            });
            
            itemPool.sort(() => Math.random() - 0.5);
            
            const totalCrates = currentPlayers.length;
            let availableIndices = Array.from({length: totalCrates}, (_, i) => i).sort(() => Math.random() - 0.5);
            
            let itemDistribution = {};
            for (let i=0; i<itemPool.length && availableIndices.length > 0; i++) {
                itemDistribution[availableIndices.pop()] = itemPool[i];
            }

            const initialCrates = Array.from({length: totalCrates}, (_, i) => ({ id: i, owner: null }));

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
              players: currentPlayers,
              status: 'playing',
              phase: 'idol_hunt', 
              idolData: {
                  active: true,
                  itemDistribution,
                  inventory: { idols: {}, extraVotes: {}, advantages: {}, voteSteals: {}, spyDrones: {}, mutinies: {}, safeties: {}, immunitySteals: {}, legacies: {} },
                  activeEffects: { legacyDesignations: {} },
                  crates: initialCrates,
                  stage: 'selection'
              },
              round: 0,
              logs: arrayUnion(`--- CACCIA AI VANTAGGI (Inizia la ricerca delle casse!) ---`)
            });
          };

          return (
            <div className="flex flex-col h-screen overflow-hidden">
              <header className="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center z-10 flex-shrink-0">
                <div>
                  <h2 className="text-xl font-bold text-white">Lobby: {lobby.hostName}</h2>
                  <p className="text-slate-400 text-sm">Codice: {lobby.code} | Max: {lobby.config.maxPlayers} | Teams: {lobby.config.numTeams}</p>
                </div>
                <button onClick={onLeave} className="text-red-400 font-bold text-sm">Esci</button>
              </header>

              <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                <div className="w-full md:w-64 bg-slate-900 p-4 overflow-y-auto border-r border-slate-800 flex-shrink-0">
                  <h3 className="font-bold text-slate-300 mb-2 uppercase text-xs">Giocatori ({lobby.players.length}/{lobby.config.maxPlayers})</h3>
                  <div className="space-y-2">
                    {lobby.players.map(p => (
                      <div key={p.uid} className="bg-slate-800 p-2 rounded flex items-center gap-2">
                        <div className="w-8 h-8 rounded-full bg-slate-700 overflow-hidden flex-shrink-0">
                           {p.character ? <img src={p.character.img} className="w-full h-full object-cover" /> : <div className="animate-pulse bg-slate-600 w-full h-full"/>}
                        </div>
                        <div className="truncate text-sm font-bold">{p.name}</div>
                      </div>
                    ))}
                  </div>
                  {isHost && (
                    <button onClick={startSeason} className="w-full mt-4 bg-green-600 hover:bg-green-500 text-white py-3 rounded-xl font-bold shadow-lg">
                      INIZIA STAGIONE 1
                    </button>
                  )}
                </div>

                <div className="flex-1 p-4 overflow-y-auto bg-slate-900">
                   <h3 className="text-xl font-bold mb-4 text-center text-yellow-400 flex-shrink-0">SCEGLI IL TUO PERSONAGGIO</h3>
                   <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-2">
                     {ROSTER.filter(char => {
                         if (lobby.config.theme === 'Villain Edition') return char.alignment === 'villain';
                         if (lobby.config.theme === 'Brains vs Beauties vs Brawns') return BRAINS.includes(char.name) || BEAUTIES.includes(char.name) || BRAWNS.includes(char.name);
                         if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') return HEROES.includes(char.name) || VILLAINS_LIST.includes(char.name) || NEUTRALS.includes(char.name);
                         return true;
                     }).map(char => {
                       const takenBy = lobby.players.find(p => p.character?.name === char.name);
                       const isMe = takenBy?.uid === user.uid;
                       
                       // --- LOGICA AURA E BADGE TEMA ---
                       let auraShadow = '';
                       let auraBorder = 'border-slate-700 hover:border-yellow-500';
                       let badge = null;
                       
                       if (lobby.config.theme === 'Brains vs Beauties vs Brawns') {
                           if (BRAINS.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(59,130,246,0.6)]';
                               auraBorder = 'border-blue-500 hover:border-blue-400';
                               badge = <div className="absolute top-1 left-1 bg-blue-600/90 text-blue-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-blue-400/50">Brain</div>;
                           } else if (BEAUTIES.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(236,72,153,0.6)]';
                               auraBorder = 'border-pink-500 hover:border-pink-400';
                               badge = <div className="absolute top-1 left-1 bg-pink-600/90 text-pink-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-pink-400/50">Beauty</div>;
                           } else if (BRAWNS.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(249,115,22,0.6)]';
                               auraBorder = 'border-orange-500 hover:border-orange-400';
                               badge = <div className="absolute top-1 left-1 bg-orange-600/90 text-orange-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-orange-400/50">Brawn</div>;
                           }
                       } else if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') {
                           if (HEROES.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(59,130,246,0.6)]';
                               auraBorder = 'border-blue-500 hover:border-blue-400';
                               badge = <div className="absolute top-1 left-1 bg-blue-600/90 text-blue-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-blue-400/50">Eroe</div>;
                           } else if (VILLAINS_LIST.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(220,38,38,0.6)]';
                               auraBorder = 'border-red-500 hover:border-red-400';
                               badge = <div className="absolute top-1 left-1 bg-red-600/90 text-red-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-red-400/50">Villain</div>;
                           } else if (NEUTRALS.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(156,163,175,0.6)]';
                               auraBorder = 'border-gray-500 hover:border-gray-400';
                               badge = <div className="absolute top-1 left-1 bg-gray-600/90 text-gray-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-gray-400/50">Neutrale</div>;
                           }
                       }

                       return (
                         <button 
                           key={char.name}
                           onClick={() => selectCharacter(char)}
                           disabled={!!takenBy}
                           className={`relative rounded-lg overflow-hidden border-2 aspect-[3/4] transition-all duration-300 ${auraShadow} ${isMe ? 'border-green-500 ring-2 ring-green-500' : takenBy ? 'border-red-900 opacity-40' : auraBorder}`}
                         >
                           <img src={char.img} alt={char.name} className="w-full h-full object-cover" />
                           {badge}
                           {isMe && <div className="absolute inset-0 border-4 border-green-500 z-20"></div>}
                         </button>
                       )
                     })}
                   </div>
                </div>
              </div>
            </div>
          );
        };

        // --- GAME LOGIC ---

        const GameRoom = ({ lobby, user, lobbyId, onLeave }) => {
          const isHost = lobby.hostId === user.uid;
          const myPlayer = lobby.players.find(p => p.uid === user.uid);
          const activePlayers = lobby.players.filter(p => p.status === 'active');
          const currentSeason = SEASON_CONFIG[lobby.currentSeasonIndex] || SEASON_CONFIG[0];
          const isMerge = activePlayers.length <= (lobby.config.mergeSize || (lobby.config.maxPlayers / 2)); 

          // --- SFONDO VILLAIN EDITION ---
          // Immagine cupa e nebbiosa perfetta per il tema villain, presa dal web per funzionare in multiplayer!
          const villainBgUrl = "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2094&auto=format&fit=crop"; 
          const currentBg = lobby.config.theme === 'Villain Edition' ? villainBgUrl : currentSeason.bg;

          const [hasActed, setHasActed] = useState(false);
          const [chatInput, setChatInput] = useState("");
          const chatRef = useRef(null);
          
          const [nextSeasonConfig, setNextSeasonConfig] = useState(null); 
          const [selectedRedemptionCandidates, setSelectedRedemptionCandidates] = useState([]);

          const [selectedPlayer, setSelectedPlayer] = useState(null);
          const [showRumorSelector, setShowRumorSelector] = useState(false); 
          const [showTrioSelector, setShowTrioSelector] = useState(false);
          
          const [useExtraVote, setUseExtraVote] = useState(false);
          const [useAdvantage, setUseAdvantage] = useState(false); 
          const [useVoteSteal, setUseVoteSteal] = useState(false);
          const [voteStealVictim, setVoteStealVictim] = useState("");
          
          const [showSpyDroneModal, setShowSpyDroneModal] = useState(false);
          const [spyDroneTarget, setSpyDroneTarget] = useState("");
          const [spyDroneResult, setSpyDroneResult] = useState(null);
          
          const [showMutinyModal, setShowMutinyModal] = useState(false);
          const [mutinyTarget, setMutinyTarget] = useState("");

          const [showSafetyModal, setShowSafetyModal] = useState(false);
          
          const [showImmunityStealModal, setShowImmunityStealModal] = useState(false);
          const [immunityStealTarget, setImmunityStealTarget] = useState("");

          const [showLegacyModal, setShowLegacyModal] = useState(false);
          const [legacyTarget, setLegacyTarget] = useState("");
          
          const [mySpeech, setMySpeech] = useState("");

          // --- NUOVI STATI PER ABILITÀ FAZIONI ---
          const [specialSkillType, setSpecialSkillType] = useState(null); 
          const [specialSkillTargets, setSpecialSkillTargets] = useState([]);
          const [imbroglioResult, setImbroglioResult] = useState(null);
          
          const [popularitySelections, setPopularitySelections] = useState([]);
          const [nominationSelections, setNominationSelections] = useState([]);

          // Fix: Reset delle azioni al nuovo round sociale
          useEffect(() => {
              if (lobby.phase === 'social') {
                  setHasActed(false);
                  setSelectedPlayer(null); // FIX: Dimentica il giocatore del round precedente
                  setShowRumorSelector(false);
                  setShowTrioSelector(false);
                  
                  setSpecialSkillType(null);
                  setSpecialSkillTargets([]);
                  setImbroglioResult(null);
                  
                  // Reset di sicurezza per nascondere tutti gli altri modali aperti per sbaglio
                  setUseExtraVote(false);
                  setUseAdvantage(false);
                  setUseVoteSteal(false);
                  setVoteStealVictim("");
                  setShowSpyDroneModal(false);
                  setShowMutinyModal(false);
                  setShowSafetyModal(false);
                  setShowImmunityStealModal(false);
                  setShowLegacyModal(false);
                  setPopularitySelections([]);
                  setNominationSelections([]);
              }
          }, [lobby.phase, lobby.round]);

          const generateBotSocialUpdates = (currentPlayers, currentLogs) => {
                 let updatedPlayers = [...currentPlayers];
                 let newLogs = [...currentLogs];
                 const activeBots = updatedPlayers.filter(p => p.status === 'active' && p.isBot);
                 const activeHumans = updatedPlayers.filter(p => p.status === 'active' && !p.isBot);
                 
                 const isPopularity = lobby.config.theme === 'Popolarità';
                 let botsToAct = [];

                 if (isPopularity) {
                     const villainBots = activeBots.filter(b => b.isSeasonVillain);
                     const normalBots = activeBots.filter(b => !b.isSeasonVillain);
                     normalBots.sort(() => Math.random() - 0.5);
                     botsToAct = [...villainBots, ...normalBots.slice(0, Math.max(0, 8 - villainBots.length))];
                 } else {
                     activeBots.sort(() => Math.random() - 0.5);
                     botsToAct = activeBots.slice(0, Math.min(4, activeBots.length));
                 }

                 let rumorBots = [];
                 const isHardcore = lobby.config.difficulty === 'Hardcore';
                 if (isHardcore && activeHumans.length > 0) {
                     const numRumorBots = Math.min(Math.floor(Math.random() * 2) + 1, botsToAct.length); // 1 o 2
                     rumorBots = botsToAct.slice(0, numRumorBots);
                 }

                 botsToAct.forEach(bot => {
                     const isSeasonVillain = bot.isSeasonVillain;

                     if (isSeasonVillain && activeHumans.length > 0) {
                         // Attacco garantito sull'umano
                         const humanTarget = activeHumans[Math.floor(Math.random() * activeHumans.length)];
                         const possibleListeners = updatedPlayers.filter(p => p.status === 'active' && p.uid !== bot.uid && p.uid !== humanTarget.uid);
                         
                         if (possibleListeners.length > 0) {
                             const listener = possibleListeners[Math.floor(Math.random() * possibleListeners.length)];
                             const listenerIdx = updatedPlayers.findIndex(p => p.uid === listener.uid);
                             
                             const currentRel = updatedPlayers[listenerIdx].relationships[humanTarget.uid] || 0;
                             updatedPlayers[listenerIdx].relationships = {
                                 ...updatedPlayers[listenerIdx].relationships,
                                 [humanTarget.uid]: Math.max(-10, currentRel - 1) 
                             };
                             newLogs.push(`🦹 IL VILLAIN ${bot.name} ha messo zizzania! Ha manipolato ${listener.name} contro l'umano ${humanTarget.name}! (-1 relaz)`);
                         }
                     } else if (rumorBots.some(b => b.uid === bot.uid)) {
                         const humanTarget = activeHumans[Math.floor(Math.random() * activeHumans.length)];
                         const possibleListeners = updatedPlayers.filter(p => p.status === 'active' && p.uid !== bot.uid && p.uid !== humanTarget.uid);
                         
                         if (possibleListeners.length > 0) {
                             const listener = possibleListeners[Math.floor(Math.random() * possibleListeners.length)];
                             const listenerIdx = updatedPlayers.findIndex(p => p.uid === listener.uid);
                             
                             const currentRel = updatedPlayers[listenerIdx].relationships[humanTarget.uid] || 0;
                             updatedPlayers[listenerIdx].relationships = {
                                 ...updatedPlayers[listenerIdx].relationships,
                                 [humanTarget.uid]: Math.max(-10, currentRel - 2) 
                             };
                             newLogs.push(`🤖 ${bot.name} ha sparso cattive voci su ${humanTarget.name} con ${listener.name}! (-2 relaz)`);
                             return; 
                         }
                     }

                     const possibleTargets = updatedPlayers.filter(p => p.status === 'active' && p.uid !== bot.uid);
                     if (possibleTargets.length === 0) return;
                     const target = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
                     const actions = ['friend', 'suckup', 'rumor'];
                     const action = actions[Math.floor(Math.random() * actions.length)];

                     const targetIdx = updatedPlayers.findIndex(p => p.uid === target.uid);

                     if (action === 'friend') {
                         if (isSeasonVillain || Math.random() > 0.5) { // 100% per i villain
                             const newVal = Math.min(5, (updatedPlayers[targetIdx].relationships[bot.uid] || 0) + 1);
                             updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [bot.uid]: newVal };
                             newLogs.push(`🤖 ${bot.name} ha stretto amicizia con ${target.name}.`);
                         }
                     } else if (action === 'suckup' && Math.random() < 0.60) {
                         const newVal = Math.min(10, (updatedPlayers[targetIdx].relationships[bot.uid] || 0) + 2);
                         updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [bot.uid]: newVal };
                         newLogs.push(`🤖 ${bot.name} ha fatto il leccapiedi con ${target.name}.`);
                     } else if (action === 'rumor' && Math.random() > 0.5) {
                          const victim = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
                          if(victim.uid !== target.uid) {
                              const currentRel = updatedPlayers[targetIdx].relationships[victim.uid] || 0;
                              updatedPlayers[targetIdx].relationships = {
                                  ...updatedPlayers[targetIdx].relationships,
                                  [victim.uid]: Math.max(-5, currentRel - 1)
                              };
                              newLogs.push(`🤖 ${bot.name} ha messo zizzania tra ${target.name} e ${victim.name}.`);
                          }
                     }
                 });
                 return { updatedPlayers, newLogs };
          };

          const handleUseSpyDrone = async () => {
              if (!spyDroneTarget) return;
              const target = lobby.players.find(p => p.uid === spyDroneTarget);
              if (!target) return;
              
              let highest = -999;
              let lowest = 999;
              let bestFriend = "Nessuno";
              let worstEnemy = "Nessuno";
              
              Object.entries(target.relationships || {}).forEach(([uid, val]) => {
                  if (uid !== target.uid) { 
                      if (val > highest) { highest = val; bestFriend = lobby.players.find(p=>p.uid===uid)?.name || "Sconosciuto"; }
                      if (val < lowest) { lowest = val; worstEnemy = lobby.players.find(p=>p.uid===uid)?.name || "Sconosciuto"; }
                  }
              });
              
              const resultString = `🎯 DATI DRONE SU ${target.name.toUpperCase()}:\n\n❤️ Migliore Alleato:\n${highest > 0 ? bestFriend : 'Nessuno'}\n\n💔 Peggior Nemico:\n${lowest < 0 ? worstEnemy : 'Nessuno'}\n\n🤝 Alleanze segrete:\n${(target.alliances || []).length > 0 ? 'Sì' : 'No'}`;
              
              setSpyDroneResult(resultString);
              
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`idolData.inventory.spyDrones.${user.uid}`]: lobby.idolData.inventory.spyDrones[user.uid] - 1
              });
          };

          const handleUseMutiny = async () => {
              if (!mutinyTarget) return;
              const target = lobby.players.find(p => p.uid === mutinyTarget);
              if (!target) return;
              
              const myTeam = myPlayer.team;
              const targetTeam = target.team;
              
              const updatedPlayers = lobby.players.map(p => {
                  if (p.uid === user.uid) return { ...p, team: targetTeam };
                  if (p.uid === target.uid) return { ...p, team: myTeam };
                  return p;
              });
              
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  players: updatedPlayers,
                  [`idolData.inventory.mutinies.${user.uid}`]: lobby.idolData.inventory.mutinies[user.uid] - 1,
                  logs: arrayUnion(`🔄 COLPO DI SCENA! ${myPlayer.name} ha usato l'Ammutinamento scambiando di squadra con ${target.name}!`)
              });
              
              setShowMutinyModal(false);
          };

          const handleUseSafety = async () => {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`idolData.inventory.safeties.${user.uid}`]: lobby.idolData.inventory.safeties[user.uid] - 1,
                  [`idolData.activeEffects.safetyUsedRound`]: lobby.round,
                  [`idolData.activeEffects.safetyHolder`]: user.uid,
                  logs: arrayUnion(`🚪 COLPO DI SCENA! ${myPlayer.name} ha usato il Salvacondotto! Abbandona la cerimonia di oggi e diventa intoccabile.`)
              });
              setShowSafetyModal(false);
          };

          const handleUseImmunitySteal = async () => {
              if (!immunityStealTarget) return;
              const target = lobby.players.find(p => p.uid === immunityStealTarget);
              if (!target) return;

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`immunity`]: [user.uid],
                  [`idolData.inventory.immunitySteals.${user.uid}`]: lobby.idolData.inventory.immunitySteals[user.uid] - 1,
                  logs: arrayUnion(`📿 LADRO DI COLLANE! ${myPlayer.name} ha rubato l'immunità dal collo di ${target.name}!`)
              });
              setShowImmunityStealModal(false);
          };

          const handleUseLegacy = async () => {
              if (!legacyTarget) return;
              playSound('success');
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`idolData.inventory.legacies.${user.uid}`]: lobby.idolData.inventory.legacies[user.uid] - 1,
                  [`idolData.activeEffects.legacyDesignations.${user.uid}`]: legacyTarget,
                  logs: arrayUnion(`📜 ${myPlayer.name} ha compilato il suo Testamento in segreto...`)
              });
              setShowLegacyModal(false);
              setLegacyTarget("");
          };

          const submitJuryVote = async (finalistId) => {
              if (lobby.phase !== 'jury_vote' || lobby.juryData?.stage !== 'voting') return;
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`juryData.votes.${user.uid}`]: finalistId
              });
          };

          const submitFinalSpeech = async () => {
              if (!mySpeech.trim() || lobby.phase !== 'jury_speeches') return;
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`juryData.speeches.${user.uid}`]: mySpeech.trim(),
                  logs: arrayUnion(`🎤 ${myPlayer.name} ha fatto il suo discorso finale!`)
              });
          };

          const submitPurgeChoice = async (chosenTargetId) => {
              if (lobby.phase !== 'challenge' || lobby.challengeData?.stage !== 'purge_selection') return;
              
              const deciderPlayer = lobby.players.find(p => p.uid === lobby.challengeData.decider);
              const chosenTarget = lobby.players.find(p => p.uid === chosenTargetId);
              
              const finalTargets = [...new Set([...lobby.challengeData.autoTargets, chosenTargetId])];
              const targetNames = finalTargets.map(id => lobby.players.find(p => p.uid === id)?.name).join(", ");
              const winnerName = deciderPlayer.name;

              let updatedPlayersTemp = lobby.players.map(p => {
                   if (lobby.challengeData.winner.includes(p.uid)) return { ...p, immunityWins: (p.immunityWins || 0) + 1 };
                   return p;
              });

              let logsToAdd = [
                   `${winnerName} VINCE L'IMMUNITÀ!`,
                   `🎯 ${winnerName.toUpperCase()} HA SCELTO DI CONDANNARE ${chosenTarget.name.toUpperCase()}!`,
                   `⚠️ I bersagli finali sono ${targetNames}. SOLO LORO POTRANNO ESSERE VOTATI AL FALÒ!`
              ];

              if (chosenTarget && chosenTarget.isBot && Math.random() < 0.30) {
                  const targetIdx = updatedPlayersTemp.findIndex(p => p.uid === chosenTargetId);
                  const currentRel = updatedPlayersTemp[targetIdx].relationships[deciderPlayer.uid] || 0;
                  updatedPlayersTemp[targetIdx].relationships = {
                      ...updatedPlayersTemp[targetIdx].relationships,
                      [deciderPlayer.uid]: Math.max(-10, currentRel - 1)
                  };
                  logsToAdd.push(`💢 ${chosenTarget.name} se l'è presa per essere stato mandato a rischio da ${deciderPlayer.name}! (-1 Relaz)`);
              }

              const { updatedPlayers, newLogs } = generateBotSocialUpdates(updatedPlayersTemp, logsToAdd);

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                   players: updatedPlayers,
                   [`challengeData.stage`]: 'finished',
                   immunity: lobby.challengeData.winner,
                   losingTeam: "MERGE",
                   readyPlayers: [], 
                   phase: 'social',
                   twistData: { type: 'purge', targets: finalTargets },
                   logs: arrayUnion(...newLogs)
              });
          };

          useEffect(() => {
            if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
          }, [lobby.chat]);

          // --- IDOL HUNT BOT LOGIC ---
          useEffect(() => {
              if (!isHost || lobby.phase !== 'idol_hunt' || !lobby.idolData || lobby.idolData.stage !== 'selection') return;

              const bots = lobby.players.filter(p => p.isBot);
              const unchosenBots = bots.filter(b => !lobby.idolData.crates.some(c => c.owner === b.uid));
              
              if (unchosenBots.length > 0) {
                  const timer = setTimeout(async () => {
                      const availableCrates = lobby.idolData.crates.filter(c => c.owner === null);
                      if (availableCrates.length > 0 && unchosenBots.length > 0) {
                          const botToAct = unchosenBots[0];
                          const randomCrate = availableCrates[Math.floor(Math.random() * availableCrates.length)];
                          
                          const newCrates = lobby.idolData.crates.map(c => 
                              c.id === randomCrate.id ? { ...c, owner: botToAct.uid } : c
                          );

                          const allTaken = newCrates.every(c => c.owner !== null);
                          let updates = { [`idolData.crates`]: newCrates };
                          
                          if (allTaken) {
                              updates[`idolData.stage`] = 'reveal';
                              
                              let inventory = { idols: {}, extraVotes: {}, advantages: {}, voteSteals: {}, spyDrones: {}, mutinies: {}, safeties: {}, immunitySteals: {}, legacies: {} };
                              
                              newCrates.forEach(c => {
                                  const item = lobby.idolData.itemDistribution[c.id];
                                  if (item && c.owner) {
                                      if (item === 'spyDrone') {
                                          inventory.spyDrones[c.owner] = (inventory.spyDrones[c.owner] || 0) + 3;
                                      } else if (item === 'safety') {
                                          inventory.safeties[c.owner] = (inventory.safeties[c.owner] || 0) + 1;
                                      } else if (item === 'mutiny') {
                                          inventory.mutinies[c.owner] = (inventory.mutinies[c.owner] || 0) + 1;
                                      } else if (item === 'legacy') {
                                          inventory.legacies[c.owner] = (inventory.legacies[c.owner] || 0) + 1;
                                      } else {
                                          const key = item + 's';
                                          inventory[key][c.owner] = (inventory[key][c.owner] || 0) + 1;
                                      }
                                  }
                              });
                              
                              updates[`idolData.inventory`] = inventory;
                              if (!lobby.idolData.activeEffects) updates[`idolData.activeEffects`] = { legacyDesignations: {} };
                              updates[`logs`] = arrayUnion("Tutte le casse sono state assegnate! Apertura in corso...");
                          }

                          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
                      }
                  }, 500); 
                  return () => clearTimeout(timer);
              }
          }, [lobby.idolData, isHost]);


          // SEQUENTIAL DICE ANIMATION E RISOLUZIONE
          useEffect(() => {
            if (!isHost || lobby.phase !== 'challenge' || !lobby.challengeData || lobby.challengeData.stage !== 'rolling') return;
            
            // Ignora questa logica se è una sfida di popolarità
            if (lobby.challengeData.type === 'popularity_vote') return;

            const { rollingIndex, players: rollPlayers, rolls } = lobby.challengeData;
            
            // --- CALCOLO VINCITORI A FINE GIRI ---
            if (rollingIndex >= rollPlayers.length) {
                 
                 // --- LOGICA SUDDEN DEATH (ELIMINAZIONE DIRETTA) ---
                 if (lobby.challengeData.type === 'sudden_death') {
                    let minRoll = 999;
                    let losers = [];
                    Object.entries(rolls).forEach(([uid, r]) => {
                        if (r < minRoll) { minRoll = r; losers = [uid]; }
                        else if (r === minRoll) { losers.push(uid); }
                    });

                    if (losers.length > 1) {
                         const loserNames = losers.map(w => lobby.players.find(p => p.uid === w)?.name).join(", ");
                         updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                             [`challengeData.players`]: losers,
                             [`challengeData.rollingIndex`]: 0,
                             [`challengeData.rolls`]: {},
                             logs: arrayUnion(`PAREGGIO PER L'ELIMINAZIONE (${minRoll})! Spareggio tra: ${loserNames}`)
                         });
                    } else {
                         const victimId = losers[0];
                         const victim = lobby.players.find(p => p.uid === victimId);
                         
                         // Modifica: Invece di eliminare subito, mostriamo a schermo la sconfitta
                         updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                             [`challengeData.stage`]: 'finished',
                             [`challengeData.loser`]: victimId,
                             logs: arrayUnion(`Sfida Terminata! ${victim.name} ha fatto il punteggio più basso (${minRoll}) ed è a rischio eliminazione!`)
                         });
                    }
                    return;
                 }

                 // --- LOGICA SFIDA A SQUADRE ---
                 if (lobby.challengeData.type === 'team') {
                     const teamScores = { A: 0, B: 0 };
                     const teams = lobby.challengeData.teams;

                     Object.entries(rolls).forEach(([uid, r]) => {
                         const team = teams[uid];
                         if (team) teamScores[team] += r;
                     });

                     let winnerTeam = null;
                     if (teamScores.A > teamScores.B) winnerTeam = 'A';
                     else if (teamScores.B > teamScores.A) winnerTeam = 'B';
                     else winnerTeam = Math.random() > 0.5 ? 'A' : 'B';

                     const immunePlayers = Object.keys(teams).filter(uid => teams[uid] === winnerTeam);
                     
                     const { updatedPlayers, newLogs } = generateBotSocialUpdates(lobby.players, [`La Squadra ${winnerTeam === 'A' ? 'ROSSA' : 'BLU'} vince la sfida a squadre! (${teamScores[winnerTeam]} vs ${teamScores[winnerTeam === 'A' ? 'B' : 'A']})`]);

                     updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                         players: updatedPlayers,
                         [`challengeData.stage`]: 'finished',
                         [`challengeData.winner`]: immunePlayers,
                         immunity: immunePlayers,
                         losingTeam: "MERGE",
                         readyPlayers: [], 
                         phase: 'social',
                         logs: arrayUnion(...newLogs)
                     });
                     return;
                 }

                 // --- LOGICA PURGE (LA NOTTE DEL GIUDIZIO) ---
                 if (lobby.challengeData.type === 'purge') {
                     let maxRoll = -1;
                     let winners = [];
                     Object.entries(rolls).forEach(([uid, r]) => {
                         if (r > maxRoll) { maxRoll = r; winners = [uid]; }
                         else if (r === maxRoll) { winners.push(uid); }
                     });

                     if (winners.length > 1) {
                         const winnerNames = winners.map(w => lobby.players.find(p => p.uid === w)?.name).join(", ");
                         
                         updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                             [`challengeData.players`]: winners,
                             [`challengeData.rollingIndex`]: 0,
                             [`challengeData.originalRolls`]: lobby.challengeData.originalRolls || rolls, // FIX: Salviamo i tiri originali prima di azzerarli per lo spareggio!
                             [`challengeData.rolls`]: {},
                             logs: arrayUnion(`PAREGGIO (${maxRoll})! Spareggio per l'immunità tra: ${winnerNames}`)
                         });
                         return;
                     }
