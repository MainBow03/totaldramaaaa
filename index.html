                        losingTeam: null,
                        ceremonyData: null,
                        challengeData: null,
                        twistData: null, 
                        logs: arrayUnion(...newLogs)
                      };
                      // Aggiunge le presenze per il prossimo episodio dopo la Cerimonia
                      incrementActivePlayersStats(updatedPlayers.filter(p => p.status === 'active'));
                  }
                  
              }
            }
            
            else if (lobby.phase === 'jury_speeches') {
                updates = {
                    phase: 'jury_vote',
                    [`juryData.stage`]: 'voting',
                    logs: arrayUnion(`La Giuria si appresta a votare!`)
                };
            }

            else if (lobby.phase === 'jury_vote') {
                const jd = lobby.juryData;
                
                if (jd.stage === 'voting') {
                    if (Object.keys(jd.votes || {}).length >= jd.jurors.length) {
                        let p1Votes = 0;
                        let p2Votes = 0;
                        Object.values(jd.votes || {}).forEach(v => {
                            if (v === jd.finalist1) p1Votes++;
                            else p2Votes++;
                        });
                        
                        let winnerId = jd.finalist1;
                        if (p2Votes > p1Votes) winnerId = jd.finalist2;
                        else if (p1Votes === p2Votes) winnerId = Math.random() > 0.5 ? jd.finalist1 : jd.finalist2;

                        updates = { 
                            [`juryData.stage`]: 'revealing',
                            [`juryData.p1Votes`]: p1Votes,
                            [`juryData.p2Votes`]: p2Votes,
                            [`juryData.winnerId`]: winnerId
                        };
                    }
                }
                else if (jd.revealedCount < jd.jurors.length) {
                    updates = { [`juryData.revealedCount`]: increment(1) };
                } else {
                    const winner = lobby.players.find(p => p.uid === jd.winnerId);
                    const loser = lobby.players.find(p => p.uid === (jd.winnerId === jd.finalist1 ? jd.finalist2 : jd.finalist1));
                    
                    const loserEntry = { 
                      name: loser.name, 
                      team: "FINALIST", 
                      round: "FINALE", 
                      season: currentSeason.name,
                      immunities: loser.immunityWins || 0,
                      votes: loser.totalVotesReceived || 0,
                      friendships: Object.values(loser.relationships || {}).filter(v => v > 0).length,
                      episodesSurvived: lobby.round
                    };

                    const winnerEntry = { 
                         name: winner.name, 
                         team: "WINNER", 
                         round: "WINNER", 
                         season: currentSeason.name,
                         immunities: winner.immunityWins || 0,
                         votes: winner.totalVotesReceived || 0,
                         friendships: Object.values(winner.relationships || {}).filter(v => v > 0).length,
                         episodesSurvived: lobby.round
                    };

                    if (lobby.currentSeasonIndex < lobby.config.numSeasons - 1) {
                         updates.phase = 'season_setup'; 
                         updates.seasonWinners = arrayUnion(winner.name);
                         updates.logs = arrayUnion(`${winner.name} VINCE LA STAGIONE (Voto Giuria)!`);
                         updates.rankings = arrayUnion(loserEntry);
                         playSound('victory');
                         
                         const maxReturning = lobby.players.length;
                         const humanCount = lobby.players.filter(p => !p.isBot).length;
                         setNextSeasonConfig({
                            returningCount: Math.min(maxReturning, Math.max(2, humanCount)), 
                            numTeams: lobby.config.numTeams,
                            mergeSize: lobby.config.mergeSize || Math.floor(lobby.config.maxPlayers / 2)
                         });
                    } else {
                         if (lobby.config.numSeasons > 1) {
                             // MODIFICA: SE CI SONO PIU STAGIONI, CREA LA TOP 6
                             const allRankings = [...(lobby.rankings || []), loserEntry, winnerEntry];
                             const aggregated = {};
                             allRankings.forEach(r => {
                                 if (!aggregated[r.name]) {
                                     const charData = ROSTER.find(c => c.name === r.name);
                                     aggregated[r.name] = { name: r.name, totalEpisodes: 0, img: charData?.img || "" };
                                 }
                                 let ep = r.episodesSurvived !== undefined ? r.episodesSurvived : lobby.round;
                                 aggregated[r.name].totalEpisodes += ep;
                             });
                             
                             const top6 = Object.values(aggregated)
                                 .sort((a, b) => b.totalEpisodes - a.totalEpisodes)
                                 .slice(0, 6)
                                 .reverse(); // Reverse per svelarli dal 6° al 1°
                                 
                             updates.phase = 'grand_finale_top6';
                             updates.seasonWinners = arrayUnion(winner.name);
                             updates.rankings = arrayUnion(loserEntry, winnerEntry);
                             updates.top6Data = { players: top6, revealIndex: -1 };
                             updates.logs = arrayUnion(`GIOCO FINITO! ${winner.name} vince l'ultima stagione! Preparatevi per scoprire i 6 TITANI SUPREMI...`);
                             playSound('victory');
                         } else {
                             // MODIFICA: GIOCO FINITO NORMALE PER 1 STAGIONE
                             updates.phase = 'game_over';
                             updates.seasonWinners = arrayUnion(winner.name);
                             updates.rankings = arrayUnion(loserEntry, winnerEntry); 
                             updates.logs = arrayUnion(`GIOCO FINITO! ${winner.name} è il campione!`);
                             playSound('victory');
                         }
                    }
                }
            }

            else if (lobby.phase === 'ghost_island') {
                const { candidates, rolls, isMergeReturn } = lobby.ghostIslandData;
                const allRolled = candidates.every(c => rolls[c]);
                if (!allRolled) return;

                let minRoll = 999;
                let losers = [];
                candidates.forEach(c => {
                    if(rolls[c] < minRoll) { minRoll = rolls[c]; losers = [c]; }
                    else if(rolls[c] === minRoll) { losers.push(c); }
                });

                if (losers.length === 1) {
                    const loserId = losers[0];
                    const loser = lobby.players.find(p => p.uid === loserId);

                    let updatedPlayers = lobby.players.map(p =>
                        p.uid === loserId ? { ...p, status: 'perm_eliminated' } : p
                    );

                    if (isMergeReturn) {
                        const returnees = candidates.filter(uid => uid !== loserId);
                        returnees.forEach(uid => {
                            const idx = updatedPlayers.findIndex(p => p.uid === uid);
                            updatedPlayers[idx].status = 'active';
                            updatedPlayers[idx].team = 'MERGE';
                            updatedPlayers[idx].immunityWins = 0;
                            updatedPlayers[idx].ghostReturnee = true; // FLAG FANTASMA
                        });

                        updates = {
                            players: updatedPlayers,
                            phase: 'episode_start',
                            ghostIslandData: null,
                            twistData: { type: 'ghost_island_return', returnees: returnees },
                            logs: arrayUnion(`☠️ GHOST ISLAND: ${loser.name} svanisce definitivamente!`, `👻 I fantasmi sopravvissuti RIENTRANO in gioco per la Fusione!`)
                        };
                        incrementActivePlayersStats(updatedPlayers.filter(p => p.status === 'active'));
                    } else {
                        updates = {
                            players: updatedPlayers,
                            phase: 'episode_start',
                            ghostIslandData: null,
                            logs: arrayUnion(`☠️ GHOST ISLAND: ${loser.name} ha fatto il punteggio più basso (${minRoll}) ed è SVANITO DEFINITIVAMENTE!`)
                        };
                    }
                } else {
                    updates = {
                        [`ghostIslandData.rolls`]: {},
                        [`ghostIslandData.candidates`]: losers,
                        logs: arrayUnion(`Pareggio a ${minRoll} su Ghost Island! Spareggio tra i peggiori.`)
                    };
                }
            }

            // MODIFICA: AGGIUNTO HANDLER PER LA TRANSIZIONE DELLA TOP 6
            else if (lobby.phase === 'grand_finale_top6') {
                if (lobby.top6Data.revealIndex < lobby.top6Data.players.length - 1) {
                    updates = { [`top6Data.revealIndex`]: increment(1) };
                    // Suono vittoria quando svela il numero 1
                    if (lobby.top6Data.revealIndex === lobby.top6Data.players.length - 2) playSound('victory'); 
                    else playSound('roll');
                } else {
                    updates = { phase: 'game_over' };
                }
            }

            try {
                if (Object.keys(updates).length > 0) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
                }
            } catch (e) {
                console.error("Errore advanceGame:", e);
            }
            
            setTimeout(() => {
                setIsProcessing(false);
            }, 600);
          };

          const resolveFinalRound = async () => {
              if (!isHost || lobby.phase !== 'final_showdown') return;
              
              const p1 = activePlayers[0];
              const p2 = activePlayers[1];
              const { currentRolls } = lobby.finalData;
              
              if (!currentRolls || !currentRolls[p1.uid] || !currentRolls[p2.uid]) return; 

              const r1 = currentRolls[p1.uid];
              const r2 = currentRolls[p2.uid];
              
              let fd = { ...lobby.finalData };
              let winner = null;
              let log = "";

              if (r1 > r2) {
                  fd.p1Score += 1;
                  log = `${p1.name} vince il round ${fd.round} (${r1} vs ${r2})`;
              } else if (r2 > r1) {
                  fd.p2Score += 1;
                  log = `${p2.name} vince il round ${fd.round} (${r2} vs ${r1})`;
              } else {
                  log = `Pareggio al round ${fd.round} (${r1} vs ${r1})`;
              }
              
              fd.history.push({ r1, r2, win: r1 > r2 ? p1.name : r2 > r1 ? p2.name : 'Draw' });
              fd.round += 1;
              fd.currentRolls = {}; 

              let updates = { finalData: fd, logs: arrayUnion(log) };

              if (fd.p1Score >= 3 || fd.p2Score >= 3) {
                  playSound('victory');
                  winner = fd.p1Score >= 3 ? p1 : p2;
                  
                  const loser = fd.p1Score >= 3 ? p2 : p1;
                  const loserEntry = { 
                      name: loser.name, 
                      team: "FINALIST", 
                      round: "FINALE", 
                      season: currentSeason.name,
                      immunities: loser.immunityWins || 0,
                      votes: loser.totalVotesReceived || 0,
                      friendships: Object.values(loser.relationships || {}).filter(v => v > 0).length,
                      episodesSurvived: lobby.round
                  };
                  
                  if (lobby.currentSeasonIndex < lobby.config.numSeasons - 1) {
                     updates.phase = 'season_setup'; 
                     updates.seasonWinners = arrayUnion(winner.name);
                     updates.logs = arrayUnion(`${winner.name} VINCE LA STAGIONE! Preparazione Stagione Successiva.`);
                     updates.rankings = arrayUnion(loserEntry);
                     
                     const maxReturning = lobby.players.length;
                     const humanCount = lobby.players.filter(p => !p.isBot).length;
                     setNextSeasonConfig({
                        returningCount: Math.min(maxReturning, Math.max(2, humanCount)), 
                        numTeams: lobby.config.numTeams,
                        mergeSize: lobby.config.mergeSize || Math.floor(lobby.config.maxPlayers / 2)
                     });

                  } else {
                     const winnerEntry = { 
                         name: winner.name, 
                         team: "WINNER", 
                         round: "WINNER", 
                         season: currentSeason.name,
                         immunities: winner.immunityWins || 0,
                         votes: winner.totalVotesReceived || 0,
                         friendships: Object.values(winner.relationships || {}).filter(v => v > 0).length,
                         episodesSurvived: lobby.round
                     };
                     
                     if (lobby.config.numSeasons > 1) {
                         // MODIFICA: SE CI SONO PIU STAGIONI, CREA LA TOP 6 ANCHE QUI
                         const allRankings = [...(lobby.rankings || []), loserEntry, winnerEntry];
                         const aggregated = {};
                         allRankings.forEach(r => {
                             if (!aggregated[r.name]) {
                                 const charData = ROSTER.find(c => c.name === r.name);
                                 aggregated[r.name] = { name: r.name, totalEpisodes: 0, img: charData?.img || "" };
                             }
                             let ep = r.episodesSurvived !== undefined ? r.episodesSurvived : lobby.round;
                             aggregated[r.name].totalEpisodes += ep;
                         });
                         
                         const top6 = Object.values(aggregated)
                             .sort((a, b) => b.totalEpisodes - a.totalEpisodes)
                             .slice(0, 6)
                             .reverse();
                             
                         updates.phase = 'grand_finale_top6';
                         updates.seasonWinners = arrayUnion(winner.name);
                         updates.rankings = arrayUnion(loserEntry, winnerEntry);
                         updates.top6Data = { players: top6, revealIndex: -1 };
                         updates.logs = arrayUnion(`GIOCO FINITO! ${winner.name} vince l'ultima stagione! Preparatevi per la TOP 6 SUPREMA...`);
                     } else {
                         // MODIFICA: GIOCO FINITO NORMALE PER 1 STAGIONE
                         updates.phase = 'game_over';
                         updates.seasonWinners = arrayUnion(winner.name);
                         updates.rankings = arrayUnion(loserEntry, winnerEntry); 
                         updates.logs = arrayUnion(`GIOCO FINITO!`);
                     }
                  }
              }

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
          };

          const calculateBotVotes = (lobbyState, isMerge) => {
            const votes = {};
            
            if (lobbyState.config.theme === 'Ridonculous Race') {
                const activeTeams = [...new Set(lobbyState.players.filter(p => p.status === 'active').map(p => p.team))];
                const nominatedTeams = lobbyState.losingTeam || [];
                activeTeams.forEach(t => {
                    const isBotTeam = lobbyState.players.filter(p => p.team === t && p.status === 'active').every(p => p.isBot);
                    if (isBotTeam) {
                        const validTargets = nominatedTeams.filter(nom => nom !== t);
                        if (validTargets.length > 0) {
                            votes[t] = validTargets[Math.floor(Math.random() * validTargets.length)];
                        }
                    }
                });
                return votes;
            }

            let activeBots = lobbyState.players.filter(p => { 
                if (!p.isBot || p.status !== 'active') return false;
                if (lobbyState.idolData?.activeEffects?.safetyUsedRound === lobbyState.round && lobbyState.idolData.activeEffects.safetyHolder === p.uid) return false;
                if (isMerge || lobbyState.twistData?.type === 'joint_ceremony') return true; 
                return p.team === lobbyState.losingTeam;
            });

            if (lobbyState.twistData?.type === 'killer') {
                const killerId = lobbyState.twistData.killerId;
                const killerBot = activeBots.find(b => b.uid === killerId);
                if (!killerBot) return {};
                activeBots = [killerBot];
            }

            let candidates = [];
            
            if (lobbyState.twistData?.type === 'purge') {
                candidates = lobbyState.players.filter(p => p.status === 'active' && lobbyState.twistData.targets.includes(p.uid) && !p.legacyImmunityActive);
            } else if (isMerge) {
                candidates = lobbyState.players.filter(p => p.status === 'active' && !(lobbyState.immunity || []).includes(p.uid) && !p.legacyImmunityActive);
            } else {
                candidates = lobbyState.players.filter(p => p.status === 'active' && p.team === lobbyState.losingTeam && !(lobbyState.immunity || []).includes(p.uid) && !p.legacyImmunityActive);
            }

            if (lobbyState.idolData?.activeEffects?.safetyUsedRound === lobbyState.round) {
                candidates = candidates.filter(p => p.uid !== lobbyState.idolData.activeEffects.safetyHolder);
            }

            activeBots.forEach(bot => {
                let targets = candidates.filter(t => t.uid !== bot.uid);
                
                if (targets.length === 0 && candidates.length > 0) targets = [bot]; 
                if (targets.length === 0) return;

                targets.sort(() => Math.random() - 0.5);

                const targetsWithScore = targets.map(t => ({
                    uid: t.uid,
                    score: bot.relationships[t.uid] || 0
                }));

                const minScore = Math.min(...targetsWithScore.map(t => t.score));
                const potentialVictims = targetsWithScore.filter(t => t.score === minScore);
                const victim = potentialVictims[Math.floor(Math.random() * potentialVictims.length)];
                
                if (victim) {
                    votes[bot.uid] = victim.uid; 
                }
            });
            return votes;
          };

          const calculateCeremonyResults = (lobbyState, currentVotes, isMerge, isDoubleElimination = false) => {
              const counts = {};
              const activePlayers = lobbyState.players.filter(p => p.status === 'active');
              
              let validTargetIds = [];
              if (lobbyState.twistData?.type === 'purge') {
                  validTargetIds = lobbyState.twistData.targets.filter(id => lobbyState.players.find(p => p.uid === id)?.status === 'active');
              } else {
                  validTargetIds = isMerge 
                    ? activePlayers.filter(p => !(lobbyState.immunity || []).includes(p.uid)).map(p => p.uid)
                    : activePlayers.filter(p => p.team === lobbyState.losingTeam).map(p => p.uid);
              }

              validTargetIds = validTargetIds.filter(id => !lobbyState.players.find(p => p.uid === id)?.legacyImmunityActive);

              if (lobbyState.idolData?.activeEffects?.safetyUsedRound === lobbyState.round) {
                  validTargetIds = validTargetIds.filter(id => id !== lobbyState.idolData.activeEffects.safetyHolder);
              }

              if (validTargetIds.length === 0) {
                  // FIX SCHERMO NERO: Se non c'è più nessuno votabile (es. tutti immuni), annulla per evitare il crash
                  return { safe: shuffledTargets, bottomTwo: [], eliminated: [], voteCounts: counts, tie: null };
              }

              const voteStealUsed = lobbyState.idolData?.activeEffects?.voteStealUsedRound === lobbyState.round;
              const voteStealHolder = lobbyState.idolData?.activeEffects?.voteStealHolder;
              const voteStealVictim = lobbyState.idolData?.activeEffects?.voteStealVictim;

              Object.entries(currentVotes).forEach(([voterId, tId]) => {
                  if (voteStealUsed && voterId === voteStealVictim) {
                      return; 
                  }

                  if (validTargetIds.includes(tId)) {
                      counts[tId] = (counts[tId] || 0) + 1;

                      const voterObj = lobbyState.players.find(p => p.uid === voterId);
                      if (voterObj?.legacyDoubleVoteActive) {
                          counts[tId] += 1;
                      }

                      if (lobbyState.idolData?.activeEffects?.extraVoteUsedRound === lobbyState.round &&
                          (lobbyState.idolData?.activeEffects?.extraVoteUsers || []).includes(voterId)) {
                              counts[tId] += 1;
                      }

                      if (voteStealUsed && voterId === voteStealHolder) {
                          counts[tId] += 1;
                      }
                  }
              });

              let shuffledTargets = [...validTargetIds];
              for (let i = shuffledTargets.length - 1; i > 0; i--) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [shuffledTargets[i], shuffledTargets[j]] = [shuffledTargets[j], shuffledTargets[i]];
              }

              let victims = Object.keys(counts);
              for (let i = victims.length - 1; i > 0; i--) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [victims[i], victims[j]] = [victims[j], victims[i]];
              }
              const sortedVictims = victims.sort((a, b) => counts[b] - counts[a]);
              
              if (sortedVictims.length === 0 && validTargetIds.length > 0) {
                  const rnd = shuffledTargets[0];
                  let bottomTwo = [rnd];
                  if (shuffledTargets.length > 1) bottomTwo.push(shuffledTargets[1]);
                  return { safe: shuffledTargets.filter(id => !bottomTwo.includes(id)), bottomTwo, eliminated: [rnd], voteCounts: counts, tie: null };
              }

              const maxVotes = counts[sortedVictims[0]];
              const ties = sortedVictims.filter(id => counts[id] === maxVotes);
              
              if (ties.length > 1) {
                  if (!isDoubleElimination || (isDoubleElimination && ties.length > 2)) { 
                     let tieBottom = [...ties];
                     let safe = shuffledTargets.filter(id => !tieBottom.includes(id));
                     safe.sort((a, b) => (counts[a] || 0) - (counts[b] || 0));
                     return { safe, bottomTwo: tieBottom, eliminated: null, voteCounts: counts, tie: ties };
                  }
              }

              if (isDoubleElimination && sortedVictims.length >= 2) {
                   const elim1 = sortedVictims[0];
                   const elim2 = sortedVictims[1];
                   
                   let bottomTwo = sortedVictims.slice(0, 2);
                   const safe = shuffledTargets.filter(id => !bottomTwo.includes(id));
                   safe.sort((a, b) => (counts[a] || 0) - (counts[b] || 0));

                   if(ties.length === 2 && counts[sortedVictims[2]] < ties[0]) {
                      return { safe, bottomTwo: ties, eliminated: ties, voteCounts: counts, tie: null };
                   } else {
                       return { safe, bottomTwo, eliminated: [elim1, elim2], voteCounts: counts, tie: null };
                   }
              }

              const elimId = sortedVictims[0];
              let bottomTwo = sortedVictims.slice(0, 2);
              
              if (bottomTwo.length < 2 && shuffledTargets.length >= 2) {
                  const zeroVotePerson = shuffledTargets.find(id => id !== elimId);
                  if (zeroVotePerson) bottomTwo.push(zeroVotePerson);
              } else if (elimId && !bottomTwo.includes(elimId)) {
                  bottomTwo.push(elimId); 
              }
              
              let safe = shuffledTargets.filter(id => !bottomTwo.includes(id));
              safe.sort((a, b) => (counts[a] || 0) - (counts[b] || 0)); 
              
              for (let i = bottomTwo.length - 1; i > 0; i--) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [bottomTwo[i], bottomTwo[j]] = [bottomTwo[j], bottomTwo[i]];
              }
              
              return { safe, bottomTwo, eliminated: [elimId], voteCounts: counts, tie: null };
          };

          const handleInteraction = async (type, payload = null) => {

                          }

                          transaction.update(lobbyRef, updates);
                          return { type, localImbroglio };
                      }
                      // --- NUOVA ABILITÀ: SPILL THE TEA (Tema Girly pop) ---
                      else if (type === 'spill_the_tea') {
                          const [targetId, friendId] = payload;
                          const tIdx = updatedPlayers.findIndex(p => p.uid === targetId);
                          const fIdx = updatedPlayers.findIndex(p => p.uid === friendId);
                          const tName = updatedPlayers[tIdx].name;
                          const fName = updatedPlayers[fIdx].name;

                          let updates = { players: updatedPlayers };

                          if (Math.random() < 0.5) {
                              const others = updatedPlayers.filter(p => p.status === 'active' && p.uid !== targetId);
                              others.sort(() => Math.random() - 0.5);
                              const affected = others.slice(0, 2);
                              let affectedNames = [];
                              
                              affected.forEach(p => {
                                  const pIdx = updatedPlayers.findIndex(x => x.uid === p.uid);
                                  updatedPlayers[tIdx].relationships[p.uid] = Math.max(-10, (updatedPlayers[tIdx].relationships[p.uid] || 0) - 1);
                                  updatedPlayers[pIdx].relationships[targetId] = Math.max(-10, (updatedPlayers[pIdx].relationships[targetId] || 0) - 1);
                                  affectedNames.push(p.name);
                              });
                              
                              const namesStr = affectedNames.length > 0 ? affectedNames.join(" e ") : "nessuno";
                              localImbroglio = `☕ TEA VERSATO!\nHai sparlato di ${tName} con la tua amica ${fName}. Le voci sono girate in fretta!\nOra ${tName} ha -1 in amicizia con ${namesStr}!`;
                              updates.logs = arrayUnion(`☕ ${actorName} e ${fName} hanno sparlato di ${tName}! Le voci girano...`);
                          } else {
                              updatedPlayers[tIdx].relationships[user.uid] = Math.max(-10, (updatedPlayers[tIdx].relationships[user.uid] || 0) - 1);
                              updatedPlayers[tIdx].relationships[friendId] = Math.max(-10, (updatedPlayers[tIdx].relationships[friendId] || 0) - 1);

                              localImbroglio = `🚨 SCOPERTE!\n${tName} ha scoperto che tu e ${fName} stavate spettegolando su di lei!\nLa relazione con ${tName} scende di -1 per entrambe.`;
                              updates.logs = arrayUnion(`🚨 DRAMMA! ${tName} ha beccato ${actorName} e ${fName} a sparlare di lei! (-1 relaz per entrambe)`);
                          }

                          transaction.update(lobbyRef, updates);
                          return { type, localImbroglio };
                      }
                      else if (type === 'spy') {
                          let updates = { players: updatedPlayers };
                          if (Math.random() < 0.5) {
                              const activeOthers = lobby.players.filter(p => p.status === 'active' && p.uid !== targetId);
                              const targetRels = updatedPlayers[targetIdx].relationships || {};
                              activeOthers.sort((a, b) => (targetRels[b.uid] || 0) - (targetRels[a.uid] || 0));
                              const probabileVoto = activeOthers.length > 0 ? activeOthers[0].name : "Nessuno in particolare";
                              
                              localImbroglio = `📱 SPIA CON SUCCESSO!\nSbirciando nel telefono di ${targetName}, scopri che la sua preferenza per l'immunità è: ${probabileVoto.toUpperCase()}!`;
                              updates.logs = arrayUnion(`👀 ${actorName} ha fatto una mossa furtiva aggirandosi tra i bagagli...`);
                          } else {
                              updatedPlayers[targetIdx].relationships[user.uid] = Math.max(-10, (updatedPlayers[targetIdx].relationships[user.uid] || 0) - 1);
                              localImbroglio = `🚨 DRAMMA!\n${targetName} ti ha sorpreso a spiare nel suo telefono! La fiducia è tradita (-1 relaz).`;
                              updates.logs = arrayUnion(`🚨 DRAMMA! ${targetName} ha sorpreso ${actorName} a spiare nel suo telefono! (-1 relaz)`);
                          }
                          transaction.update(lobbyRef, updates);
                          return { type, localImbroglio };
                      }
                      else if (type === 'scuse_pubbliche') {
                          let updates = { players: updatedPlayers };
                          if (Math.random() < 0.35) { // 35% di successo
                              let healedCount = 0;
                              updatedPlayers.forEach((p, idx) => {
                                  if (p.uid !== user.uid && p.status === 'active') {
                                      if ((updatedPlayers[idx].relationships[user.uid] || 0) < 0) {
                                          updatedPlayers[idx].relationships[user.uid] = 0; // Azzera le inimicizie
                                          healedCount++;
                                      }
                                  }
                              });
                              localImbroglio = `😭 SCUSE ACCETTATE!\nLe tue lacrime erano convincenti. ${healedCount} relazioni negative nei tuoi confronti sono state azzerate!`;
                              updates.logs = arrayUnion(`😭 DRAMMA! ${actorName} ha fatto delle scuse pubbliche in lacrime e ha commosso tutti. Gli odiatori lo hanno perdonato!`);
                          } else { // Fallimento
                              updatedPlayers.forEach((p, idx) => {
                                  if (p.uid !== user.uid && p.status === 'active') {
                                      // Tutti scendono di -1
                                      updatedPlayers[idx].relationships[user.uid] = Math.max(-10, (updatedPlayers[idx].relationships[user.uid] || 0) - 1);
                                  }
                              });
                              localImbroglio = `🙄 SCUSE PESSIME!\nNessuno ti ha creduto. Le tue scuse sembravano palesemente finte e hai perso 1 punto relazione con TUTTI i giocatori attivi!`;
                              updates.logs = arrayUnion(`🙄 CRINGE! ${actorName} ha fatto delle scuse pubbliche finte per impietosire il gruppo. L'hanno presa tutti malissimo! (-1 relaz con tutti)`);
                          }
                          transaction.update(lobbyRef, updates);
                          return { type, localImbroglio };
                      }

                      // SE NON È UNA SKILL DI FAZIONE, AGGIORNA NORMALE
                      transaction.update(lobbyRef, {
                          players: updatedPlayers,
                          logs: msg ? arrayUnion(msg) : undefined
                      });
                      
                      return { type, achieved };
                  });

                  if (result && result.type !== 'skip') {
                      if (result.localImbroglio) setImbroglioResult(result.localImbroglio);
                      
                      // Attivazione Achievements
                      if (result.achieved === 'farfallasociale') updateAchievement('farfallasociale', 1, 50);
                      if (result.achieved === 'dramaqueen') updateAchievement('dramaqueen', 1, 20);
                      if (result.achieved === 'itremoschettieri') updateAchievement('itremoschettieri', 1, 10);
                      if (result.achieved === 'dolcezza') updateAchievement('dolcezza', 1, 30);

                      setHasActed(true);
                      setSelectedPlayer(null);
                      setShowRumorSelector(false); 
                      setShowTrioSelector(false); 
                      setSpecialSkillType(null);
                  }

              } catch (e) {
                  console.error("Errore durante l'interazione:", e);
              }
          };

          const submitVote = async (targetId) => {
              if (!targetId || lobby.phase !== 'voting') return;
              
              if (myPlayer.status !== 'active') return;

              if (lobby.twistData?.type === 'killer' && user.uid !== lobby.twistData.killerId) {
                  return;
              }

              if (lobby.idolData?.activeEffects?.safetyUsedRound === lobby.round && lobby.idolData?.activeEffects?.safetyHolder === user.uid) {
                  return;
              }

              const myTeam = myPlayer.team;
              const losingTeam = lobby.losingTeam;
              
              if (!isMerge && myTeam !== losingTeam && lobby.twistData?.type !== 'joint_ceremony') {
                  return;
              }

              let updates = {
                  [`votes.${user.uid}`]: targetId
              };

              if (useExtraVote && lobby.idolData?.inventory?.extraVotes?.[user.uid] > 0) {
                  updates[`idolData.inventory.extraVotes.${user.uid}`] = lobby.idolData.inventory.extraVotes[user.uid] - 1;
                  updates[`idolData.activeEffects.extraVoteUsedRound`] = lobby.round;
                  updates[`idolData.activeEffects.extraVoteUsers`] = arrayUnion(user.uid);
              }

              if (useVoteSteal && lobby.idolData?.inventory?.voteSteals?.[user.uid] > 0) {
                  if (!voteStealVictim) return; 
                  updates[`idolData.inventory.voteSteals.${user.uid}`] = lobby.idolData.inventory.voteSteals[user.uid] - 1;
                  updates[`idolData.activeEffects.voteStealUsedRound`] = lobby.round;
                  updates[`idolData.activeEffects.voteStealVictim`] = voteStealVictim;
                  updates[`idolData.activeEffects.voteStealHolder`] = user.uid;
              }

              if (lobby.twistData?.type !== 'killer') {
                  const myAllies = lobby.players.filter(p => 
                      p.isBot && 
                      p.status === 'active' && 
                      Array.isArray(p.alliances) && 
                      p.alliances.includes(user.uid)
                  );

                  myAllies.forEach(ally => {
                      const canVote = isMerge || lobby.twistData?.type === 'joint_ceremony' || ally.team === losingTeam;
                      if (canVote) {
                          if (Math.random() < 0.40) {
                              updates[`votes.${ally.uid}`] = targetId;
                          }
                      }
                  });
              }

              updateAchievement('mibrucialamano', 1, 250);
              updateAchievement('manoincandescente', 1, 600); // <-- AGGIUNTA PROGRESO MANO INCANDESCENTE

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
              setUseExtraVote(false);
              setUseVoteSteal(false);
          };

          const teams = useMemo(() => {
             const groups = {};
             if (isMerge) {
                 groups["MERGE"] = activePlayers;
             } else {
                 let currentTeamNames = DEFAULT_TEAM_NAMES;
                 if (lobby.config.theme === 'Villain Edition') {
                     currentTeamNames = VILLAIN_TEAM_NAMES;
                 } else if (lobby.config.theme === 'Brains vs Beauties vs Brawns') {
                     currentTeamNames = ["Brains", "Beauties", "Brawns"];
                 } else if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') {
                     currentTeamNames = ["Eroi", "Villains", "Neutrali"];
                 } else if (lobby.config.theme === 'Girly pop') {
                     currentTeamNames = ["Girly pop", "Amazzoni", "Yuri", "Dive"];
                 } else if (lobby.config.theme === 'Custom') {
                     // MODIFICA: in Custom ignoriamo i preset e prendiamo i team che l'Host ha effettivamente generato!
                     currentTeamNames = [...new Set(lobby.players.map(p => p.team).filter(t => t && t !== 'MERGE'))];
                 }
                 
                 if (lobby.config.theme === 'Custom') {
                     currentTeamNames.forEach(t => groups[t] = []);
                 } else if (lobby.config.numTeams > 0) {
                     currentTeamNames.slice(0, lobby.config.numTeams).forEach(t => groups[t] = []);
                 }
                 
                 activePlayers.forEach(p => { 
                     if (p.team) {
                         if (!groups[p.team]) groups[p.team] = []; 
                         groups[p.team].push(p); 
                     }
                 });
             }
             return groups;
          }, [activePlayers, isMerge, lobby.config.numTeams, lobby.config.theme, lobby.players]);

          const pendingVotesCount = useMemo(() => {
              if (lobby.phase !== 'voting') return 0;

              if (lobby.twistData?.type === 'killer') {
                  const killerId = lobby.twistData.killerId;
                  const killer = lobby.players.find(p => p.uid === killerId);
                  if (killer && !killer.isBot && !lobby.votes?.[killerId]) {
                      return 1;
                  }
                  return 0;
              }

              const isJoint = lobby.twistData?.type === 'joint_ceremony';
              
              const voters = (isMerge || isJoint)
                  ? activePlayers 
                  : activePlayers.filter(p => p.team === lobby.losingTeam);
                  
              return voters.filter(p => {
                   if (p.isBot || lobby.votes?.[p.uid]) return false;
                   if (lobby.idolData?.activeEffects?.safetyUsedRound === lobby.round && lobby.idolData.activeEffects.safetyHolder === p.uid) return false;
                   return true;
              }).length;
          }, [lobby.phase, lobby.votes, isMerge, activePlayers, lobby.losingTeam, lobby.twistData, lobby.idolData, lobby.round]);

          const pendingReadyCount = useMemo(() => {
              if (lobby.phase !== 'social') return 0;
              const humans = activePlayers.filter(p => !p.isBot);
              const ready = lobby.readyPlayers || [];
              return humans.filter(h => !ready.includes(h.uid)).length;
          }, [lobby.phase, lobby.readyPlayers, activePlayers]);

          const pendingJuryVotesCount = useMemo(() => {
              if (lobby.phase !== 'jury_vote' || lobby.juryData?.stage !== 'voting') return 0;
              return lobby.juryData.jurors.length - Object.keys(lobby.juryData.votes || {}).length;
          }, [lobby.phase, lobby.juryData]);

          const pendingSpeechesCount = useMemo(() => {
              if (lobby.phase !== 'jury_speeches' || !lobby.juryData) return 0;
              const f1HasSpeech = !!lobby.juryData.speeches?.[lobby.juryData.finalist1];
              const f2HasSpeech = !!lobby.juryData.speeches?.[lobby.juryData.finalist2];
              return (f1HasSpeech ? 0 : 1) + (f2HasSpeech ? 0 : 1);
          }, [lobby.phase, lobby.juryData]);


          return (
            <div className="flex h-screen bg-cover bg-center text-white overflow-hidden font-sans" style={{ backgroundImage: `url('${currentBg}')` }}>
               <div className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
               
               {/* 2. MODALE GRANDE PER CHI DEVE VOTARE */}
               {lobby.endVote?.active && !lobby.endVote.voters.includes(user.uid) && !myPlayer?.isBot && (
                    <div className="fixed inset-0 z-[10000] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                        <div className="bg-slate-900 rounded-2xl border-2 border-red-500 max-w-sm w-full p-6 text-center shadow-[0_0_30px_rgba(220,38,38,0.6)] animate-in zoom-in">
                            <AlertOctagon size={48} className="text-red-500 mx-auto mb-4 animate-pulse"/>
                            <h2 className="text-2xl font-black mb-2 text-red-500 uppercase">Annullare la Partita?</h2>
                            <p className="text-sm text-slate-300 mb-6">Un giocatore ha proposto di interrompere subito lo show e terminare il gioco. Sei d'accordo?</p>
                            <div className="flex gap-4">
                                <button onClick={() => castEndVote(true)} className="flex-1 bg-green-600 hover:bg-green-500 text-white font-black py-3 rounded-xl shadow-lg">SÌ</button>
                                <button onClick={() => castEndVote(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-black py-3 rounded-xl shadow-lg">NO</button>
                            </div>
                        </div>
                    </div>
               )}

               {/* 3. BANNER PICCOLO PER CHI HA GIÀ VOTATO E ASPETTA GLI ALTRI */}
               {lobby.endVote?.active && lobby.endVote.voters.includes(user.uid) && (
                    <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[9000] bg-slate-900/90 border border-red-500 p-3 rounded-xl text-center shadow-[0_0_15px_rgba(220,38,38,0.5)] flex items-center gap-4 backdrop-blur-md animate-in slide-in-from-top">
                         <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-red-500"></div>
                         <div>
                             <h3 className="font-black text-red-400 text-sm uppercase">Votazione Annullamento...</h3>
                             <p className="text-[10px] text-slate-300 font-bold">
                                 Sì: {lobby.endVote.yesVotes} | No: {lobby.endVote.noVotes} | Manca: {lobby.players.filter(p=>!p.isBot).length - lobby.endVote.voters.length}
                             </p>
                         </div>
                    </div>
               )}

               {/* MODALE DRONE SPIA */}
               {showSpyDroneModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-indigo-500 max-w-sm w-full relative p-6">
                           <button onClick={() => { setShowSpyDroneModal(false); setSpyDroneResult(null); setSpyDroneTarget(""); }} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-4 text-indigo-400 flex items-center gap-2"><Eye/> DRONE SPIA</h2>
                           
                           {spyDroneResult ? (
                               <div className="bg-slate-800 p-4 rounded-xl text-sm whitespace-pre-line text-slate-300 font-mono">
                                   {spyDroneResult}
                               </div>
                           ) : (
                               <>
                               <p className="text-sm text-slate-400 mb-4">Scegli chi spiare per scoprire i suoi segreti.</p>
                               <select 
                                   className="w-full mb-4 bg-slate-800 border border-indigo-500 text-white rounded p-2"
                                   value={spyDroneTarget}
                                   onChange={(e) => setSpyDroneTarget(e.target.value)}
                               >
                                   <option value="">-- Seleziona bersaglio --</option>
                                   {activePlayers.filter(p => p.uid !== user.uid).map(p => (
                                       <option key={p.uid} value={p.uid}>{p.name}</option>
                                   ))}
                               </select>
                               <button 
                                   onClick={handleUseSpyDrone} 
                                   disabled={!spyDroneTarget}
                                   className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 text-white font-bold py-2 rounded-xl transition"
                               >
                                   INVIA DRONE
                               </button>
                               </>
                           )}
                       </div>
                    </div>
                )}

               {/* MODALE AMMUTINAMENTO */}
               {showMutinyModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-orange-500 max-w-sm w-full relative p-6">
                           <button onClick={() => { setShowMutinyModal(false); setMutinyTarget(""); }} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-4 text-orange-400 flex items-center gap-2"><RefreshCw/> AMMUTINAMENTO</h2>
                           
                           <p className="text-sm text-slate-400 mb-4">Scambia la tua squadra con quella di un avversario.</p>
                           <select 
                               className="w-full mb-4 bg-slate-800 border border-orange-500 text-white rounded p-2"
                               value={mutinyTarget}
                               onChange={(e) => setMutinyTarget(e.target.value)}
                           >
                               <option value="">-- Seleziona bersaglio --</option>
                               {activePlayers.filter(p => p.uid !== user.uid && p.team !== myPlayer.team).map(p => (
                                   <option key={p.uid} value={p.uid}>{p.name} (Team: {p.team})</option>
                               ))}
                           </select>
                           <button 
                               onClick={handleUseMutiny} 
                               disabled={!mutinyTarget}
                               className="w-full bg-orange-600 hover:bg-orange-500 disabled:bg-slate-700 text-white font-bold py-2 rounded-xl transition"
                           >
                               SCAMBIA SQUADRA
                           </button>
                       </div>
                    </div>
                )}

                {/* MODALE TESTAMENTO */}
                {showLegacyModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-amber-600 max-w-sm w-full relative p-6">
                           <button onClick={() => { setShowLegacyModal(false); setLegacyTarget(""); }} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-4 text-amber-500 flex items-center gap-2"><Scroll/> SCRIVI TESTAMENTO</h2>
                           
                           <p className="text-sm text-slate-300 mb-4">Scegli il tuo Erede in segreto. Se verrai eliminato stasera, riceverà l'<strong className="text-green-400">Immunità</strong> e il <strong className="text-yellow-400">Doppio Voto</strong> per il suo prossimo falò!</p>
                           <select 
                               className="w-full mb-4 bg-slate-800 border border-amber-600 text-white rounded p-2 font-bold"
                               value={legacyTarget}
                               onChange={(e) => setLegacyTarget(e.target.value)}
                           >
                               <option value="">-- Scegli il tuo Erede --</option>
                               {activePlayers.filter(p => p.uid !== user.uid).map(p => (
                                   <option key={p.uid} value={p.uid}>{p.name}</option>
                               ))}
                           </select>
                           <button 
                               onClick={handleUseLegacy} 
                               disabled={!legacyTarget}
                               className="w-full bg-amber-700 hover:bg-amber-600 disabled:bg-slate-700 text-white font-bold py-3 rounded-xl transition shadow-[0_0_15px_rgba(217,119,6,0.4)]"
                           >
                               CONFERMA TESTAMENTO
                           </button>
                       </div>
                    </div>
                )}

                {/* MODALE SALVACONDOTTO */}
               {showSafetyModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-teal-500 max-w-sm w-full relative p-6">
                           <button onClick={() => setShowSafetyModal(false)} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-4 text-teal-400 flex items-center gap-2"><DoorOpen/> SALVACONDOTTO</h2>
                           
                           <p className="text-sm text-slate-300 mb-6">Se usi questo vantaggio abbandonerai la cerimonia. Sarai immune ai voti e ti salverai di sicuro, ma **non potrai votare** stasera.</p>
                           
                           <button 
                               onClick={handleUseSafety} 
                               className="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-xl transition shadow-[0_0_15px_rgba(20,184,166,0.4)]"
                           >
                               USA SALVACONDOTTO ORA
                           </button>
                       </div>
                    </div>
                )}

               {/* MODALE LADRO DI COLLANE */}
               {showImmunityStealModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-rose-500 max-w-sm w-full relative p-6">
                           <button onClick={() => { setShowImmunityStealModal(false); setImmunityStealTarget(""); }} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-4 text-rose-400 flex items-center gap-2"><Link/> LADRO DI COLLANE</h2>
                           
                           <p className="text-sm text-slate-300 mb-4">Ruba l'immunità a chi ha vinto la sfida e salva te stesso al suo posto!</p>
                           <select 
                               className="w-full mb-6 bg-slate-800 border border-rose-500 text-white rounded p-3 font-bold"
                               value={immunityStealTarget}
                               onChange={(e) => setImmunityStealTarget(e.target.value)}
                           >
                               <option value="">-- Seleziona un immune --</option>
                               {lobby.immunity.filter(id => id !== user.uid).map(id => {
                                   const p = lobby.players.find(pl => pl.uid === id);
                                   return <option key={id} value={id}>{p?.name}</option>
                               })}
                           </select>
                           <button 
                               onClick={handleUseImmunitySteal} 
                               disabled={!immunityStealTarget}
                               className="w-full bg-rose-600 hover:bg-rose-500 disabled:bg-slate-700 text-white font-black py-3 rounded-xl transition shadow-[0_0_15px_rgba(225,29,72,0.4)]"
                           >
                               RUBA L'IMMUNITÀ
                           </button>
                       </div>
                    </div>
                )}

               {/* MODALE SFERA DI CRISTALLO */}
               {showCrystalBallModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-fuchsia-500 max-w-md w-full relative p-6 shadow-[0_0_30px_rgba(217,70,239,0.3)]">
                           <button onClick={() => setShowCrystalBallModal(false)} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full hover:bg-black transition"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-2 text-fuchsia-400 flex items-center gap-2">
                               <span className="text-3xl animate-pulse">🔮</span> VISIONE FUTURA
                           </h2>
