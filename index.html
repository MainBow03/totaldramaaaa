                        <button onClick={initCustomSetup} className="w-full mt-4 bg-orange-600 hover:bg-orange-500 text-white py-3 rounded-xl font-bold shadow-lg flex flex-col items-center">
                            <span>CONFIGURA CUSTOM</span>
                            <span className="text-[10px] font-normal">Crea Team & Scegli Bot</span>
                        </button>
                    ) : (
                        <button onClick={startSeason} className="w-full mt-4 bg-green-600 hover:bg-green-500 text-white py-3 rounded-xl font-bold shadow-lg">
                            INIZIA STAGIONE 1
                        </button>
                    )
                  )}
                </div>

                <div className="flex-1 p-4 overflow-y-auto bg-slate-900 relative">
                   {/* MODALE CONFIGURAZIONE CUSTOM */}
                   {showCustomModal && (
                       <div className="absolute inset-0 bg-slate-950/95 z-50 flex flex-col p-6 animate-in zoom-in">
                           <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                               <div>
                                   <h2 className="text-3xl font-black text-orange-500">CONFIGURAZIONE CUSTOM</h2>
                                   <p className="text-slate-400">Scegli i nomi delle squadre e popola il roster (Assegnati: {Object.keys(customAssignments).length} / {lobby.config.maxPlayers})</p>
                               </div>
                               <div className="flex gap-4">
                                   <button onClick={() => setShowCustomModal(false)} className="px-6 py-2 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-700">ANNULLA</button>
                                   <button 
                                       onClick={startCustomSeason}
                                       disabled={Object.keys(customAssignments).length !== lobby.config.maxPlayers}
                                       className="px-6 py-2 bg-green-600 disabled:bg-slate-700 text-white rounded-lg font-black shadow-lg hover:bg-green-500 transition-colors"
                                   >
                                       CONFERMA E INIZIA
                                   </button>
                               </div>
                           </div>

                           <div className="flex flex-1 gap-6 min-h-0">
                               {/* PANNELLO SQUADRE (SINISTRA) */}
                               <div className="w-1/3 flex flex-col gap-4 overflow-y-auto custom-scrollbar pr-2">
                                   <h3 className="font-bold text-yellow-400 sticky top-0 bg-slate-950 py-2 z-10">I Tuoi Team</h3>
                                   {customTeams.map((teamName, idx) => {
                                       const isSelected = selectedCustomTeam === teamName;
                                       const teamMembers = Object.entries(customAssignments).filter(([id, t]) => t === teamName);
                                       
                                       return (
                                           <div 
                                               key={idx} 
                                               onClick={() => setSelectedCustomTeam(teamName)}
                                               className={`p-4 rounded-xl border-2 transition-all cursor-pointer ${isSelected ? 'border-orange-500 bg-orange-900/20 shadow-[0_0_15px_rgba(249,115,22,0.3)]' : 'border-slate-700 bg-slate-900 hover:border-slate-500'}`}
                                           >
                                               <select 
                                                   value={teamName}
                                                   onChange={(e) => handleCustomTeamNameChange(idx, e.target.value)}
                                                   onClick={e => e.stopPropagation()}
                                                   className="w-full bg-black/50 border border-slate-600 rounded p-2 text-sm font-bold text-white mb-3 outline-none"
                                               >
                                                   {ALL_AVAILABLE_TEAMS.map(name => (
                                                       <option key={name} value={name} disabled={customTeams.includes(name) && name !== teamName}>{name}</option>
                                                   ))}
                                               </select>
                                               
                                               <div className="text-xs text-slate-400 mb-2">Membri ({teamMembers.length}):</div>
                                               <div className="flex flex-wrap gap-2">
                                                   {teamMembers.map(([id]) => {
                                                       const isHuman = lobby.players.find(p => p.uid === id);
                                                       let charData = null;
                                                       if (isHuman) charData = isHuman.character;
                                                       else charData = ROSTER.find(r => r.name === id);
                                                       
                                                       return (
                                                           <div key={id} className={`w-8 h-8 rounded-full border-2 overflow-hidden ${isHuman ? 'border-green-400' : 'border-slate-500'}`} title={isHuman ? isHuman.name : id}>
                                                               {charData ? <img src={charData.img} className="w-full h-full object-cover"/> : <div className="w-full h-full bg-slate-600 flex items-center justify-center text-[8px] font-bold">TU</div>}
                                                           </div>
                                                       );
                                                   })}
                                               </div>
                                           </div>
                                       );
                                   })}
                               </div>

                               {/* PANNELLO ROSTER (DESTRA) */}
                               <div className="flex-1 flex flex-col bg-slate-900 rounded-xl border border-slate-700 p-4 min-h-0">
                                   <div className="flex justify-between items-center mb-4">
                                       <h3 className="font-bold text-yellow-400">Roster Disponibile</h3>
                                       <div className="text-xs bg-orange-600/30 text-orange-300 border border-orange-500 px-3 py-1 rounded-full">
                                           Clicca un personaggio per aggiungerlo o spostarlo in <strong className="text-white">{selectedCustomTeam}</strong>
                                       </div>
                                   </div>
                                   <div className="flex-1 overflow-y-auto custom-scrollbar">
                                       <div className="grid grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-3 pr-2">
                                           {/* Mostra prima gli umani (obbligatori) */}
                                           {lobby.players.map(p => (
                                               <button 
                                                   key={p.uid}
                                                   onClick={() => togglePlayerAssignment(p.uid)}
                                                   className={`relative rounded-lg overflow-hidden border-2 aspect-[3/4] transition-all ${customAssignments[p.uid] === selectedCustomTeam ? 'border-orange-500 ring-2 ring-orange-500 scale-105 shadow-[0_0_10px_rgba(249,115,22,0.8)]' : 'border-green-600 opacity-60 hover:opacity-100 hover:border-orange-400'}`}
                                               >
                                                   {p.character ? <img src={p.character.img} className="w-full h-full object-cover"/> : <div className="w-full h-full bg-slate-800 flex items-center justify-center text-xs font-bold text-slate-400">No Char</div>}
                                                   <div className="absolute inset-x-0 bottom-0 bg-green-600 text-[9px] font-black py-0.5 text-center text-white">{p.name} (Umano)</div>
                                                   {customAssignments[p.uid] && customAssignments[p.uid] !== selectedCustomTeam && (
                                                       <div className="absolute inset-0 bg-black/60 flex items-center justify-center text-xs font-bold text-center p-1 leading-tight border-2 border-transparent pointer-events-none">In {customAssignments[p.uid]}</div>
                                                   )}
                                               </button>
                                           ))}

                                           {/* Poi il resto del roster (Bot opzionali) */}
                                           {ROSTER.map(char => {
                                               const isHumanChar = lobby.players.some(p => p.character?.name === char.name);
                                               if (isHumanChar) return null; // Nascondi i pg già scelti dagli umani per evitare cloni visivi

                                               const assignedTeam = customAssignments[char.name];
                                               const isSelectedForActiveTeam = assignedTeam === selectedCustomTeam;
                                               const isDisabled = !assignedTeam && Object.keys(customAssignments).length >= lobby.config.maxPlayers;

                                               return (
                                                   <button 
                                                       key={char.name}
                                                       onClick={() => togglePlayerAssignment(char.name)}
                                                       disabled={isDisabled}
                                                       className={`relative rounded-lg overflow-hidden border-2 aspect-[3/4] transition-all ${isSelectedForActiveTeam ? 'border-orange-500 ring-2 ring-orange-500 scale-105 shadow-[0_0_10px_rgba(249,115,22,0.8)] z-10' : assignedTeam ? 'border-slate-500 opacity-40 hover:opacity-100 hover:border-orange-400' : isDisabled ? 'border-slate-800 opacity-20 cursor-not-allowed' : 'border-slate-700 hover:border-orange-400 hover:opacity-100'}`}
                                                   >
                                                       <img src={char.img} className="w-full h-full object-cover"/>
                                                       {assignedTeam && !isSelectedForActiveTeam && (
                                                           <div className="absolute inset-0 bg-black/60 flex items-center justify-center text-[10px] font-bold text-center p-1 leading-tight text-slate-300 pointer-events-none">In {assignedTeam}</div>
                                                       )}
                                                       {isSelectedForActiveTeam && (
                                                           <div className="absolute top-1 right-1 bg-orange-500 rounded-full p-1 pointer-events-none"><CheckCircle size={12} className="text-white"/></div>
                                                       )}
                                                   </button>
                                               )
                                           })}
                                       </div>
                                   </div>
                               </div>
                           </div>
                       </div>
                   )}

                   {/* MODALE SCELTA SKIN */}
                   {skinModalChar && (
                       <div className="fixed inset-0 bg-slate-950/90 z-[100] flex items-center justify-center p-4 animate-in zoom-in">
                           <div className="bg-slate-900 border-2 border-pink-500 rounded-2xl p-6 max-w-2xl w-full text-center relative shadow-[0_0_30px_rgba(236,72,153,0.4)]">
                               <button onClick={() => setSkinModalChar(null)} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full text-slate-300 hover:text-white"><X size={20}/></button>
                               <h2 className="text-3xl font-black text-pink-400 mb-6 flex items-center justify-center gap-2">
                                   Stili per {skinModalChar.name}
                               </h2>
                               <div className="flex flex-wrap justify-center gap-6">
                                   {skinModalChar.skins.map((skin, idx) => (
                                       <button
                                           key={idx}
                                           onClick={() => selectCharacter(skinModalChar, skin)}
                                           className="flex flex-col items-center bg-slate-800 p-3 rounded-2xl border-2 border-slate-600 hover:border-pink-400 hover:bg-slate-700 transition-all hover:scale-105 group"
                                       >
                                           <img src={skin.img} className="w-28 h-40 object-cover rounded-xl mb-3 shadow-lg group-hover:shadow-[0_0_15px_rgba(236,72,153,0.6)]" alt={skin.name}/>
                                           <span className="font-bold text-sm text-pink-100 bg-pink-900/50 px-3 py-1 rounded-full border border-pink-500/30">{skin.name}</span>
                                       </button>
                                   ))}
                               </div>
                           </div>
                       </div>
                   )}

                   <h3 className="text-xl font-bold mb-4 text-center text-yellow-400 flex-shrink-0">SCEGLI IL TUO PERSONAGGIO</h3>
                   <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-2">
                     {ROSTER.filter(char => {
                         if (lobby.config.theme === 'Villain Edition') return char.alignment === 'villain';
                         if (lobby.config.theme === 'Girly pop') return FEMALES.includes(char.name);
                         if (lobby.config.theme === 'Brains vs Beauties vs Brawns') return BRAINS.includes(char.name) || BEAUTIES.includes(char.name) || BRAWNS.includes(char.name);
                         if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') return HEROES.includes(char.name) || VILLAINS_LIST.includes(char.name) || NEUTRALS.includes(char.name);
                         return true;
                     }).map(char => {
                       const takenBy = lobby.players.find(p => p.character?.name === char.name);
                       const isMe = takenBy?.uid === user.uid;
                       
                       // --- LOGICA AURA E BADGE TEMA ---
                       let auraShadow = '';
                       let auraBorder = 'border-slate-700 hover:border-yellow-500';
                       let badge = null;
                       
                       if (lobby.config.theme === 'Brains vs Beauties vs Brawns') {
                           if (BRAINS.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(59,130,246,0.6)]';
                               auraBorder = 'border-blue-500 hover:border-blue-400';
                               badge = <div className="absolute top-1 left-1 bg-blue-600/90 text-blue-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-blue-400/50">Brain</div>;
                           } else if (BEAUTIES.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(236,72,153,0.6)]';
                               auraBorder = 'border-pink-500 hover:border-pink-400';
                               badge = <div className="absolute top-1 left-1 bg-pink-600/90 text-pink-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-pink-400/50">Beauty</div>;
                           } else if (BRAWNS.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(249,115,22,0.6)]';
                               auraBorder = 'border-orange-500 hover:border-orange-400';
                               badge = <div className="absolute top-1 left-1 bg-orange-600/90 text-orange-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-orange-400/50">Brawn</div>;
                           }
                       } else if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') {
                           if (HEROES.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(59,130,246,0.6)]';
                               auraBorder = 'border-blue-500 hover:border-blue-400';
                               badge = <div className="absolute top-1 left-1 bg-blue-600/90 text-blue-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-blue-400/50">Eroe</div>;
                           } else if (VILLAINS_LIST.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(220,38,38,0.6)]';
                               auraBorder = 'border-red-500 hover:border-red-400';
                               badge = <div className="absolute top-1 left-1 bg-red-600/90 text-red-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-red-400/50">Villain</div>;
                           } else if (NEUTRALS.includes(char.name)) {
                               auraShadow = 'shadow-[0_0_15px_rgba(156,163,175,0.6)]';
                               auraBorder = 'border-gray-500 hover:border-gray-400';
                               badge = <div className="absolute top-1 left-1 bg-gray-600/90 text-gray-100 text-[8px] sm:text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg uppercase backdrop-blur-sm z-10 border border-gray-400/50">Neutrale</div>;
                           }
                       }

                       return (
                         <button 
                           key={char.name}
                           onClick={() => handleCharacterClick(char)}
                           disabled={!!takenBy}
                           className={`relative rounded-lg overflow-hidden border-2 aspect-[3/4] transition-all duration-300 ${auraShadow} ${isMe ? 'border-green-500 ring-2 ring-green-500' : takenBy ? 'border-red-900 opacity-40' : auraBorder}`}
                         >
                           <img src={char.img} alt={char.name} className="w-full h-full object-cover" />
                           {badge}
                           {char.isNew && (
                               <div className="absolute top-1 right-1 bg-gradient-to-br from-red-500 to-rose-700 text-white text-[10px] font-black px-2 py-0.5 rounded shadow-[2px_2px_0px_#7f1d1d,0_0_10px_rgba(225,29,72,0.8)] border border-red-300 transform rotate-[15deg] z-20" style={{ textShadow: '1px 1px 0px #000' }}>
                                   NEW!
                               </div>
                           )}
                           {isMe && <div className="absolute inset-0 border-4 border-green-500 z-20"></div>}
                         </button>
                       )
                     })}
                   </div>
                </div>
              </div>
            </div>
          );
        };

        // --- GAME LOGIC ---

        const GameRoom = ({ lobby, user, lobbyId, onLeave, updateAchievement, setAchievementProgress, updatePersonalStats }) => {
          const isHost = lobby.hostId === user.uid;
          const myPlayer = lobby.players.find(p => p.uid === user.uid);
          const activePlayers = lobby.players.filter(p => p.status === 'active');
          const currentSeason = SEASON_CONFIG[lobby.currentSeasonIndex] || SEASON_CONFIG[0];
          
          // Calcoliamo quanti team DIVERSI hanno ancora almeno un giocatore attivo
          const uniqueActiveTeams = [...new Set(activePlayers.map(p => p.team).filter(t => t && t.toUpperCase() !== 'MERGE'))];
          
          // La fusione avviene se: è un tema speciale, SIAMO ARRIVATI AL NUMERO PREVISTO, oppure È RIMASTA UNA SOLA SQUADRA
          const isMerge = (lobby.config.theme === 'La Notte del Giudizio' || lobby.config.theme === 'Popolarità') 
              ? true 
              : (activePlayers.length <= (lobby.config.mergeSize || (lobby.config.maxPlayers / 2)) || uniqueActiveTeams.length < 2); 

          // --- SFONDO VILLAIN EDITION ---
          // Immagine cupa e nebbiosa perfetta per il tema villain, presa dal web per funzionare in multiplayer!
          const villainBgUrl = "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2094&auto=format&fit=crop"; 
          const currentBg = lobby.config.theme === 'Villain Edition' ? villainBgUrl : currentSeason.bg;

          const [hasActed, setHasActed] = useState(false);
          const [chatInput, setChatInput] = useState("");
          const chatRef = useRef(null);
          
          const [nextSeasonConfig, setNextSeasonConfig] = useState(null); 
          const [selectedRedemptionCandidates, setSelectedRedemptionCandidates] = useState([]);

          const [selectedPlayer, setSelectedPlayer] = useState(null);
          const [showRumorSelector, setShowRumorSelector] = useState(false); 
          const [showTrioSelector, setShowTrioSelector] = useState(false);
          
          const [useExtraVote, setUseExtraVote] = useState(false);
          const [useAdvantage, setUseAdvantage] = useState(false); 
          const [useVoteSteal, setUseVoteSteal] = useState(false);
          const [voteStealVictim, setVoteStealVictim] = useState("");
          
          const [showSpyDroneModal, setShowSpyDroneModal] = useState(false);
          const [spyDroneTarget, setSpyDroneTarget] = useState("");
          const [spyDroneResult, setSpyDroneResult] = useState(null);
          
          const [showMutinyModal, setShowMutinyModal] = useState(false);
          const [mutinyTarget, setMutinyTarget] = useState("");

          const [showSafetyModal, setShowSafetyModal] = useState(false);
          
          const [showImmunityStealModal, setShowImmunityStealModal] = useState(false);
          const [immunityStealTarget, setImmunityStealTarget] = useState("");

          const [showLegacyModal, setShowLegacyModal] = useState(false);
          const [legacyTarget, setLegacyTarget] = useState("");

          const [showCrystalBallModal, setShowCrystalBallModal] = useState(false);
          
          const [mySpeech, setMySpeech] = useState("");

          // --- FIX: FEEDBACK ISTANTANEO CACCIA AL TESORO ---
          const [claimingCrateId, setClaimingCrateId] = useState(null);

          // --- NUOVI STATI PER EREDITÀ OGGETTI ELIMINAZIONE ---
          const [bequeathTarget, setBequeathTarget] = useState("");

          // --- NUOVI STATI PER ABILITÀ FAZIONI ---
          const [specialSkillType, setSpecialSkillType] = useState(null); 
          const [specialSkillTargets, setSpecialSkillTargets] = useState([]);
          const [imbroglioResult, setImbroglioResult] = useState(null);
          
          const [popularitySelections, setPopularitySelections] = useState([]);
          const [nominationSelections, setNominationSelections] = useState([]);

          const [isProcessing, setIsProcessing] = useState(false);
          const processedAchievements = useRef(new Set()); // Riferimento per evitare conteggi doppi

          // --- SYNC STATISTICHE PERSONALI A FINE PARTITA ---
          useEffect(() => {
              if (lobby.rankings && myPlayer && user && db) {
                  const myRankings = lobby.rankings.filter(r => r.name === myPlayer.name);
                  // Usiamo localStorage per tracciare quante classifiche abbiamo già sincronizzato PER QUESTA LOBBY, 
                  // in modo da non ricaricarle se l'utente ricarica la pagina.
                  const syncedCountKey = `td_synced_stats_${lobbyId}`;
                  const syncedCount = parseInt(localStorage.getItem(syncedCountKey) || '0');
                  
                  if (myRankings.length > syncedCount) {
                      // Ci sono nuove classifiche (nuove stagioni finite o eliminazioni)
                      for (let i = syncedCount; i < myRankings.length; i++) {
                          const r = myRankings[i];
                          
                          // Calcolo EXP Guadagnata
                          const gainedExp = (r.episodesSurvived || 0) * 15 + 
                                            (r.immunities || 0) * 100 + 
                                            (r.team === 'WINNER' ? 500 : r.team === 'FINALIST' ? 200 : 0);

                          updatePersonalStats({
                              stagioniGiocate: 1,
                              stagioniVinte: r.team === 'WINNER' ? 1 : 0,
                              episodiSopravvissuti: r.episodesSurvived || 0,
                              immunitaVinte: r.immunities || 0,
                              votiRicevuti: r.votes || 0,
                              amicizie: r.friendships || 0,
                              exp: gainedExp
                          }, r.name);
                      }
                      localStorage.setItem(syncedCountKey, myRankings.length.toString());
                  }
              }
          }, [lobby.rankings, myPlayer, user, db, lobbyId, updatePersonalStats]);

          // --- TRACKING IDOLI TROVATI ---
          useEffect(() => {
              if (lobby.phase === 'idol_hunt' && lobby.idolData?.stage === 'reveal') {
                  const eventKey = `idol_reveal_${lobbyId}_${lobby.currentSeasonIndex}_${lobby.round}`;
                  if (!processedAchievements.current.has(eventKey)) {
                      const myCrate = lobby.idolData.crates.find(c => c.owner === user.uid);
                      if (myCrate) {
                          const item = lobby.idolData.itemDistribution[myCrate.id];
                          if (item === 'idol') {
                              updatePersonalStats({ idoliTrovati: 1, exp: 50 });
                          }
                      }
                      processedAchievements.current.add(eventKey);
                  }
              }
          }, [lobby.phase, lobby.idolData?.stage, lobbyId, lobby.currentSeasonIndex, lobby.round, user.uid, updatePersonalStats]);


          // --- RESET FEEDBACK ISTANTANEO ---
          useEffect(() => {
              if (lobby.phase !== 'idol_hunt' || lobby.idolData?.stage !== 'selection') {
                  setClaimingCrateId(null);
              }
          }, [lobby.phase, lobby.idolData?.stage]);

          // --- LOGICA IDENTIFICAZIONE GIOCATORI ELIMINATI CON OGGETTI (LIMBO) ---
          const pendingBequeathHumans = useMemo(() => {
              let uidsInLimbo = [];
              if (lobby.phase === 'ceremony' && lobby.ceremonyData?.finalReveal) {
                  const elims = lobby.ceremonyData.eliminated;
                  if (Array.isArray(elims)) uidsInLimbo = elims;
                  else if (elims) uidsInLimbo = [elims];
              } else if (lobby.phase === 'challenge' && lobby.challengeData?.type === 'sudden_death' && lobby.challengeData?.stage === 'finished') {
                  if (lobby.challengeData.loser) uidsInLimbo = [lobby.challengeData.loser];
              }

              return uidsInLimbo.filter(uid => {
                  const p = lobby.players.find(x => x.uid === uid);
                  if (!p || p.isBot) return false; // Solo umani
                  
                  const inv = lobby.idolData?.inventory;
                  if (!inv) return false;
                  
                  // Controlla se il giocatore ha almeno 1 oggetto in qualsiasi categoria
                  return Object.values(inv).some(category => (category[uid] || 0) > 0);
              });
          }, [lobby.phase, lobby.ceremonyData, lobby.challengeData, lobby.idolData, lobby.players]);

          const handleBequeathItems = async (targetUid) => {
              const updates = {};
              const invCategories = Object.keys(lobby.idolData.inventory);
              let itemsToTransfer = false;

              invCategories.forEach(cat => {
                  const amount = lobby.idolData.inventory[cat][user.uid] || 0;
                  if (amount > 0) {
                      itemsToTransfer = true;
                      updates[`idolData.inventory.${cat}.${user.uid}`] = 0; // Rimuove dall'eliminato
                      if (targetUid) {
                          updates[`idolData.inventory.${cat}.${targetUid}`] = increment(amount); // Aggiunge all'erede
                      }
                  }
              });

              if (itemsToTransfer) {
                  if (targetUid) {
                      updates.logs = arrayUnion(`👻 Un giocatore appena eliminato ha lasciato i suoi vantaggi in eredità a qualcuno, nel buio...`);
                  } else {
                      updates.logs = arrayUnion(`🔥 I vantaggi di un giocatore eliminato sono stati bruciati e perduti per sempre!`);
                  }
                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
              }
              setBequeathTarget("");
          };

          // --- PREVIENE BLOCCO HOST DURANTE SETUP STAGIONE IN CASO DI REFRESH ---
          useEffect(() => {
              if (isHost && lobby.phase === 'season_setup' && !nextSeasonConfig) {
                  const maxReturning = lobby.players.length;
                  const humanCount = lobby.players.filter(p => !p.isBot).length;
                  setNextSeasonConfig({
                      returningCount: Math.min(maxReturning, Math.max(2, humanCount)), 
                      numTeams: lobby.config.numTeams,
                      mergeSize: lobby.config.mergeSize || Math.floor(lobby.config.maxPlayers / 2)
                  });
              }
          }, [lobby.phase, isHost, nextSeasonConfig, lobby.players.length, lobby.config]);

          // --- FUNZIONE PER AGGIORNARE LE STATISTICHE GLOBALI ---
          const incrementActivePlayersStats = async (playersToCount) => {
              if (!isHost || !db) return;
              try {
                  const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_stats', 'character_usage');
                  let updateObj = {};
                  playersToCount.forEach(p => {
                      if (p.character?.name) {
                          updateObj[p.character.name] = increment(1);
                      }
                  });
                  if (Object.keys(updateObj).length > 0) {
                      await setDoc(statsRef, updateObj, { merge: true });
                  }
              } catch(e) { console.error("Errore update stats", e); }
          };

          // --- TRACKING ACHIEVEMENT: INELUTTABILE ---
          const zeroVoteStreak = useRef(0);

          useEffect(() => {
              if (!lobby || !user || !myPlayer) return;

              if (lobby.phase === 'ceremony' && lobby.ceremonyData?.finalReveal) {
                  const eventKey = `ineluttabile_${lobbyId}_${lobby.round}`;
                  if (processedAchievements.current.has(eventKey)) return;

                  if (isMerge && myPlayer.status === 'active') {
                      const myVotes = lobby.ceremonyData.voteCounts?.[user.uid] || 0;
                      if (myVotes === 0) {
                          zeroVoteStreak.current += 1;
                          setAchievementProgress('ineluttabile', zeroVoteStreak.current, 5);
                      } else {
                          zeroVoteStreak.current = 0;
                          setAchievementProgress('ineluttabile', 0, 5);
                      }
                  } else if (!isMerge) {
                      zeroVoteStreak.current = 0;
                      setAchievementProgress('ineluttabile', 0, 5);
                  }

                  // Non inseriamo eventKey nel Set globale qui, altrimenti blocca l'altro useEffect della cerimonia. 
                  // Usiamo un Set locale per questo specifico achievement
              }
          }, [lobby.phase, lobby.ceremonyData?.finalReveal, lobby.round, lobbyId, myPlayer, user.uid, setAchievementProgress, isMerge]);


          // --- TRACKING ACHIEVEMENT: SOPRAVVISSUTO (Tie-Breaker) ---
          const wasInTieBreak = useRef(false);

          useEffect(() => {
              if (lobby.phase === 'ceremony') {
                  // Segna se l'utente finisce in un tie-breaker
                  if (lobby.ceremonyData?.tieMatch?.candidates?.includes(user.uid)) {
                      wasInTieBreak.current = true;
                  }
                  
                  // Quando il falò finisce, controlla se era nel tie-break e non è stato eliminato
                  if (lobby.ceremonyData?.finalReveal && wasInTieBreak.current) {
                      const eliminated = Array.isArray(lobby.ceremonyData.eliminated) ? lobby.ceremonyData.eliminated : [lobby.ceremonyData.eliminated].filter(Boolean);
                      
                      if (!eliminated.includes(user.uid)) {
                          const eventKey = `sopravvissuto_${lobbyId}_${lobby.round}`;
                          if (!processedAchievements.current.has(eventKey)) {
                              updateAchievement('sopravvissuto', 1, 10);
                              processedAchievements.current.add(eventKey);
                          }
                      }
                      wasInTieBreak.current = false; // Reset per il prossimo
                  }
              } else {
                  wasInTieBreak.current = false;
              }
          }, [lobby.phase, lobby.ceremonyData, user.uid, lobbyId, updateAchievement]);

          // --- TRACKING ACHIEVEMENTS: CAMPIONE, VETERANO & MVP ---
          useEffect(() => {
              // Controlla se la stagione è finita (o il gioco intero) e se ci sono vincitori
              if ((lobby.phase === 'season_setup' || lobby.phase === 'game_over') && lobby.seasonWinners?.length > 0) {
                  // Usa l'indice della stagione come chiave per non contarlo 2 volte
                  const seasonIndex = lobby.phase === 'game_over' ? lobby.config.numSeasons - 1 : lobby.currentSeasonIndex - 1;
                  const eventKey = `vittoria_stats_${lobbyId}_stagione_${seasonIndex}`;
                  
                  if (!processedAchievements.current.has(eventKey)) {
                      // 1. Campione & Veterano & Titoli Personaggio
                      const lastWinnerName = lobby.seasonWinners[lobby.seasonWinners.length - 1];
                      if (myPlayer?.name === lastWinnerName) {
                          updateAchievement('campione', 1, 1);
                          updateAchievement('veterano', 1, 5);
                          if (myPlayer?.character?.name) {
                              updateAchievement(`title_${myPlayer.character.name}`, 1, 3);
                          }
                      }

                      // Achievement: Donne al Potere
                      if (FEMALES.includes(myPlayer?.character?.name)) {
                          updateAchievement('donnealpotere', 1, 25);
                      }

                      // 2. M.V.P. (Maggior numero di immunità)
                      const currentSeasonName = SEASON_CONFIG[seasonIndex]?.name;
                      // Filtra la classifica globale solo per i giocatori di questa stagione specifica
                      const currentSeasonRankings = lobby.rankings.filter(r => r.season === currentSeasonName);
                      
                      if (currentSeasonRankings.length > 0) {
                          let maxImmunities = 0;
                          // Trova il numero massimo di immunità
                          currentSeasonRankings.forEach(r => {
                              if ((r.immunities || 0) > maxImmunities) maxImmunities = r.immunities;
                          });

                          // Cerca le stats del giocatore umano in questa stagione
                          const myRanking = currentSeasonRankings.find(r => r.name === myPlayer?.name);
                          // Se esiste, se ha raggiunto il massimo e se il massimo è > 0 (per evitare che te lo dia se tutti hanno 0)
                          if (myRanking && (myRanking.immunities || 0) === maxImmunities && maxImmunities > 0) {
                              updateAchievement('mvp', 1, 2);
                          }
                      }

                      processedAchievements.current.add(eventKey);
                  }
              }
          }, [lobby.phase, lobby.seasonWinners, lobby.rankings, myPlayer?.name, lobbyId, lobby.currentSeasonIndex, lobby.config.numSeasons, updateAchievement]);

          // --- TRACKING ACHIEVEMENT: SPOTLIGHT ---
          useEffect(() => {
              if (lobby.phase === 'grand_finale_top6' && lobby.top6Data) {
                  const eventKey = `spotlight_top6_${lobbyId}`;
                  if (!processedAchievements.current.has(eventKey)) {
                      const isInTop6 = lobby.top6Data.players.some(p => p.name === myPlayer?.name);
                      if (isInTop6) {
                          updateAchievement('spotlight', 1, 2);
                      }
                      processedAchievements.current.add(eventKey);
                  }
              }
          }, [lobby.phase, lobby.top6Data, myPlayer?.name, lobbyId, updateAchievement]);

          // --- TRACKING ACHIEVEMENT: SCHIAPPA ---
          useEffect(() => {
              if (!lobby || !user || !myPlayer) return;

              // Caso 1: Eliminato al falò al Round 1
              if (lobby.phase === 'ceremony' && lobby.ceremonyData?.finalReveal && lobby.round === 1) {
                  const eliminated = Array.isArray(lobby.ceremonyData.eliminated) ? lobby.ceremonyData.eliminated : [lobby.ceremonyData.eliminated].filter(Boolean);
                  if (eliminated.includes(user.uid)) {
                      const eventKey = `schiappa_${lobbyId}_${lobby.currentSeasonIndex}`;
                      if (!processedAchievements.current.has(eventKey)) {
                          updateAchievement('schiappa', 1, 15);
                          processedAchievements.current.add(eventKey);
                      }
                  }
              }
              
              // Caso 2: Eliminato per Sudden Death al Round 1
              if (lobby.phase === 'challenge' && lobby.challengeData?.type === 'sudden_death' && lobby.challengeData?.stage === 'finished' && lobby.round === 1) {
                  if (lobby.challengeData.loser === user.uid) {
                      const eventKey = `schiappa_${lobbyId}_${lobby.currentSeasonIndex}`;
                      if (!processedAchievements.current.has(eventKey)) {
                          updateAchievement('schiappa', 1, 15);
                          processedAchievements.current.add(eventKey);
                      }
                  }
              }
          }, [lobby?.phase, lobby?.ceremonyData?.finalReveal, lobby?.challengeData?.stage, lobby?.round, lobbyId, lobby?.currentSeasonIndex, user?.uid, updateAchievement]);

          // --- TRACKING ACHIEVEMENT: PUGNALATORE & IDOLO ---
          useEffect(() => {
              if (!lobby || !user || !myPlayer) return;
              
              // Controlla se siamo alla fine della cerimonia (quando vengono rivelati gli eliminati)
              if (lobby.phase === 'ceremony' && lobby.ceremonyData?.finalReveal) {
                  // Crea una chiave unica per questo evento per evitare di contarlo 2 volte a causa dei re-render di React
                  const eventKey = `ceremony_achievements_${lobbyId}_${lobby.round}`;
                  if (processedAchievements.current.has(eventKey)) return;

                  // 1. Pugnalatore
                  const myVote = lobby.votes?.[user.uid];
                  const victims = Array.isArray(lobby.ceremonyData.eliminated) 
                      ? lobby.ceremonyData.eliminated 
                      : [lobby.ceremonyData.eliminated].filter(Boolean);

                  // Se io ho votato per la vittima, e la vittima è effettivamente uscita (non è stata salvata da idoli), 
                  // E la vittima faceva parte della MIA lista alleanze (prima che venisse sbattuta fuori)
                  if (myVote && victims.includes(myVote) && myPlayer.alliances?.includes(myVote)) {
                      updateAchievement('pugnalatore', 1, 5); // Aggiunge 1 al progresso (max 5)
                  }

                  // 2. Idolo ("Pensavi di esserti sbarazzato di me?")
                  if (lobby.ceremonyData.idolPlayedBy === user.uid) {
                      updateAchievement('idolo', 1, 1);
                  }
                  
                  processedAchievements.current.add(eventKey);
              }
          }, [lobby.phase, lobby.ceremonyData?.finalReveal, lobby.round, lobbyId, lobby.votes, myPlayer, user.uid, updateAchievement]);


          // Fix: Reset delle azioni al nuovo round sociale
          useEffect(() => {
              if (lobby.phase === 'social') {
                  setHasActed(false);
                  setSelectedPlayer(null); // FIX: Dimentica il giocatore del round precedente
                  setShowRumorSelector(false);
                  setShowTrioSelector(false);
                  
                  setSpecialSkillType(null);
                  setSpecialSkillTargets([]);
                  setImbroglioResult(null);
                  
                  // Reset di sicurezza per nascondere tutti gli altri modali aperti per sbaglio
                  setUseExtraVote(false);
                  setUseAdvantage(false);
                  setUseVoteSteal(false);
                  setVoteStealVictim("");
                  setShowSpyDroneModal(false);
                  setShowMutinyModal(false);
                  setShowSafetyModal(false);
                  setShowImmunityStealModal(false);
                  setShowLegacyModal(false);
                  setPopularitySelections([]);
                  setNominationSelections([]);
              }
          }, [lobby.phase, lobby.round]);

          const generateBotSocialUpdates = (currentPlayers, currentLogs) => {
                 let updatedPlayers = [...currentPlayers];
                 let newLogs = [...currentLogs];
                 const activeBots = updatedPlayers.filter(p => p.status === 'active' && p.isBot);
                 const activeHumans = updatedPlayers.filter(p => p.status === 'active' && !p.isBot);
                 
                 const isPopularity = lobby.config.theme === 'Popolarità';
                 
                 let botsToAct = [];
                 if (isPopularity) {
                     const villainBots = activeBots.filter(b => b.isSeasonVillain);
                     const normalBots = activeBots.filter(b => !b.isSeasonVillain);
                     normalBots.sort(() => Math.random() - 0.5);
                     // I villain OP agiscono sempre, gli altri riempiono i posti rimanenti fino a 8
                     botsToAct = [...villainBots, ...normalBots.slice(0, Math.max(0, 8 - villainBots.length))];
                 } else {
                     activeBots.sort(() => Math.random() - 0.5);
                     botsToAct = activeBots.slice(0, Math.min(4, activeBots.length));
                 }

                 let rumorBots = [];
                 const isHardcore = lobby.config.difficulty === 'Hardcore';
                 if (isHardcore && activeHumans.length > 0) {
                     const numRumorBots = Math.min(Math.floor(Math.random() * 2) + 1, botsToAct.length); // 1 o 2
                     rumorBots = botsToAct.slice(0, numRumorBots);
                 }

                 botsToAct.forEach(bot => {
                     const isSeasonVillain = bot.isSeasonVillain && isPopularity;

                     // 1. Azione esclusiva: Il Villain attacca un umano a ogni turno
                     if (isSeasonVillain && activeHumans.length > 0) {
                         const humanTarget = activeHumans[Math.floor(Math.random() * activeHumans.length)];
                         const possibleListeners = updatedPlayers.filter(p => p.status === 'active' && p.uid !== bot.uid && p.uid !== humanTarget.uid);
                         
                         if (possibleListeners.length > 0) {
                             const listener = possibleListeners[Math.floor(Math.random() * possibleListeners.length)];
                             const listenerIdx = updatedPlayers.findIndex(p => p.uid === listener.uid);
                             
                             const currentRel = updatedPlayers[listenerIdx].relationships[humanTarget.uid] || 0;
                             updatedPlayers[listenerIdx].relationships = {
                                 ...updatedPlayers[listenerIdx].relationships,
                                 [humanTarget.uid]: Math.max(-10, currentRel - 1) 
                             };
                             newLogs.push(`🦹 IL VILLAIN SEGRETO ${bot.name} ha messo zizzania! Ha manipolato ${listener.name} contro l'umano ${humanTarget.name}! (-1 relaz)`);
                         }
                     } 
                     // 2. Difficoltà Hardcore: Zizzania normale
                     else if (rumorBots.some(b => b.uid === bot.uid)) {
                         const humanTarget = activeHumans[Math.floor(Math.random() * activeHumans.length)];
                         const possibleListeners = updatedPlayers.filter(p => p.status === 'active' && p.uid !== bot.uid && p.uid !== humanTarget.uid);
                         
                         if (possibleListeners.length > 0) {
                             const listener = possibleListeners[Math.floor(Math.random() * possibleListeners.length)];
                             const listenerIdx = updatedPlayers.findIndex(p => p.uid === listener.uid);
                             
                             const currentRel = updatedPlayers[listenerIdx].relationships[humanTarget.uid] || 0;
                             updatedPlayers[listenerIdx].relationships = {
                                 ...updatedPlayers[listenerIdx].relationships,
                                 [humanTarget.uid]: Math.max(-10, currentRel - 2) 
                             };
                             newLogs.push(`🤖 ${bot.name} ha sparso cattive voci su ${humanTarget.name} con ${listener.name}! (-2 relaz)`);
                             return; 
                         }
                     }

                     const possibleTargets = updatedPlayers.filter(p => p.status === 'active' && p.uid !== bot.uid);
                     if (possibleTargets.length === 0) return;
                     const target = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
                     const actions = ['friend', 'suckup', 'rumor'];
                     const action = actions[Math.floor(Math.random() * actions.length)];

                     const targetIdx = updatedPlayers.findIndex(p => p.uid === target.uid);
                     const botIdx = updatedPlayers.findIndex(p => p.uid === bot.uid);

                     if (action === 'friend') {
                         if (isSeasonVillain || Math.random() > 0.5) { // Villain ha il 100% di chance
                             const newVal = Math.min(5, (updatedPlayers[targetIdx].relationships[bot.uid] || 0) + 1);
                             updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [bot.uid]: newVal };
                             
                             const newValBot = Math.min(5, (updatedPlayers[botIdx].relationships[target.uid] || 0) + 1);
                             updatedPlayers[botIdx].relationships = { ...updatedPlayers[botIdx].relationships, [target.uid]: newValBot };

                             newLogs.push(`🤖 ${bot.name} ha stretto amicizia con ${target.name}.`);
                         }
                     } else if (action === 'suckup' && Math.random() < 0.60) {
                         const newVal = Math.min(10, (updatedPlayers[targetIdx].relationships[bot.uid] || 0) + 2);
                         updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [bot.uid]: newVal };
                         
                         const newValBot = Math.min(10, (updatedPlayers[botIdx].relationships[target.uid] || 0) + 2);
                         updatedPlayers[botIdx].relationships = { ...updatedPlayers[botIdx].relationships, [target.uid]: newValBot };

                         newLogs.push(`🤖 ${bot.name} ha fatto il leccapiedi con ${target.name}.`);
                     } else if (action === 'rumor' && Math.random() > 0.5) {
                          const victim = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
                          if(victim.uid !== target.uid) {
                              const currentRel = updatedPlayers[targetIdx].relationships[victim.uid] || 0;
                              updatedPlayers[targetIdx].relationships = {
                                  ...updatedPlayers[targetIdx].relationships,
                                  [victim.uid]: Math.max(-5, currentRel - 1)
                              };
                              newLogs.push(`🤖 ${bot.name} ha messo zizzania tra ${target.name} e ${victim.name}.`);
                          }
                     }
                 });
                 return { updatedPlayers, newLogs };
          };

          const handleUseSpyDrone = async () => {
              if (!spyDroneTarget) return;
              const target = lobby.players.find(p => p.uid === spyDroneTarget);
              if (!target) return;
              
              // Mappa le relazioni in un array per facile consultazione
              const rels = Object.entries(target.relationships || {})
                  .filter(([uid]) => uid !== target.uid)
                  .map(([uid, val]) => ({
                      uid,
                      name: lobby.players.find(p => p.uid === uid)?.name || "Sconosciuto",
                      val
                  }))
                  .sort((a, b) => b.val - a.val); // Dal più alto al più basso
              
              // Fidanzato/a (relazione >= 11)
              const fidanzati = rels.filter(r => r.val >= 11).map(r => r.name);
              const fidanzatoStr = fidanzati.length > 0 ? fidanzati.join(", ") : "Nessuno";
              
              // Top 2 Migliori amici (relazione > 0 e < 11)
              const amici = rels.filter(r => r.val > 0 && r.val < 11).slice(0, 2).map(r => r.name);
              const amiciStr = amici.length > 0 ? amici.join(", ") : "Nessuno";
              
              // Peggior Nemico (relazione < 0)
              const nemici = rels.filter(r => r.val < 0);
              const peggiorNemicoStr = nemici.length > 0 ? nemici[nemici.length - 1].name : "Nessuno";
              
              // Nomi Alleanze Segrete
              const alleanzeNomi = (target.alliances || [])
                  .map(uid => lobby.players.find(p => p.uid === uid)?.name)
                  .filter(Boolean);
              const alleanzeStr = alleanzeNomi.length > 0 ? alleanzeNomi.join(", ") : "Nessuna";
              
              const resultString = `🎯 DATI DRONE SU ${target.name.toUpperCase()}:\n\n💍 Fidanzato/a:\n${fidanzatoStr}\n\n❤️ Top Amici:\n${amiciStr}\n\n💔 Peggior Nemico:\n${peggiorNemicoStr}\n\n🤝 Alleanze con:\n${alleanzeStr}`;
              
              setSpyDroneResult(resultString);
              updateAchievement('agente007', 1, 6);
              
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`idolData.inventory.spyDrones.${user.uid}`]: lobby.idolData.inventory.spyDrones[user.uid] - 1
              });
          };

          const handleUseMutiny = async () => {
              if (!mutinyTarget) return;
              const target = lobby.players.find(p => p.uid === mutinyTarget);
              if (!target) return;
              
              const myTeam = myPlayer.team;
              const targetTeam = target.team;
              
              const updatedPlayers = lobby.players.map(p => {
                  if (p.uid === user.uid) return { ...p, team: targetTeam };
                  if (p.uid === target.uid) return { ...p, team: myTeam };
                  return p;
              });
              
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  players: updatedPlayers,
                  [`idolData.inventory.mutinies.${user.uid}`]: lobby.idolData.inventory.mutinies[user.uid] - 1,
                  logs: arrayUnion(`🔄 COLPO DI SCENA! ${myPlayer.name} ha usato l'Ammutinamento scambiando di squadra con ${target.name}!`)
              });
              
              setShowMutinyModal(false);
          };

          const handleUseSafety = async () => {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`idolData.inventory.safeties.${user.uid}`]: lobby.idolData.inventory.safeties[user.uid] - 1,
                  [`idolData.activeEffects.safetyUsedRound`]: lobby.round,
                  [`idolData.activeEffects.safetyHolder`]: user.uid,
                  logs: arrayUnion(`🚪 COLPO DI SCENA! ${myPlayer.name} ha usato il Salvacondotto! Abbandona la cerimonia di oggi e diventa intoccabile.`)
              });
              setShowSafetyModal(false);
          };

          const handleUseImmunitySteal = async () => {
              if (!immunityStealTarget) return;
              const target = lobby.players.find(p => p.uid === immunityStealTarget);
              if (!target) return;

              updateAchievement('ladrodipalcoscenico', 1, 10);

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`immunity`]: [user.uid],
                  [`idolData.inventory.immunitySteals.${user.uid}`]: lobby.idolData.inventory.immunitySteals[user.uid] - 1,
                  logs: arrayUnion(`📿 LADRO DI COLLANE! ${myPlayer.name} ha rubato l'immunità dal collo di ${target.name}!`)
              });
              setShowImmunityStealModal(false);
          };

          const handleUseLegacy = async () => {
              if (!legacyTarget) return;
              playSound('success');
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`idolData.inventory.legacies.${user.uid}`]: lobby.idolData.inventory.legacies[user.uid] - 1,
                  [`idolData.activeEffects.legacyDesignations.${user.uid}`]: legacyTarget,
                  logs: arrayUnion(`📜 ${myPlayer.name} ha compilato il suo Testamento in segreto...`)
              });
              setShowLegacyModal(false);
              setLegacyTarget("");
          };

          const handleActivateCrystalBall = async () => {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`idolData.inventory.crystalBalls.${user.uid}`]: lobby.idolData.inventory.crystalBalls[user.uid] - 1,
                  [`idolData.activeEffects.crystalBallActive_${user.uid}`]: lobby.round,
                  logs: arrayUnion(`🔮 Un misterioso bagliore avvolge la cabina elettorale... Qualcuno sta leggendo il futuro nell'urna!`)
              });
          };

          const submitJuryVote = async (finalistId) => {
              if (lobby.phase !== 'jury_vote' || lobby.juryData?.stage !== 'voting') return;
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`juryData.votes.${user.uid}`]: finalistId
              });
          };

          const submitFinalSpeech = async () => {
              if (!mySpeech.trim() || lobby.phase !== 'jury_speeches') return;
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`juryData.speeches.${user.uid}`]: mySpeech.trim(),
                  logs: arrayUnion(`🎤 ${myPlayer.name} ha fatto il suo discorso finale!`)
              });
          };

          const submitPurgeChoice = async (chosenTargetId) => {
              if (lobby.phase !== 'challenge' || lobby.challengeData?.stage !== 'purge_selection') return;
              
              const deciderPlayer = lobby.players.find(p => p.uid === lobby.challengeData.decider);
              const chosenTarget = lobby.players.find(p => p.uid === chosenTargetId);
              
              const finalTargets = [...new Set([...lobby.challengeData.autoTargets, chosenTargetId])];
              const targetNames = finalTargets.map(id => lobby.players.find(p => p.uid === id)?.name).join(", ");
              const winnerName = deciderPlayer.name;

              let updatedPlayersTemp = lobby.players.map(p => {
                   if (lobby.challengeData.winner.includes(p.uid)) return { ...p, immunityWins: (p.immunityWins || 0) + 1 };
                   return p;
              });

              let logsToAdd = [
                   `${winnerName} VINCE L'IMMUNITÀ!`,
                   `🎯 ${winnerName.toUpperCase()} HA SCELTO DI CONDANNARE ${chosenTarget.name.toUpperCase()}!`,
                   `⚠️ I bersagli finali sono ${targetNames}. SOLO LORO POTRANNO ESSERE VOTATI AL FALÒ!`
              ];

              if (chosenTarget && chosenTarget.isBot && Math.random() < 0.30) {
                  const targetIdx = updatedPlayersTemp.findIndex(p => p.uid === chosenTargetId);
                  const currentRel = updatedPlayersTemp[targetIdx].relationships[deciderPlayer.uid] || 0;
                  updatedPlayersTemp[targetIdx].relationships = {
                      ...updatedPlayersTemp[targetIdx].relationships,
                      [deciderPlayer.uid]: Math.max(-10, currentRel - 1)
                  };
                  logsToAdd.push(`💢 ${chosenTarget.name} se l'è presa per essere stato mandato a rischio da ${deciderPlayer.name}! (-1 Relaz)`);
                  
                  if (lobby.challengeData.decider === user.uid) {
                      updateAchievement('tiseioffeso', 1, 15);
                  }
              }

              const { updatedPlayers, newLogs } = generateBotSocialUpdates(updatedPlayersTemp, logsToAdd);

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                   players: updatedPlayers,
                   [`challengeData.stage`]: 'finished',
                   immunity: lobby.challengeData.winner,
                   losingTeam: "MERGE",
                   readyPlayers: [], 
                   phase: 'social',
                   twistData: { type: 'purge', targets: finalTargets },
                   logs: arrayUnion(...newLogs)
              });
          };

          // Funzione per proporre l'annullamento
          const startEndVote = async () => {
              if (myPlayer?.hasCalledEndVote) return;
              
              // Segna che il giocatore ha usato il suo singolo tentativo
              const updatedPlayers = lobby.players.map(p => p.uid === user.uid ? { ...p, hasCalledEndVote: true } : p);
              
              // Inizializza la votazione nel database
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  players: updatedPlayers,
                  endVote: { active: true, yesVotes: 0, noVotes: 0, voters: [] },
                  logs: arrayUnion(`🛑 ${myPlayer.name} ha proposto di ANNULLARE LA PARTITA. È in corso una votazione tra i giocatori umani.`)
              });
          };

          // Funzione per esprimere il proprio voto
          const castEndVote = async (isYes) => {
              const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId);
              try {
                  await runTransaction(db, async (transaction) => {
                      const snap = await transaction.get(lobbyRef);
                      if (!snap.exists()) return;
                      const data = snap.data();
                      
                      // Controlli di sicurezza
                      if (!data.endVote?.active || data.endVote.voters.includes(user.uid)) return;

                      // Calcola i nuovi voti
                      const newYes = data.endVote.yesVotes + (isYes ? 1 : 0);
                      const newNo = data.endVote.noVotes + (!isYes ? 1 : 0);
                      const newVoters = [...data.endVote.voters, user.uid];

                      // Calcola la maggioranza (solo sui giocatori UMANI)
                      const humanCount = data.players.filter(p => !p.isBot).length;
                      const majority = Math.floor(humanCount / 2) + 1;

                      let updates = {
                          'endVote.yesVotes': newYes,
                          'endVote.noVotes': newNo,
                          'endVote.voters': newVoters
                      };

                      // Se vince il SÌ (maggioranza raggiunta)
                      if (newYes >= majority) {
                          updates.phase = 'game_over'; // Termina la partita
                          updates.endVote = null;      // Chiude la votazione
                          updates.logs = arrayUnion(`🛑 LA PARTITA È STATA TERMINATA ANTICIPATAMENTE TRAMITE VOTAZIONE!`);
                      } 
                      // Se vince il NO o hanno votato tutti senza raggiungere maggioranza
                      else if (newNo >= majority || newVoters.length >= humanCount) {
                          updates.endVote = null;      // Chiude la votazione 
                          updates.logs = arrayUnion(`❌ La votazione per annullare la partita è stata respinta.`);
                      }

                      // Esegue l'aggiornamento in sicurezza tramite transazione
                      transaction.update(lobbyRef, updates);
                  });
              } catch(e) { console.error("Vote error:", e); }
          };

          useEffect(() => {
            if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
          }, [lobby.chat]);

          // --- IDOL HUNT BOT LOGIC ---
          useEffect(() => {
              if (!isHost || lobby.phase !== 'idol_hunt' || !lobby.idolData || lobby.idolData.stage !== 'selection') return;

              const bots = lobby.players.filter(p => p.isBot);
              const unchosenBots = bots.filter(b => !lobby.idolData.crates.some(c => c.owner === b.uid));
              
              if (unchosenBots.length > 0) {
                  // Velocizza i bot in base al numero di giocatori per non far annoiare l'Host
                  let baseDelay = 800;
                  let randDelay = 500;
                  if (lobby.players.length >= 60) { baseDelay = 50; randDelay = 50; } // Velocissimi (circa 10 casse al secondo)
                  else if (lobby.players.length >= 30) { baseDelay = 200; randDelay = 100; } // Molto veloci
                  else if (lobby.players.length >= 15) { baseDelay = 400; randDelay = 200; } // Normali

                  const timer = setTimeout(async () => {
                      // FIX: Usare runTransaction anche per i bot per evitare la Race Condition con l'host/giocatore umano
                      const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId);
                      
                      try {
                          await runTransaction(db, async (transaction) => {
                              const snap = await transaction.get(lobbyRef);
                              if (!snap.exists()) return;
                              const latestLobby = snap.data();
                              
                              const latestAvailable = latestLobby.idolData.crates.filter(c => c.owner === null);
                              const latestUnchosenBots = latestLobby.players.filter(p => p.isBot && !latestLobby.idolData.crates.some(c => c.owner === p.uid));
                              
                              if (latestAvailable.length > 0 && latestUnchosenBots.length > 0) {
                                  const botToAct = latestUnchosenBots[0];
                                  const randomCrate = latestAvailable[Math.floor(Math.random() * latestAvailable.length)];
                                  
                                  const newCrates = latestLobby.idolData.crates.map(c => 
                                      c.id === randomCrate.id ? { ...c, owner: botToAct.uid } : c
                                  );

                                  const allTaken = newCrates.every(c => c.owner !== null);
                                  let updates = { [`idolData.crates`]: newCrates };
                                  
                                  if (allTaken) {
                                      updates[`idolData.stage`] = 'reveal';
                                      
                                      let inventory = { idols: {}, extraVotes: {}, advantages: {}, voteSteals: {}, spyDrones: {}, mutinies: {}, safeties: {}, immunitySteals: {}, legacies: {}, crystalBalls: {} };
                                      
                                      newCrates.forEach(c => {
                                          const item = latestLobby.idolData.itemDistribution[c.id];
                                          if (item && c.owner) {
                                              if (item === 'spyDrone') {
                                                  inventory.spyDrones[c.owner] = (inventory.spyDrones[c.owner] || 0) + 3;
                                              } else if (item === 'crystalBall') {
                                                  inventory.crystalBalls[c.owner] = (inventory.crystalBalls[c.owner] || 0) + 3;
                                              } else if (item === 'safety') {
                                                  inventory.safeties[c.owner] = (inventory.safeties[c.owner] || 0) + 1;
                                              } else if (item === 'mutiny') {
                                                  inventory.mutinies[c.owner] = (inventory.mutinies[c.owner] || 0) + 1;
                                              } else if (item === 'legacy') {
                                                  inventory.legacies[c.owner] = (inventory.legacies[c.owner] || 0) + 1;
                                              } else {
                                                  const key = item + 's';
                                                  inventory[key][c.owner] = (inventory[key][c.owner] || 0) + 1;
                                              }
                                          }
                                      });
                                      
                                      updates[`idolData.inventory`] = inventory;
                                      if (!latestLobby.idolData.activeEffects) updates[`idolData.activeEffects`] = { legacyDesignations: {} };
                                      updates[`logs`] = arrayUnion("Tutte le casse sono state assegnate! Apertura in corso...");
                                  }

                                  transaction.update(lobbyRef, updates);
                              }
                          });
                      } catch(e) { console.log("Errore bot crate:", e); }
                  }, baseDelay + Math.random() * randDelay); // Ritardo dinamico in base all'affollamento
                  return () => clearTimeout(timer);
              }
          }, [lobby.idolData, isHost]);


          // SEQUENTIAL DICE ANIMATION E RISOLUZIONE
          useEffect(() => {
            if (!isHost || lobby.phase !== 'challenge' || !lobby.challengeData || lobby.challengeData.stage !== 'rolling') return;
            
            // Ignora questa logica se è una sfida di popolarità
            if (lobby.challengeData.type === 'popularity_vote') return;

            const { rollingIndex, players: rollPlayers, rolls } = lobby.challengeData;
            
            // --- CALCOLO VINCITORI A FINE GIRI ---
            if (rollingIndex >= rollPlayers.length) {
                 
                 // --- LOGICA SUDDEN DEATH (ELIMINAZIONE DIRETTA) ---
                 if (lobby.challengeData.type === 'sudden_death') {
                    let minRoll = 999;
                    let losers = [];
                    Object.entries(rolls).forEach(([uid, r]) => {
                        if (r < minRoll) { minRoll = r; losers = [uid]; }
                        else if (r === minRoll) { losers.push(uid); }
                    });

                    if (losers.length > 1) {
                         const loserNames = losers.map(w => lobby.players.find(p => p.uid === w)?.name).join(", ");
                         updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                             [`challengeData.players`]: losers,
                             [`challengeData.rollingIndex`]: 0,
                             [`challengeData.rolls`]: {},
                             logs: arrayUnion(`PAREGGIO PER L'ELIMINAZIONE (${minRoll})! Spareggio tra: ${loserNames}`)
                         });
                    } else {
                         const victimId = losers[0];
                         const victim = lobby.players.find(p => p.uid === victimId);
                         
                         // Modifica: Invece di eliminare subito, mostriamo a schermo la sconfitta
                         updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                             [`challengeData.stage`]: 'finished',
                             [`challengeData.loser`]: victimId,
                             logs: arrayUnion(`Sfida Terminata! ${victim.name} ha fatto il punteggio più basso (${minRoll}) ed è a rischio eliminazione!`)
                         });
                    }
                    return;
                 }

                 // --- LOGICA SFIDA A SQUADRE ---
                 if (lobby.challengeData.type === 'team') {
                     const teamScores = {};
                     const teams = lobby.challengeData.teams;

                     Object.entries(rolls).forEach(([uid, r]) => {
                         const team = teams[uid];
                         if (team) {
                             teamScores[team] = (teamScores[team] || 0) + r;
                         }
                     });

                     let maxScore = -1;
                     let winningTeams = [];
                     Object.entries(teamScores).forEach(([team, score]) => {
                         if (score > maxScore) { maxScore = score; winningTeams = [team]; }
                         else if (score === maxScore) { winningTeams.push(team); }
                     });

                     const winnerTeam = winningTeams[Math.floor(Math.random() * winningTeams.length)];

                     const immunePlayers = Object.keys(teams).filter(uid => teams[uid] === winnerTeam);
                     
                     const winMsg = `La Squadra ${winnerTeam === 'A' ? 'ROSSA' : 'BLU'} vince la sfida a squadre! (${teamScores[winnerTeam]} vs ${teamScores[winnerTeam === 'A' ? 'B' : 'A']})`;
                     
                     const { updatedPlayers, newLogs } = generateBotSocialUpdates(lobby.players, [winMsg]);

                     updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                         players: updatedPlayers,
                         [`challengeData.stage`]: 'finished',
                         [`challengeData.winner`]: immunePlayers,
                         immunity: immunePlayers,
                         losingTeam: "MERGE",
                         readyPlayers: [], 
                         phase: 'social',
                         logs: arrayUnion(...newLogs)
                     });
                     return;
                 }

                 // --- LOGICA SFIDA A COPPIE ---
                 if (lobby.challengeData.type === 'pairs') {
                     const teamScores = {};
                     const teams = lobby.challengeData.teams;

                     Object.entries(rolls).forEach(([uid, r]) => {
                         const team = teams[uid];
                         if (team) {
                             teamScores[team] = (teamScores[team] || 0) + r;
                         }
                     });

                     let minScore = 999999;
                     let losingTeams = [];
                     let maxScore = -1;
                     let winningTeams = [];

                     Object.entries(teamScores).forEach(([team, score]) => {
                         if (score < minScore) { minScore = score; losingTeams = [team]; }
                         else if (score === minScore) { losingTeams.push(team); }

                         if (score > maxScore) { maxScore = score; winningTeams = [team]; }
                         else if (score === maxScore) { winningTeams.push(team); }
                     });

                     const loserTeam = losingTeams[Math.floor(Math.random() * losingTeams.length)];
                     const winnerTeam = winningTeams[Math.floor(Math.random() * winningTeams.length)];

                     const atRiskPlayers = Object.keys(teams).filter(uid => teams[uid] === loserTeam);
                     const winnerTeamPlayers = Object.keys(teams).filter(uid => teams[uid] === winnerTeam);
                     
                     let decider = winnerTeamPlayers[0];
                     let bestRoll = -1;
                     winnerTeamPlayers.forEach(uid => {
                         if (rolls[uid] > bestRoll) { bestRoll = rolls[uid]; decider = uid; }
                     });

                     updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                         [`challengeData.stage`]: 'purge_selection',
                         [`challengeData.winner`]: winnerTeamPlayers,
                         [`challengeData.decider`]: decider,
                         [`challengeData.autoTargets`]: atRiskPlayers,
                         [`challengeData.targetRiskCount`]: atRiskPlayers.length + 1,
                         logs: arrayUnion(`I dadi sono tratti! La ${loserTeam.toUpperCase()} ha fatto il punteggio più basso ed è a rischio! Ma la ${winnerTeam.toUpperCase()} vince, e ${lobby.players.find(p=>p.uid===decider).name} dovrà scegliere un bersaglio extra!`)
                     });
                     return;
                 }

                 // --- LOGICA PURGE (LA NOTTE DEL GIUDIZIO) ---
                 if (lobby.challengeData.type === 'purge') {
                     let maxRoll = -1;
                     let winners = [];
                     Object.entries(rolls).forEach(([uid, r]) => {
                         if (r > maxRoll) { maxRoll = r; winners = [uid]; }
                         else if (r === maxRoll) { winners.push(uid); }
                     });

                     if (winners.length > 1) {
                         const winnerNames = winners.map(w => lobby.players.find(p => p.uid === w)?.name).join(", ");
                         
                         updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                             [`challengeData.players`]: winners,
                             [`challengeData.rollingIndex`]: 0,
                             [`challengeData.originalRolls`]: lobby.challengeData.originalRolls || rolls, // FIX: Salviamo i tiri originali prima di azzerarli per lo spareggio!
                             [`challengeData.rolls`]: {},
                             logs: arrayUnion(`PAREGGIO (${maxRoll})! Spareggio per l'immunità tra: ${winnerNames}`)
                         });
                         return;
                     }

                     // FIX: Usiamo i tiri originali di tutti per trovare i peggiori, non i tiri dello spareggio
                     const finalRollsForTargets = lobby.challengeData.originalRolls || rolls;

                     const activeCount = lobby.players.filter(p => p.status === 'active').length;
                     let targetRiskCount = 2;
                     if (activeCount > 30) targetRiskCount = 5;
                     else if (activeCount > 20) targetRiskCount = 4;
                     else if (activeCount > 6) targetRiskCount = 3;
                     
                     const autoRiskCount = targetRiskCount - 1; // N-1 scelti dai dadi

                     const sortedScores = Object.entries(finalRollsForTargets).sort((a, b) => a[1] - b[1]);
                     const uniqueScores = [...new Set(sortedScores.map(e => e[1]))];
                     
                     let autoTargets = [];
                     for (let score of uniqueScores) {
                         if (autoTargets.length >= autoRiskCount) break;
                         const rollers = sortedScores.filter(e => e[1] === score).map(e => e[0]);
                         autoTargets.push(...rollers);
                     }

                     autoTargets = autoTargets.filter(id => !winners.includes(id));
                     if (autoTargets.length === 0) autoTargets = [sortedScores[0][0]]; 

                     updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
