                         [`challengeData.stage`]: 'purge_selection',
                         [`challengeData.winner`]: winners,
                         [`challengeData.decider`]: winners[0], // Il primo vincitore decide
                         [`challengeData.autoTargets`]: autoTargets,
                         [`challengeData.targetRiskCount`]: targetRiskCount,
                         logs: arrayUnion(`I dadi sono tratti! ${lobby.players.find(p=>p.uid===winners[0]).name} ha il punteggio più alto e sceglierà l'ultimo bersaglio!`)
                     });
                     return;
                 }

                 // --- LOGICA INDIVIDUALE STANDARD ---
                 let maxRoll = -1;
                 let winners = [];
                 Object.entries(rolls).forEach(([uid, r]) => {
                     if (r > maxRoll) { maxRoll = r; winners = [uid]; }
                     else if (r === maxRoll) { winners.push(uid); }
                 });

                 if (winners.length > 1) {
                     const winnerNames = winners.map(w => lobby.players.find(p => p.uid === w)?.name).join(", ");
                     
                     updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                         [`challengeData.players`]: winners,
                         [`challengeData.rollingIndex`]: 0,
                         [`challengeData.rolls`]: {},
                         logs: arrayUnion(`PAREGGIO (${maxRoll})! Spareggio per l'immunità tra: ${winnerNames}`)
                     });
                     return;
                 }

                 const winnerId = winners[0];
                 const winnerName = lobby.players.find(p => p.uid === winnerId)?.name;

                 const updatedPlayersTemp = lobby.players.map(p => {
                     if (p.uid === winnerId) {
                         return { ...p, immunityWins: (p.immunityWins || 0) + 1 };
                     }
                     return p;
                 });
                 
                 const { updatedPlayers, newLogs } = generateBotSocialUpdates(updatedPlayersTemp, [`${winnerName} VINCE L'IMMUNITÀ con ${maxRoll}!`]);

                 updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                     players: updatedPlayers,
                     [`challengeData.stage`]: 'finished',
                     [`challengeData.winner`]: winners,
                     immunity: winners,
                     losingTeam: "MERGE",
                     readyPlayers: [], 
                     phase: 'social',
                     logs: arrayUnion(...newLogs)
                 });
                 return;
            }

            const currentPlayerId = rollPlayers[rollingIndex];
            const playerObj = lobby.players.find(p => p.uid === currentPlayerId);

            if (playerObj?.isBot) {
                // ANTI-LAG MIGLIORATO: Calcola il ritardo sui giocatori ancora in gara (rollPlayers), non sul totale della lobby!
                let rollDelay = 800; // 0.8 secondi: tempo perfetto per leggere chi tira durante il merge
                if (rollPlayers.length > 30) rollDelay = 100; // Molto veloce per l'inizio di partite gigantesche
                else if (rollPlayers.length > 15) rollDelay = 300; // Medio-veloce per la fase pre-merge
                
                const timer = setTimeout(async () => {
                    playSound('roll');
                    const maxFaces = lobby.config.theme === 'La Notte del Giudizio' ? 13 : 10;
                    let roll = Math.floor(Math.random() * maxFaces) + 1;
                    if (playerObj.nextRollNerf) {
                        roll = Math.floor(Math.random() * 4) + 1; 
                    }
                    
                    const updatedRolls = { ...rolls, [currentPlayerId]: roll };
                    
                    const updatedPlayers = lobby.players.map(p => 
                        p.uid === currentPlayerId ? { ...p, diceRoll: roll, nextRollNerf: false } : p
                    );
                    
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                        [`challengeData.rolls`]: updatedRolls,
                        [`challengeData.rollingIndex`]: rollingIndex + 1,
                        [`players`]: updatedPlayers
                    });
                }, rollDelay);
                return () => clearTimeout(timer);
            }
          }, [lobby.challengeData, isHost]);

          // --- BOT POPULARITY VOTE LOGIC ---
          useEffect(() => {
              if (!isHost || lobby.phase !== 'challenge' || lobby.challengeData?.type !== 'popularity_vote' || lobby.challengeData?.stage !== 'voting') return;
              
              const bots = lobby.players.filter(p => p.status === 'active' && p.isBot);
              const currentVotes = lobby.challengeData.votes || {};
              const botsThatNeedToVote = bots.filter(b => !currentVotes[b.uid]);
              
              // ANTI-LAG: Calcola tutti i voti dei bot localmente e invia UN SINGOLO aggiornamento al database
              if (botsThatNeedToVote.length > 0) {
                  const timer = setTimeout(async () => {
                      let newVotes = { ...currentVotes };
                      
                      botsThatNeedToVote.forEach(bot => {
                          let validTargets = lobby.players.filter(p => p.status === 'active' && p.uid !== bot.uid);
                          
                          validTargets.sort(() => Math.random() - 0.5);
                          validTargets.sort((a, b) => (bot.relationships[b.uid] || 0) - (bot.relationships[a.uid] || 0));
                          
                          newVotes[bot.uid] = validTargets.slice(0, 2).map(p => p.uid);
                      });
                      
                      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                          [`challengeData.votes`]: newVotes
                      });
                  }, 3000); // Unica attesa di 3 secondi per dare l'illusione che stiano pensando
                  return () => clearTimeout(timer);
              }
          }, [lobby.challengeData, isHost]);

          // --- BOT PURGE SELECTION LOGIC ---
          useEffect(() => {
              if (!isHost || lobby.phase !== 'challenge' || lobby.challengeData?.stage !== 'purge_selection') return;
              
              const deciderId = lobby.challengeData.decider;
              const deciderPlayer = lobby.players.find(p => p.uid === deciderId);
              
              if (deciderPlayer?.isBot && !lobby.challengeData.pendingWinnerChoiceResolved) {
                  const timer = setTimeout(async () => {
                      const { autoTargets, winner } = lobby.challengeData;
                      
                      let validTargets = lobby.players.filter(p => 
                          p.status === 'active' && 
                          !autoTargets.includes(p.uid) && 
                          !winner.includes(p.uid)
                      );
                      
                      // Fallback se tutti gli altri sono immuni o auto-bersagli (rarissimo)
                      if (validTargets.length === 0) validTargets = lobby.players.filter(p => p.status === 'active' && !winner.includes(p.uid));
                      
                      // FIX: Mescoliamo i bersagli prima di ordinarli, così in caso di pareggio (es. amicizia 0 con tutti) sceglie a caso!
                      validTargets.sort(() => Math.random() - 0.5);
                      
                      // Il bot sceglie la persona con la relazione più bassa
                      validTargets.sort((a, b) => (deciderPlayer.relationships[a.uid] || 0) - (deciderPlayer.relationships[b.uid] || 0));
                      const chosenTarget = validTargets[0];
                      
                      const finalTargets = [...new Set([...autoTargets, chosenTarget.uid])];
                      const winnerName = deciderPlayer.name;
                      const targetNames = finalTargets.map(id => lobby.players.find(p => p.uid === id)?.name).join(", ");

                      let updatedPlayersTemp = lobby.players.map(p => {
                           if (winner.includes(p.uid)) return { ...p, immunityWins: (p.immunityWins || 0) + 1 };
                           return p;
                      });

                      let logsToAdd = [
                           `${winnerName} VINCE L'IMMUNITÀ!`,
                           `🎯 ${winnerName.toUpperCase()} HA SCELTO DI CONDANNARE ${chosenTarget.name.toUpperCase()}!`,
                           `⚠️ I bersagli finali sono ${targetNames}. SOLO LORO POTRANNO ESSERE VOTATI AL FALÒ!`
                      ];

                      if (chosenTarget && chosenTarget.isBot && Math.random() < 0.30) {
                          const targetIdx = updatedPlayersTemp.findIndex(p => p.uid === chosenTarget.uid);
                          const currentRel = updatedPlayersTemp[targetIdx].relationships[deciderPlayer.uid] || 0;
                          updatedPlayersTemp[targetIdx].relationships = {
                              ...updatedPlayersTemp[targetIdx].relationships,
                              [deciderPlayer.uid]: Math.max(-10, currentRel - 1)
                          };
                          logsToAdd.push(`💢 ${chosenTarget.name} se l'è presa per essere stato mandato a rischio da ${deciderPlayer.name}! (-1 Relaz)`);
                      }

                      const { updatedPlayers, newLogs } = generateBotSocialUpdates(updatedPlayersTemp, logsToAdd);

                      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                           players: updatedPlayers,
                           [`challengeData.stage`]: 'finished',
                           [`challengeData.pendingWinnerChoiceResolved`]: true,
                           immunity: winner,
                           losingTeam: "MERGE",
                           readyPlayers: [], 
                           phase: 'social',
                           twistData: { type: 'purge', targets: finalTargets },
                           logs: arrayUnion(...newLogs)
                      });

                  }, 3000 + Math.random() * 2000);
                  return () => clearTimeout(timer);
              }
          }, [lobby.challengeData, isHost, lobby.phase]);

          // --- BOT POPULARITY NOMINATION LOGIC ---
          useEffect(() => {
              if (!isHost || lobby.phase !== 'challenge' || lobby.challengeData?.stage !== 'nomination' || lobby.challengeData?.type !== 'popularity_vote') return;

              const deciderId = lobby.challengeData.decider;
              const deciderPlayer = lobby.players.find(p => p.uid === deciderId);

              if (deciderPlayer?.isBot && !lobby.challengeData.pendingNominationResolved) {
                  const timer = setTimeout(async () => {
                      let validTargets = lobby.players.filter(p => p.status === 'active' && !lobby.challengeData.winner.includes(p.uid));

                      // Mescola prima per casualità nei pareggi, poi ordina per relazione più bassa
                      validTargets.sort(() => Math.random() - 0.5);
                      validTargets.sort((a, b) => (deciderPlayer.relationships[a.uid] || 0) - (deciderPlayer.relationships[b.uid] || 0));

                      const activeCount = lobby.players.filter(p => p.status === 'active').length;
                      let targetNumToPick = 2;
                      if (activeCount >= 60) targetNumToPick = 10;
                      else if (activeCount >= 40) targetNumToPick = 8;
                      else if (activeCount >= 30) targetNumToPick = 6;
                      else if (activeCount >= 18) targetNumToPick = 5;
                      else if (activeCount >= 10) targetNumToPick = 4;
                      else if (activeCount >= 6) targetNumToPick = 3;

                      const numToPick = Math.min(targetNumToPick, validTargets.length);
                      const chosenTargets = validTargets.slice(0, numToPick).map(p => p.uid);
                      const targetNames = chosenTargets.map(id => lobby.players.find(p => p.uid === id)?.name).join(", ");

                      let updatedPlayers = [...lobby.players];
                      let logsToAdd = [`🎯 COLPO DI SCENA! ${deciderPlayer.name.toUpperCase()} HA SCELTO I BERSAGLI! Solo ${targetNames} potranno essere votati stasera!`];

                      chosenTargets.forEach(targetId => {
                          const targetPlayer = updatedPlayers.find(p => p.uid === targetId);
                          if (targetPlayer && targetPlayer.isBot && Math.random() < 0.30) {
                              const targetIdx = updatedPlayers.findIndex(p => p.uid === targetId);
                              const currentRel = updatedPlayers[targetIdx].relationships[deciderPlayer.uid] || 0;
                              updatedPlayers[targetIdx].relationships = {
                                  ...updatedPlayers[targetIdx].relationships,
                                  [deciderPlayer.uid]: Math.max(-10, currentRel - 1)
                              };
                              logsToAdd.push(`💢 ${targetPlayer.name} se l'è presa per essere stato mandato a rischio da ${deciderPlayer.name}! (-1 Relaz)`);
                          }
                      });

                      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                          players: updatedPlayers,
                          [`challengeData.stage`]: 'finished',
                          [`challengeData.pendingNominationResolved`]: true,
                          readyPlayers: [],
                          phase: 'social',
                          twistData: { type: 'purge', targets: chosenTargets }, // Riutilizza la logica della Purga per limitare i voti!
                          logs: arrayUnion(...logsToAdd)
                      });
                  }, 3000 + Math.random() * 2000);
                  return () => clearTimeout(timer);
              }
          }, [lobby.challengeData, isHost, lobby.phase]);

          // --- BOT FINAL SPEECH LOGIC ---
          useEffect(() => {
              if (!isHost || lobby.phase !== 'jury_speeches' || !lobby.juryData) return;
              const jd = lobby.juryData;
              const finalists = [jd.finalist1, jd.finalist2];

              finalists.forEach(fid => {
                  const p = lobby.players.find(x => x.uid === fid);
                  if (p && p.isBot && !jd.speeches?.[fid]) {
                      const timer = setTimeout(async () => {
                          const charSpeeches = p.character.speeches || DEFAULT_SPEECHES;
                          const speech = charSpeeches[Math.floor(Math.random() * charSpeeches.length)];

                          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                              [`juryData.speeches.${fid}`]: speech,
                              logs: arrayUnion(`🎤 ${p.name} ha fatto il suo discorso finale!`)
                          });
                      }, 3000 + Math.random() * 3000); 
                      return () => clearTimeout(timer);
                  }
              });
          }, [lobby.juryData, isHost, lobby.phase]);


          // --- BOT JURY VOTE LOGIC ---
          useEffect(() => {
              if (!isHost || lobby.phase !== 'jury_vote' || lobby.juryData?.stage !== 'voting') return;
              const jd = lobby.juryData;
              const botsInJury = jd.jurors.filter(j => lobby.players.find(p => p.uid === j.uid)?.isBot);

              botsInJury.forEach(botJuror => {
                  if (!jd.votes || !jd.votes[botJuror.uid]) {
                      const timer = setTimeout(async () => {
                          const jurorFull = lobby.players.find(p => p.uid === botJuror.uid);
                          const rel1 = jurorFull.relationships[jd.finalist1] || 0;
                          const rel2 = jurorFull.relationships[jd.finalist2] || 0;

                          let vote = null;
                          if (rel1 > rel2) vote = jd.finalist1;
                          else if (rel2 > rel1) vote = jd.finalist2;
                          else vote = Math.random() > 0.5 ? jd.finalist1 : jd.finalist2;

                          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                              [`juryData.votes.${botJuror.uid}`]: vote
                          });
                      }, 2000 + Math.random() * 3000);
                      return () => clearTimeout(timer);
                  }
              });
          }, [lobby.juryData, isHost, lobby.phase, lobby.players]);

          useEffect(() => {
              if (!isHost || lobby.phase !== 'final_showdown' || !lobby.finalData) return;
              
              const { currentRolls } = lobby.finalData;
              const finalists = lobby.players.filter(p => p.status === 'active');
              
              finalists.forEach(p => {
                  if (p.isBot && (!currentRolls || !currentRolls[p.uid])) {
                       const timer = setTimeout(async () => {
                           const maxFaces = lobby.config.theme === 'La Notte del Giudizio' ? 13 : 10;
                           const r = Math.floor(Math.random() * maxFaces) + 1;
                           const updatedRolls = { ...(currentRolls || {}), [p.uid]: r };
                           await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                               [`finalData.currentRolls`]: updatedRolls
                           });
                       }, 1000 + Math.random() * 1000); 
                       return () => clearTimeout(timer);
                  }
              });
          }, [lobby.finalData, isHost, lobby.phase]);

          useEffect(() => {
              if (!isHost || lobby.phase !== 'redemption' || !lobby.redemptionData || lobby.redemptionData.stage !== 'rolling') return;
              
              const candidates = lobby.redemptionData.candidates || [];
              const rolls = lobby.redemptionData.rolls || {};

              // ANTI-LAG: Calcola tutti i lanci dei bot assieme
              const botsToRoll = candidates.filter(uid => {
                  const p = lobby.players.find(x => x.uid === uid);
                  return p && p.isBot && !rolls[uid];
              });

              if (botsToRoll.length > 0) {
                  const timer = setTimeout(async () => {
                      const maxFaces = lobby.config.theme === 'La Notte del Giudizio' ? 13 : 10;
                      let updates = {};
                      botsToRoll.forEach(uid => {
                          updates[`redemptionData.rolls.${uid}`] = Math.floor(Math.random() * maxFaces) + 1;
                      });
                      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
                  }, 2000);
                  return () => clearTimeout(timer);
              }
          }, [lobby.redemptionData, isHost, lobby.phase]);

          // --- BOT GHOST ISLAND LOGIC ---
          useEffect(() => {
              if (!isHost || lobby.phase !== 'ghost_island' || !lobby.ghostIslandData || lobby.ghostIslandData.stage !== 'rolling') return;
              
              const { candidates, rolls } = lobby.ghostIslandData;

              // ANTI-LAG: Calcola tutti i lanci dei bot assieme
              const botsToRoll = candidates.filter(uid => {
                  const p = lobby.players.find(x => x.uid === uid);
                  return p && p.isBot && !rolls[uid];
              });

              if (botsToRoll.length > 0) {
                  const timer = setTimeout(async () => {
                      let updates = {};
                      botsToRoll.forEach(uid => {
                          updates[`ghostIslandData.rolls.${uid}`] = Math.floor(Math.random() * 10) + 1;
                      });
                      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
                  }, 2000);
                  return () => clearTimeout(timer);
              }
          }, [lobby.ghostIslandData, isHost, lobby.phase]);


          const sendChat = async (e) => {
            e.preventDefault();
            if (!chatInput.trim()) return;
            const msg = {
                sender: myPlayer.name,
                text: chatInput.trim(),
                team: myPlayer.team || "Merge",
                ts: Date.now()
            };
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                chat: arrayUnion(msg)
            });
            setChatInput("");
          };

          const handleUserRoll = async () => {
              playSound('roll');
              let roll;
              const player = lobby.players.find(p => p.uid === user.uid);
              const maxFaces = lobby.config.theme === 'La Notte del Giudizio' ? 13 : 10;
              
              if (player.nextRollNerf) {
                  roll = Math.floor(Math.random() * 4) + 1; 
              } else {
                  roll = Math.floor(Math.random() * maxFaces) + 1; 
              }

              let usedAdvantage = false;

              if (useAdvantage && lobby.idolData?.inventory?.advantages?.[user.uid] > 0) {
                  roll += 3; 
                  usedAdvantage = true;
              }

              const { rollingIndex, rolls } = lobby.challengeData;
              const updatedRolls = { ...rolls, [user.uid]: roll };
              
              let updates = {
                  [`challengeData.rolls`]: updatedRolls,
                  [`challengeData.rollingIndex`]: rollingIndex + 1,
                  [`players`]: lobby.players.map(p => p.uid === user.uid ? { ...p, diceRoll: roll, nextRollNerf: false } : p)
              };

              let logsToAdd = [];
              if (player.nextRollNerf) {
                  logsToAdd.push(`😵 ${player.name} ha l'attrezzatura sabotata! Roll massimo: 4. (Ha fatto ${roll})`);
              }

              if (usedAdvantage) {
                  updates[`idolData.inventory.advantages.${user.uid}`] = lobby.idolData.inventory.advantages[user.uid] - 1;
                  logsToAdd.push(`⚡ ${myPlayer.name} usa il VANTAGGIO SFIDA! +3 al lancio (Totale: ${roll})!`);
              }
              
              if (logsToAdd.length > 0) updates[`logs`] = arrayUnion(...logsToAdd);

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
              setUseAdvantage(false); 
          };

          const handleTieBreakRoll = async () => {
              playSound('roll');
              const maxFaces = lobby.config.theme === 'La Notte del Giudizio' ? 13 : 10;
              const roll = Math.floor(Math.random() * maxFaces) + 1;
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`ceremonyData.tieMatch.rolls.${user.uid}`]: roll
              });
          };

          const handleFinalRoll = async () => {
              if (lobby.phase !== 'final_showdown') return;
              playSound('roll');
              const maxFaces = lobby.config.theme === 'La Notte del Giudizio' ? 13 : 10;
              const roll = Math.floor(Math.random() * maxFaces) + 1;
              const currentRolls = lobby.finalData.currentRolls || {};
              
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`finalData.currentRolls.${user.uid}`]: roll
              });
          };

          const submitPopularityVote = async () => {
              if (popularitySelections.length !== 2) return;
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`challengeData.votes.${user.uid}`]: popularitySelections
              });
          };

          const submitPopularityNomination = async (chosenTargets) => {
              if (lobby.phase !== 'challenge' || lobby.challengeData?.stage !== 'nomination') return;

              const deciderPlayer = lobby.players.find(p => p.uid === lobby.challengeData.decider);
              const targetNames = chosenTargets.map(id => lobby.players.find(p => p.uid === id)?.name).join(", ");

              let updatedPlayers = [...lobby.players];
              let logsToAdd = [`🎯 ${deciderPlayer.name.toUpperCase()} HA SCELTO I BERSAGLI! Solo ${targetNames} potranno essere votati stasera!`];

              chosenTargets.forEach(targetId => {
                  const targetPlayer = updatedPlayers.find(p => p.uid === targetId);
                  if (targetPlayer && targetPlayer.isBot && Math.random() < 0.30) {
                      const targetIdx = updatedPlayers.findIndex(p => p.uid === targetId);
                      const currentRel = updatedPlayers[targetIdx].relationships[deciderPlayer.uid] || 0;
                      updatedPlayers[targetIdx].relationships = {
                          ...updatedPlayers[targetIdx].relationships,
                          [deciderPlayer.uid]: Math.max(-10, currentRel - 1)
                      };
                      logsToAdd.push(`💢 ${targetPlayer.name} se l'è presa per essere stato mandato a rischio da ${deciderPlayer.name}! (-1 Relaz)`);
                      
                      if (lobby.challengeData.decider === user.uid) {
                          updateAchievement('tiseioffeso', 1, 15);
                      }
                  }
              });

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  players: updatedPlayers,
                  [`challengeData.stage`]: 'finished',
                  readyPlayers: [],
                  phase: 'social',
                  twistData: { type: 'purge', targets: chosenTargets }, // Blocca i voti solo su questi 4
                  logs: arrayUnion(...logsToAdd)
              });
          };

          const resolvePopularityVote = async () => {
              if (!isHost || lobby.phase !== 'challenge' || lobby.challengeData?.type !== 'popularity_vote') return;
              
              const votesMap = lobby.challengeData.votes || {};
              const counts = {};
              
              Object.values(votesMap).forEach(voteArray => {
                  voteArray.forEach(uid => {
                      counts[uid] = (counts[uid] || 0) + 1;
                  });
              });
              
              const activePlayersList = lobby.players.filter(p => p.status === 'active');
              activePlayersList.forEach(p => {
                  if (counts[p.uid] === undefined) counts[p.uid] = 0;
              });

              // Ordina dal meno votato al più votato. A parità di voti, mescola a caso per suspense
              const sortedResults = Object.entries(counts)
                  .map(([uid, score]) => ({ uid, score }))
                  .sort((a, b) => {
                      if (a.score === b.score) return Math.random() - 0.5;
                      return a.score - b.score;
                  });

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`challengeData.stage`]: 'revealing',
                  [`challengeData.popularityResults`]: sortedResults,
                  [`challengeData.revealIndex`]: -1,
                  logs: arrayUnion(`I voti sono chiusi! Inizia lo spoglio per scoprire chi riceverà l'immunità!`)
              });
          };

          const handleRedemptionRoll = async () => {
             playSound('roll');
             const maxFaces = lobby.config.theme === 'La Notte del Giudizio' ? 13 : 10;
             const roll = Math.floor(Math.random() * maxFaces) + 1;
             await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`redemptionData.rolls.${user.uid}`]: roll
             });
          };

          const handleGhostIslandRoll = async () => {
             playSound('roll');
             const roll = Math.floor(Math.random() * 10) + 1;
             await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`ghostIslandData.rolls.${user.uid}`]: roll
             });
          };

          const forceJuryReveal = async () => {
              if (!isHost || lobby.phase !== 'jury_vote' || lobby.juryData?.stage !== 'voting') return;
              const jd = lobby.juryData;
              let p1Votes = 0;
              let p2Votes = 0;
              Object.values(jd.votes || {}).forEach(v => {
                  if (v === jd.finalist1) p1Votes++;
                  else p2Votes++;
              });
              
              let winnerId = jd.finalist1;
              if (p2Votes > p1Votes) winnerId = jd.finalist2;
              else if (p1Votes === p2Votes) winnerId = Math.random() > 0.5 ? jd.finalist1 : jd.finalist2;

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  [`juryData.stage`]: 'revealing',
                  [`juryData.p1Votes`]: p1Votes,
                  [`juryData.p2Votes`]: p2Votes,
                  [`juryData.winnerId`]: winnerId,
                  logs: arrayUnion(`Lo spoglio dei voti è stato forzato dall'Host!`)
              });
          };

          const claimCrate = async (crateId) => {
              if (lobby.phase !== 'idol_hunt' || lobby.idolData.stage !== 'selection') return;
              if (myPlayer.status !== 'active') return;
              if (lobby.idolData.crates.some(c => c.owner === user.uid)) return; 
              if (claimingCrateId) return; // Evita doppi click
              
              // --- OPTIMISTIC UI: Aggiornamento Istantaneo ---
              setClaimingCrateId(crateId);
              playSound('success');
              
              // --- FIX MULTIPLAYER ONLINE ---
              // Utilizziamo le transazioni (runTransaction) per evitare la "Race Condition"
              // Questo garantisce che se 2 o più giocatori cliccano contemporaneamente, 
              // nessuno sovrascriverà i dati dell'altro!
              const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId);

              try {
                  await runTransaction(db, async (transaction) => {
                      const snap = await transaction.get(lobbyRef);
                      if (!snap.exists()) throw "Lobby non trovata";
                      const latestLobby = snap.data();

                      if (latestLobby.idolData.crates.find(c => c.id === crateId).owner !== null) throw "Cassa già presa"; 
                      if (latestLobby.idolData.crates.some(c => c.owner === user.uid)) throw "Hai già una cassa";

                      const newCrates = latestLobby.idolData.crates.map(c => 
                           c.id === crateId ? { ...c, owner: user.uid } : c
                      );

                      const allTaken = newCrates.every(c => c.owner !== null);
                      
                      let updates = { [`idolData.crates`]: newCrates };

                      if (allTaken) {
                          updates[`idolData.stage`] = 'reveal';
                          
                          let inventory = { idols: {}, extraVotes: {}, advantages: {}, voteSteals: {}, spyDrones: {}, mutinies: {}, safeties: {}, immunitySteals: {}, legacies: {}, crystalBalls: {} };
                          
                          newCrates.forEach(c => {
                              const item = latestLobby.idolData.itemDistribution[c.id];
                              if (item && c.owner) {
                                  if (item === 'spyDrone') {
                                      inventory.spyDrones[c.owner] = (inventory.spyDrones[c.owner] || 0) + 3;
                                  } else if (item === 'crystalBall') {
                                      inventory.crystalBalls[c.owner] = (inventory.crystalBalls[c.owner] || 0) + 3;
                                  } else if (item === 'safety') {
                                      inventory.safeties[c.owner] = (inventory.safeties[c.owner] || 0) + 1;
                                  } else if (item === 'mutiny') {
                                      inventory.mutinies[c.owner] = (inventory.mutinies[c.owner] || 0) + 1;
                                  } else if (item === 'legacy') {
                                      inventory.legacies[c.owner] = (inventory.legacies[c.owner] || 0) + 1;
                                  } else {
                                      const key = item + 's';
                                      inventory[key][c.owner] = (inventory[key][c.owner] || 0) + 1;
                                  }
                              }
                          });
                          
                          updates[`idolData.inventory`] = inventory;
                          if (!latestLobby.idolData.activeEffects) updates[`idolData.activeEffects`] = { legacyDesignations: {} };
                          updates[`logs`] = arrayUnion("Tutte le casse sono state assegnate! Apertura in corso...");
                      }

                      transaction.update(lobbyRef, updates);
                  });
                  
                  updateAchievement('cacciatoredivantaggi', 1, 20);
              } catch(e) {
                  console.log("Cassa non riscattabile (già presa da un bot):", e);
                  setClaimingCrateId(null); // Reset del feedback se la transazione fallisce
              }
          };

          const toggleReady = async () => {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  readyPlayers: arrayUnion(user.uid)
              });
          };

          const startNextSeason = async (newConfig) => {
            if (!isHost) return;
            
            const nextIndex = lobby.currentSeasonIndex + 1;
            const allParticipants = lobby.players; 
            
            const humans = allParticipants.filter(p => !p.isBot);
            const bots = allParticipants.filter(p => p.isBot);

            bots.sort(() => Math.random() - 0.5);

            let nextPlayersList = [...humans];
            const slotsForBots = Math.max(0, newConfig.returningCount - humans.length);
            
            if (slotsForBots > 0) {
                nextPlayersList = nextPlayersList.concat(bots.slice(0, slotsForBots));
            }
            
            const returningUids = new Set(nextPlayersList.map(p => p.uid));
            
            let nextPlayers = nextPlayersList.map(p => {
                let keptRelationships = {};
                let keptAlliances = [];
                
                // Mantiene ~30% delle relazioni e alleanze della stagione passata
                if (p.relationships) {
                    Object.entries(p.relationships).forEach(([targetUid, val]) => {
                        if (returningUids.has(targetUid)) {
                            // MODIFICA: Se è un flirt/fidanzamento (val >= 11), mantienilo al 100% per sempre!
                            if (val >= 11) {
                                keptRelationships[targetUid] = val;
                                // Mantiene anche l'alleanza forzatamente per i fidanzati
                                if (p.alliances && p.alliances.includes(targetUid)) {
                                    keptAlliances.push(targetUid);
                                }
                            } 
                            // Altrimenti, normale decadimento (solo il 30% sopravvive)
                            else if (Math.random() <= 0.30) {
                                keptRelationships[targetUid] = val;
                            }
                        }
                    });
                }
                
                if (p.alliances) {
                    p.alliances.forEach(targetUid => {
                        if (returningUids.has(targetUid) && keptRelationships[targetUid] > 0 && Math.random() <= 0.30 && !keptAlliances.includes(targetUid)) {
                            keptAlliances.push(targetUid);
                        }
                    });
                }

                return {
                    uid: p.uid,
                    name: p.name,
                    character: p.character, 
                    isBot: p.isBot,
                    status: 'active', 
                    team: null, 
                    relationships: keptRelationships, 
                    alliances: keptAlliances, 
                    diceRoll: null,
                    immunityWins: 0,
                    totalVotesReceived: p.totalVotesReceived || 0,
                    nextRollNerf: false,
                    legacyImmunityActive: false,
                    legacyDoubleVoteActive: false,
                    equippedCosmetic: p.equippedCosmetic || null,
                    equippedTitle: p.equippedTitle || null
                };
            });

            const numTeams = newConfig.numTeams;
            let currentTeamNames = DEFAULT_TEAM_NAMES;
            if (lobby.config.theme === 'Villain Edition') currentTeamNames = VILLAIN_TEAM_NAMES;
            else if (lobby.config.theme === 'Girly pop') currentTeamNames = ["Girly pop", "Amazzoni", "Yuri", "Dive"];
            else if (lobby.config.theme === 'Custom') {
                // Recupera i nomi scelti custom per mantenerli nella Stagione 2
                currentTeamNames = [...new Set(lobby.players.map(p => p.team).filter(t => t && t !== 'MERGE'))];
                // Nel caso assurdo che aumentino il numero di team tra S1 e S2, aggiungi team extra dalla lista
                while(currentTeamNames.length < numTeams) {
                    currentTeamNames.push(ALL_AVAILABLE_TEAMS.find(t => !currentTeamNames.includes(t)) || "Team Extra");
                }
            }
            
            nextPlayers.sort(() => Math.random() - 0.5);
            
            if (lobby.config.theme === 'Brains vs Beauties vs Brawns') {
                nextPlayers = nextPlayers.map(p => {
                    let team = "Brains";
                    if (BEAUTIES.includes(p.character?.name)) team = "Beauties";
                    else if (BRAWNS.includes(p.character?.name)) team = "Brawns";
                    else if (BRAINS.includes(p.character?.name)) team = "Brains";
                    else {
                        const hash = p.character?.name ? p.character.name.length : 0;
                        if (hash % 3 === 0) team = "Brains";
                        else if (hash % 3 === 1) team = "Beauties";
                        else team = "Brawns";
                    }
                    return { ...p, team };
                });
            } else if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') {
                nextPlayers = nextPlayers.map(p => {
                    let team = "Eroi";
                    if (VILLAINS_LIST.includes(p.character?.name) || p.character?.alignment === 'villain') team = "Villains";
                    else if (NEUTRALS.includes(p.character?.name)) team = "Neutrali";
                    else if (HEROES.includes(p.character?.name)) team = "Eroi";
                    else {
                        const hash = p.character?.name ? p.character.name.length : 0;
                        if (hash % 3 === 0) team = "Eroi";
                        else if (hash % 3 === 1) team = "Villains";
                        else team = "Neutrali";
                    }
                    return { ...p, team };
                });
            } else if (lobby.config.theme === 'La Notte del Giudizio' || lobby.config.theme === 'Popolarità') {
                nextPlayers = nextPlayers.map(p => ({ ...p, team: "MERGE" }));
            } else {
                nextPlayers = nextPlayers.map((p, idx) => ({
                  ...p,
                  team: currentTeamNames[idx % numTeams]
                }));
            }

            // Assegna 2 Bot casuali come Villain Segreti se in modalità Popolarità
            if (lobby.config.theme === 'Popolarità') {
                const botsNext = nextPlayers.filter(p => p.isBot);
                botsNext.sort(() => Math.random() - 0.5);
                const chosenVillains = botsNext.slice(0, 2).map(b => b.uid);
                nextPlayers = nextPlayers.map(p => 
                    chosenVillains.includes(p.uid) ? { ...p, isSeasonVillain: true } : p
                );
            }

            // Inizializza le casse per la nuova stagione
            const advantageConfig = lobby.config.advantages || { idol: 1, extraVote: 1, advantage: 1, voteSteal: 1, spyDrone: 1, mutiny: 1, safety: 1, immunitySteal: 1, legacy: 1 };
            let itemPool = [];
            Object.entries(advantageConfig).forEach(([key, count]) => {
                for(let i=0; i<count; i++) itemPool.push(key);
            });
            itemPool.sort(() => Math.random() - 0.5);
            const totalCrates = nextPlayers.length;
            let availableIndices = Array.from({length: totalCrates}, (_, i) => i).sort(() => Math.random() - 0.5);
            let itemDistribution = {};
            for (let i=0; i<itemPool.length && availableIndices.length > 0; i++) {
                itemDistribution[availableIndices.pop()] = itemPool[i];
            }
            const initialCrates = Array.from({length: totalCrates}, (_, i) => ({ id: i, owner: null }));

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
               currentSeasonIndex: nextIndex,
               players: nextPlayers,
               phase: 'idol_hunt',
               round: 0,
               config: {
                   ...lobby.config,
                   maxPlayers: newConfig.returningCount, 
                   numTeams: newConfig.numTeams,
                   mergeSize: newConfig.mergeSize
               },
               idolData: {
                  active: true,
                  itemDistribution,
                  inventory: { idols: {}, extraVotes: {}, advantages: {}, voteSteals: {}, spyDrones: {}, mutinies: {}, safeties: {}, immunitySteals: {}, legacies: {}, crystalBalls: {} },
                  activeEffects: { legacyDesignations: {} },
                  crates: initialCrates,
                  stage: 'selection'
               },
               votes: {},
               ceremonyData: null,
               challengeData: null,
               juryData: null,
               finalData: null,
               redemptionData: null,
               ghostIslandData: null,
               twistData: null,
               immunity: [],
               losingTeam: null,
               logs: arrayUnion(`--- INIZIO STAGIONE ${nextIndex + 1}: ${SEASON_CONFIG[nextIndex]?.name || 'Nuova Stagione'} ---`, `--- CACCIA AI VANTAGGI (Inizia la ricerca delle casse!) ---`)
            });

            // Aggiunge le presenze per la nuova stagione
            incrementActivePlayersStats(nextPlayers.filter(p => p.status === 'active'));

            setNextSeasonConfig(null); 
          };

          const startRedemptionSelection = async () => {
             if (selectedRedemptionCandidates.length < 2) return;
             await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                 [`redemptionData.candidates`]: selectedRedemptionCandidates,
                 [`redemptionData.stage`]: 'rolling',
                 logs: arrayUnion(`Inizia la sfida per il Rientro! ${selectedRedemptionCandidates.length} concorrenti si sfidano.`)
             });
          };

          const resolveRedemption = async () => {
             const { candidates, rolls } = lobby.redemptionData;
             const allRolled = candidates.every(c => rolls[c]);
             if (!allRolled) return;

             let maxRoll = -1;
             let potentialWinners = [];
             candidates.forEach(c => {
                 if(rolls[c] > maxRoll) { maxRoll = rolls[c]; potentialWinners = [c]; }
                 else if(rolls[c] === maxRoll) { potentialWinners.push(c); }
             });

             if (potentialWinners.length === 1) {
                 const winnerId = potentialWinners[0];
                 const winner = lobby.players.find(p => p.uid === winnerId);
                 
                 const activePlayers = lobby.players.filter(p => p.status === 'active');
                 let targetTeam = "Merge";
                 
                 const activeTeamsList = [...new Set(activePlayers.map(p => p.team).filter(t => t && t !== "Merge"))];
                 
                 if (activeTeamsList.length > 0) {
                     const teamCounts = {};
                     activeTeamsList.forEach(t => teamCounts[t] = 0);
                     
                     activePlayers.forEach(p => { 
                         if(p.team && activeTeamsList.includes(p.team)) {
                             teamCounts[p.team] = (teamCounts[p.team] || 0) + 1;
                         }
                     });
                     
                     let minCount = 999;
                     Object.entries(teamCounts).forEach(([t, count]) => {
                         if (count < minCount) { minCount = count; targetTeam = t; }
                         else if (count === minCount && Math.random() > 0.5) { targetTeam = t; } 
                     });
                 }

                 const updatedPlayers = lobby.players.map(p => 
                     p.uid === winnerId ? { ...p, status: 'active', team: targetTeam, immunityWins: 0 } : p
                 );

                 await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                    players: updatedPlayers,
                    phase: 'episode_start',
                    round: lobby.round, 
                    redemptionData: null,
                    logs: arrayUnion(`${winner.name} VINCE IL RIENTRO e torna nel team ${targetTeam}!`)
                 });
                 
                 // Aggiunge la presenza al round a cui sta tornando
                 incrementActivePlayersStats(updatedPlayers.filter(p => p.status === 'active'));
                 setSelectedRedemptionCandidates([]);

             } else {
                 await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                    [`redemptionData.rolls`]: {},
                    logs: arrayUnion("Pareggio nel rientro! Si rilanciano i dadi.")
                 });
             }
          };

          const advanceGame = async () => {
            if (!isHost || isProcessing) return;
            setIsProcessing(true);

            // --- FIX: Ritorno al menu a fine gioco ---
            if (lobby.phase === 'game_over') {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId));
                } catch(e) { console.error("Errore chiusura lobby:", e); }
                setIsProcessing(false);
                return; 
            }

            let updates = {};
            let newLogs = [];

            if (lobby.phase === 'idol_hunt') {
                if (lobby.idolData.stage === 'reveal') {
                    updates = {
                        phase: 'episode_start',
                        round: 1,
                        logs: arrayUnion(`--- INIZIO STAGIONE 1: L'ISOLA ---`)
                    }
                    // Aggiunge le presenze per l'episodio 1 assoluto!
                    incrementActivePlayersStats(lobby.players.filter(p => p.status === 'active'));
                }
            }

            else if (lobby.phase === 'episode_start') {
              const mergeSize = lobby.config.mergeSize || (lobby.config.maxPlayers / 2);
              const isChaos = lobby.config.theme === 'Chaos';
              
              if (activePlayers.length <= 2) {
                  // ---> TRACKING ACHIEVEMENT FANTASMA PER ECCELLENZA <---
                  const meInFinale = activePlayers.find(p => p.uid === user.uid);
                  if (meInFinale && meInFinale.ghostReturnee) {
                      const eventKey = `ghost_finale_${lobbyId}_${lobby.currentSeasonIndex}`;
                      if (!processedAchievements.current.has(eventKey)) {
                          updateAchievement('fantasmadereccellenza', 1, 5);
                          processedAchievements.current.add(eventKey);
                      }
                  }

                  let useJury = false;
                  if (lobby.config.finaleType === 'Giuria') useJury = true;
                  else if (lobby.config.finaleType === 'Dado') useJury = false;
                  else useJury = Math.random() < 0.5;

                  if (useJury) {
                      const finalists = activePlayers;
                      const jurySize = lobby.config.jurySize || 7;
                      
                      const potentialJurors = [...lobby.rankings].reverse().slice(0, jurySize);
                      
                      const jurors = potentialJurors.map(entry => {
                          return lobby.players.find(p => p.name === entry.name);
                      }).filter(p => p); 

                      updates = {
                          phase: 'jury_speeches',
                          juryData: {
                              jurors: jurors.map(j => ({ uid: j.uid, name: j.name, img: j.character.img })),
                              votes: {}, 
                              speeches: {}, 
                              finalist1: finalists[0].uid,
                              finalist2: finalists[1].uid,
                              revealedCount: 0,
                              winnerId: null, 
                              p1Votes: 0,
                              p2Votes: 0,
                              stage: 'speeches'
                          },
                          logs: arrayUnion(`--- GRAN FINALE: I DISCORSI! ---`, `I finalisti devono convincere la giuria.`)
                      };

                  } else {
                      updates = { 
                          phase: 'final_showdown', 
                          finalData: { p1Score: 0, p2Score: 0, round: 1, history: [], currentRolls: {} },
                          logs: arrayUnion(`--- GRAN FINALE: SFIDA DI FUOCO! ---`)
                      };
                  }
              } else {
                  updates = { 
                      phase: 'challenge', 
                      twistData: null, 
                      logs: arrayUnion(`--- SFIDA EPISODIO ${lobby.round} ---`)
                  };
                  
                  if (lobby.round === 1) {
                      updates.chat = arrayUnion({
                          sender: "Chris McLean",
                          text: `Benvenuti al primissimo episodio! Vi ricordo come fare EXP per salire di livello: +15 per ogni round sopravvissuto, +100 immunità, +50 idolo, +200 finalista, +500 vittoria! Dateci dentro! 🎬`,
                          team: "Host",
                          ts: Date.now()
                      });
                  }

                  if (isMerge) {
                      const rand = Math.random();
                      
                      if (lobby.config.theme === 'La Notte del Giudizio') {
                          const rollers = activePlayers.map(p => p.uid);
                          
                          // Calcolo dinamico del numero di persone a rischio
                          let riskCount = 2;
                          if (activePlayers.length > 30) riskCount = 5;
                          else if (activePlayers.length > 20) riskCount = 4;
                          else if (activePlayers.length > 6) riskCount = 3;

                          updates.challengeData = {
                              type: 'purge',
                              players: rollers,
                              rollingIndex: 0,
                              rolls: {},
                              stage: 'rolling',
                              winner: null,
                              targetRiskCount: riskCount // Salviamo il numero per la UI
                          };
                          newLogs.push(`Chris: La Notte del Giudizio non si ferma! I ${riskCount} peggiori di questa sfida andranno al televoto!`);
                      }
                      else if (lobby.config.theme === 'Popolarità') {
                          updates.challengeData = {
                              type: 'popularity_vote',
                              stage: 'voting',
                              votes: {},
                              winner: null
                          };
                          newLogs.push("Chris: È il momento del Test di Popolarità! Assegnate la vostra preferenza a 2 persone. Chi ottiene più cuori sarà immune stasera!");
                      }
                      else if (rand < (isChaos ? 0.15 : 0.06)) {
                           const rollers = activePlayers.map(p => p.uid);
                           updates.challengeData = {
                               type: 'sudden_death',
                               players: rollers,
                               rollingIndex: 0,
                               rolls: {},
                               stage: 'rolling',
                               winner: null 
                           };
                           newLogs.push("Chris: COLPO DI SCENA! Sfida ad Eliminazione Diretta!");
                           newLogs.push("Chi fa il numero più basso TORNA A CASA. Niente votazioni.");
                      
                      } else if (rand < (isChaos ? 0.30 : 0.14)) { 
                          const shuffled = [...activePlayers].sort(() => Math.random() - 0.5);
                          const mid = Math.ceil(shuffled.length / 2);
                          const teamA = shuffled.slice(0, mid).map(p => p.uid);
                          const teamB = shuffled.slice(mid).map(p => p.uid);
                          
                          const tempTeams = {};
                          teamA.forEach(uid => tempTeams[uid] = 'A');
                          teamB.forEach(uid => tempTeams[uid] = 'B');

                          updates.challengeData = {
                              type: 'team', 
                              teams: tempTeams,
                              players: [...teamA, ...teamB], 
                              rollingIndex: 0,
                              rolls: {},
                              stage: 'rolling',
                              winner: null
                          };
                          newLogs.push("Chris: Oggi sfida speciale! Vi dividerò in due squadre casuali.");
                          newLogs.push("La squadra che totalizza il punteggio più alto vince l'immunità!");

                      } else if (rand < (isChaos ? 0.44 : 0.20) && activePlayers.length > 4) { 
                          const shuffled = [...activePlayers].sort(() => Math.random() - 0.5);
                          const tempTeams = {};
                          const playersArr = [];
                          let pairIndex = 1;

                          for (let i = 0; i < shuffled.length; i += 2) {
                              const p1 = shuffled[i];
                              const p2 = shuffled[i+1];
                              const teamName = `Coppia ${pairIndex}`;

                              tempTeams[p1.uid] = teamName;
                              playersArr.push(p1.uid);

                             finalVictims.push(runnerUpId);

                  }

                  if (savedBy.length > 0) {
                      updates[`ceremonyData.idolPlayedBy`] = savedBy[0]; 
                  }

                  updates[`ceremonyData.eliminated`] = finalVictims;
                  updates[`ceremonyData.finalReveal`] = true;
                  if(newLogs.length > 0) updates.logs = arrayUnion(...newLogs);
                  if(finalVictims.length > 0) setTimeout(() => playSound('elimination'), savedBy.length > 0 ? 1500 : 0);
              } 
              else {
                  let finalVictims = Array.isArray(data.eliminated) ? [...data.eliminated] : [data.eliminated].filter(Boolean);
                  const isDouble = data.isDoubleElimination;

                  let updatedPlayers = [...lobby.players];
                  let rankingEntries = [];
                  let nextImmunities = []; // GESTIONE EREDITA' TESTAMENTO
                  
                  const activePlayersList = lobby.players.filter(p => p.status === 'active');

                  finalVictims.forEach(vId => {
                      const victim = updatedPlayers.find(p => p.uid === vId);
                      if (!victim || victim.status !== 'active') return; 

                      updatedPlayers = updatedPlayers.map(p => p.uid === vId ? { ...p, status: 'eliminated' } : p);
                      
                      // LOGICA TESTAMENTO
                      let heirId = lobby.idolData?.activeEffects?.legacyDesignations?.[vId];
                      
                      if (!heirId && lobby.idolData?.inventory?.legacies?.[vId] > 0) {
                          let bestScore = -999;
                          activePlayersList.forEach(p => {
                              if (p.uid !== vId && !finalVictims.includes(p.uid)) {
                                  const score = victim.relationships[p.uid] || 0;
                                  if (score > bestScore) { bestScore = score; heirId = p.uid; }
                              }
                          });
                      }

                      if (heirId) {
                          const heir = updatedPlayers.find(p => p.uid === heirId);
                          if (heir && heir.status === 'active') {
                              updatedPlayers = updatedPlayers.map(p => p.uid === heirId ? { ...p, legacyImmunityActive: true, legacyDoubleVoteActive: true } : p);
                              nextImmunities.push(heirId);
                              newLogs.push(`📜 TESTAMENTO DI ${victim.name.toUpperCase()}! Lascia in eredità a ${heir.name} l'Immunità Assoluta e il Doppio Voto per il suo prossimo falò!`);
                              playSound('success');
                          }
                      }

                      rankingEntries.push({ 
                          name: victim.name, 
                          team: victim.team || "Merge",

                          votes: victim.totalVotesReceived || 0,

                          episodesSurvived: lobby.round
                      });
                      newLogs.push(`${victim.name} è stato eliminato!`);
                  });

                  // PULIZIA EFFETTI EREDITA' USATI IN QUESTA CERIMONIA
                  updatedPlayers = updatedPlayers.map(p => {
                      const participated = isMerge || lobby.twistData?.type === 'joint_ceremony' || p.team === lobby.losingTeam;
                      if (participated && p.status === 'active' && p.legacyImmunityActive && !finalVictims.includes(p.uid)) {
                          return { ...p, legacyImmunityActive: false, legacyDoubleVoteActive: false };
                      }
                      return p;
                  });

                  // --- REVERT RAPIMENTO ---
                  updatedPlayers = updatedPlayers.map(p => {
                      if (p.originalTeam && p.status === 'active') {
                          newLogs.push(`🔄 Il rapimento è finito! ${p.name} torna al suo team originale (${p.originalTeam}).`);
                          const { originalTeam, ...rest } = p;
                          return { ...rest, team: originalTeam };
                      }
                      return p;
                  });
                  // ------------------------

                  const nextRound = lobby.round + 1;
                  const redemptionConfig = lobby.config.redemption;
                  let isRedemptionEpisode = false;
                  
                  if (redemptionConfig && redemptionConfig.enabled && redemptionConfig.episodes) {
                      if (Array.isArray(redemptionConfig.episodes)) {
                           isRedemptionEpisode = redemptionConfig.episodes.includes(nextRound);
                      }
                  }

                  if (finalVictims.length > 0) {
                      updates.players = updatedPlayers;
                      updates.rankings = arrayUnion(...rankingEntries);
                  }

                  // CONTROLLO GHOST ISLAND PER ELIMINAZIONE NORMALE
                  const alreadyMerged = lobby.players.some(p => p.status === 'active' && p.team === 'MERGE');
                  const nextActiveCount = updatedPlayers.filter(p => p.status === 'active').length;
                  const nextUniqueTeams = [...new Set(updatedPlayers.filter(p => p.status === 'active' && p.team !== 'MERGE').map(p => p.team))];
                  const willBeMerge = lobby.config.theme === 'La Notte del Giudizio' || lobby.config.theme === 'Popolarità' || nextActiveCount <= (lobby.config.mergeSize || (lobby.config.maxPlayers / 2)) || nextUniqueTeams.length < 2;
                  const currentGhosts = updatedPlayers.filter(p => p.status === 'eliminated');

                  if (willBeMerge) {
                      updatedPlayers = updatedPlayers.map(p => p.status === 'active' ? { ...p, team: 'MERGE' } : p);
                  }

                  if (lobby.config.theme === 'Ghost Island' && !alreadyMerged && willBeMerge && currentGhosts.length > 0) {
                      if (currentGhosts.length > 2) {
                          updates = {
                            ...updates,
                            phase: 'ghost_island',
                            ghostIslandData: { stage: 'rolling', candidates: currentGhosts.map(g => g.uid), rolls: {}, isMergeReturn: true },
                            round: nextRound,
                            players: updatedPlayers,
                            votes: {},
                            extraVotes: {}, 
                            immunity: nextImmunities,
                            diceRoll: null,
                            losingTeam: null,
                            ceremonyData: null,
                            challengeData: null,
                            twistData: null, 
                            logs: arrayUnion(...newLogs, `--- SFIDA FINALE GHOST ISLAND ---`, `I ${currentGhosts.length} fantasmi si sfidano per gli ultimi 2 posti nella Fusione!`)
                          };
                      } else {
                          currentGhosts.forEach(g => {
                              const idx = updatedPlayers.findIndex(p => p.uid === g.uid);
                              updatedPlayers[idx].status = 'active';
                              updatedPlayers[idx].team = 'MERGE';
                              updatedPlayers[idx].immunityWins = 0;
                              updatedPlayers[idx].ghostReturnee = true; // FLAG FANTASMA
                              newLogs.push(`👻 COLPO DI SCENA! ${g.name} è sopravvissuto a Ghost Island e RIENTRA in gioco per la Fusione!`);
                          });
                          updates = {
                            ...updates,
                            phase: 'episode_start',
                            round: nextRound,
                            players: updatedPlayers,
                            votes: {},
                            extraVotes: {}, 
                            immunity: nextImmunities,
                            diceRoll: null,
                            losingTeam: null,
                            ceremonyData: null,
                            challengeData: null,
                            twistData: { type: 'ghost_island_return', returnees: currentGhosts.map(g => g.uid) },

                          incrementActivePlayersStats(updatedPlayers.filter(p => p.status === 'active'));
                      }
                  }
                  else if (lobby.config.theme === 'Ghost Island' && !willBeMerge && currentGhosts.length >= 3) {
                      updates = {
                        ...updates,
                        phase: 'ghost_island',

                        round: nextRound,

                        extraVotes: {},

                      };
                  }
                  else if (isRedemptionEpisode) {
                      updates = {
                        ...updates,
                        phase: 'redemption',
                        redemptionData: { active: true, stage: 'selection', candidates: [], rolls: {} },

                        votes: {},

                        diceRoll: null,
                        losingTeam: null,

                        challengeData: null,
                        twistData: null,

                      };
                  } else {
                      updates = {
                        ...updates,
                        phase: 'episode_start',
                        round: nextRound,
                        votes: {},
                        extraVotes: {}, 
                        immunity: nextImmunities, // Mantiene l'immunità del testamento
