                                                 <div key={tName} className={`flex justify-between items-center p-3 rounded-lg font-bold ${isWinner ? 'bg-yellow-500/20 border border-yellow-500 text-yellow-300' : isBottom ? 'bg-red-900/40 border border-red-500 text-red-400' : 'bg-slate-700 text-slate-300'}`}>
                                                     <div className="flex items-center gap-2">
                                                         <span className="text-xs bg-black/50 px-2 py-1 rounded">#{idx + 1}</span>
                                                         {tName}
                                                     </div>
                                                     <div>{tScore} pt</div>
                                                 </div>
                                             )
                                         })}
                                     </div>
                                 </div>

                                 {/* POTERE DI NOMINA */}
                                 <div className="bg-gradient-to-br from-indigo-900/80 to-purple-900/80 p-6 rounded-2xl border-2 border-indigo-500 shadow-[0_0_30px_rgba(99,102,241,0.3)]">
                                     <div className="text-center mb-6">
                                         <Crown size={48} className="text-yellow-400 mx-auto mb-2"/>
                                         <h3 className="text-2xl font-black text-white">POTERE DEL LEADER</h3>
                                         <p className="text-indigo-200 text-sm mt-1">Il Team <strong>{lobby.challengeData.winnerTeam}</strong> deve scegliere!</p>
                                     </div>

                                     {(() => {
                                         const winnerMembers = activePlayers.filter(p => p.team === lobby.challengeData.winnerTeam);
                                         const iAmWinner = winnerMembers.some(p => p.uid === user.uid);
                                         const isBotWin = winnerMembers.every(p => p.isBot);

                                         const nominateTeam = async (t) => {
                                             const updatedBottom = [...lobby.challengeData.bottomTwo, t];
                                             await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                                                 [`challengeData.nominatedTeam`]: t,
                                                 phase: 'social',
                                                 losingTeam: updatedBottom, // Array di 3 team a rischio
                                                 logs: arrayUnion(`🎯 IL TEAM ${lobby.challengeData.winnerTeam.toUpperCase()} HA NOMINATO IL TEAM ${t.toUpperCase()} PER L'ELIMINAZIONE!`)
                                             });
                                             setHasActed(true);
                                         };

                                         if (iAmWinner && !hasActed) {
                                             const safeTeams = Object.keys(teams).filter(t => t !== lobby.challengeData.winnerTeam && !lobby.challengeData.bottomTwo.includes(t) && t !== 'MERGE');
                                             return (
                                                 <div>
                                                     <p className="font-bold text-yellow-300 mb-2">Chi volete mandare al ballottaggio?</p>
                                                     <div className="space-y-2">
                                                         {safeTeams.map(t => (
                                                             <button key={t} onClick={() => nominateTeam(t)} className="w-full bg-slate-800 hover:bg-indigo-600 border border-indigo-400 p-3 rounded-xl font-bold transition-colors">
                                                                 Nomina {t}
                                                             </button>
                                                         ))}
                                                     </div>
                                                 </div>
                                             );
                                         } else if (isHost && isBotWin) {
                                             return (
                                                 <button onClick={async () => {
                                                     const safeTeams = Object.keys(teams).filter(t => t !== lobby.challengeData.winnerTeam && !lobby.challengeData.bottomTwo.includes(t) && t !== 'MERGE');
                                                     const target = safeTeams[Math.floor(Math.random() * safeTeams.length)];
                                                     nominateTeam(target);
                                                 }} className="w-full bg-red-600 hover:bg-red-500 text-white font-bold p-4 rounded-xl animate-pulse shadow-lg">
                                                     Fai scegliere il Bot
                                                 </button>
                                             );
                                         } else {
                                             return <div className="text-center text-indigo-300 font-bold mt-4 animate-pulse">In attesa della decisione del Leader...</div>;
                                         }
                                     })()}
                                 </div>
                             </div>
                         </div>
                     )}

                     {/* SCHERMATA DISCORSI FINALI */}
                     {lobby.phase === 'jury_speeches' && lobby.juryData && (
                         <div className="flex flex-col items-center min-h-[80vh] justify-center">
                             <h1 className="text-5xl font-black text-yellow-400 mb-2 uppercase tracking-widest drop-shadow-lg">DISCORSI FINALI</h1>
                             <p className="text-slate-300 mb-8 text-center max-w-2xl">
                                 La giuria ascolta. È il momento di spiegare perché meritate di vincere questo show!
                             </p>

                             <div className="flex gap-16 mb-12">
                                 {[lobby.juryData.finalist1, lobby.juryData.finalist2].map(fid => {
                                     const p = lobby.players.find(pl => pl.uid === fid);
                                     const speechDone = lobby.juryData.speeches?.[fid];
                                     const isMe = user.uid === fid;

                                     return (
                                         <div key={fid} className="flex flex-col items-center w-80">
                                             <img src={p.character.img} className="w-40 h-40 rounded-full border-4 border-white shadow-2xl object-cover mb-4"/>
                                             <div className="bg-slate-800 px-6 py-2 rounded-xl text-2xl font-black mb-4">{p.name}</div>
                                             
                                             {speechDone ? (
                                                 <div className="speech-bubble animate-in zoom-in w-full">
                                                     "{speechDone}"
                                                 </div>
                                             ) : isMe ? (
                                                 <div className="w-full">
                                                    <textarea 
                                                        value={mySpeech}
                                                        onChange={(e) => setMySpeech(e.target.value)}
                                                        placeholder="Scrivi qui il tuo appello alla giuria..."
                                                        className="w-full bg-slate-800 text-white p-3 rounded-xl border border-slate-500 focus:border-yellow-400 outline-none resize-none h-24 mb-2 text-sm"
                                                    />
                                                    <button onClick={submitFinalSpeech} disabled={!mySpeech.trim()} className="w-full bg-green-600 hover:bg-green-500 disabled:bg-slate-600 text-white font-bold py-2 rounded-xl flex items-center justify-center gap-2">
                                                        <Mic size={18}/> PARLA ALLA GIURIA
                                                    </button>
                                                 </div>
                                             ) : (
                                                 <div className="text-slate-500 italic animate-pulse w-full text-center bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                                                     Sta preparando il discorso...
                                                 </div>
                                             )}
                                         </div>
                                     );
                                 })}
                             </div>
                             
                             <div className="mt-8 bg-slate-800 p-4 rounded-xl border border-slate-600 text-slate-400 flex items-center gap-4">
                                <Users size={24}/> La Giuria ({lobby.juryData.jurors.length} membri) vi sta giudicando attentamente...
                             </div>
                         </div>
                     )}

                     {/* SCHERMATA VOTO GIURIA */}
                     {lobby.phase === 'jury_vote' && lobby.juryData && (
                         <div className="flex flex-col items-center min-h-[80vh] justify-center">
                             <h1 className="text-5xl font-black text-yellow-400 mb-2 uppercase tracking-widest drop-shadow-lg">GIURIA FINALE</h1>
                             <p className="text-slate-300 mb-8">Gli ex-concorrenti decidono il destino dei finalisti.</p>

                             <div className="flex gap-16 mb-12">
                                 {[lobby.juryData.finalist1, lobby.juryData.finalist2].map(fid => {
                                     const p = lobby.players.find(pl => pl.uid === fid);
                                     
                                     const votesReceived = lobby.juryData.jurors
                                        .slice(0, lobby.juryData.revealedCount)
                                        .filter(j => lobby.juryData.votes && lobby.juryData.votes[j.uid] === fid)
                                        .length;
                                        
                                     const isJuror = lobby.juryData.jurors.some(j => j.uid === user.uid);
                                     const hasVoted = !!(lobby.juryData.votes && lobby.juryData.votes[user.uid]);
                                     const speech = lobby.juryData.speeches?.[fid];

                                     return (
                                         <div key={fid} className="flex flex-col items-center w-72">
                                             {speech && (
                                                <div className="speech-bubble w-full mb-4 opacity-80 text-xs">
                                                    "{speech}"
                                                </div>
                                             )}
                                             <img src={p.character.img} className="w-40 h-40 rounded-full border-4 border-white shadow-2xl object-cover mb-4"/>
                                             <div className="bg-slate-800 px-6 py-2 rounded-xl text-2xl font-black mb-2">{p.name}</div>
                                             {lobby.juryData.stage === 'revealing' ? (
                                                 <div className="text-6xl font-black text-yellow-400 bg-black/40 px-6 py-4 rounded-xl border-2 border-yellow-500/50">
                                                     {votesReceived}
                                                 </div>
                                             ) : (
                                                 isJuror && !hasVoted && (
                                                     <button onClick={() => submitJuryVote(fid)} className="bg-green-600 hover:bg-green-500 px-6 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2 animate-bounce mt-2 text-white">
                                                         <Vote /> VOTA {p.name}
                                                     </button>
                                                 )
                                             )}
                                         </div>
                                     );
                                 })}
                             </div>

                             {lobby.juryData.stage === 'voting' && (
                                 <div className="mb-12 bg-slate-800 p-6 rounded-xl text-center border border-slate-600 max-w-xl w-full">
                                     <h3 className="text-2xl font-bold mb-2">Votazioni in Corso...</h3>
                                     <p className="text-slate-400">La giuria sta decidendo chi vincerà questa stagione.</p>
                                     <div className="mt-4 font-mono text-yellow-400 text-xl font-black">Voti confermati: {Object.keys(lobby.juryData.votes || {}).length} / {lobby.juryData.jurors.length}</div>
                                 </div>
                             )}

                             <div className="flex flex-wrap justify-center gap-4 max-w-5xl">
                                 {lobby.juryData.jurors.map((juror, idx) => {
                                     const isRevealed = idx < lobby.juryData.revealedCount;
                                     const voteForId = (lobby.juryData.votes || {})[juror.uid];
                                     const voteForName = lobby.players.find(p => p.uid === voteForId)?.name;

                                     return (
                                         <div key={juror.uid} className={`relative bg-slate-800 p-4 rounded-xl border-2 ${isRevealed ? 'border-yellow-500 scale-110' : 'border-slate-600 opacity-60'} transition-all duration-500 flex flex-col items-center w-32`}>
                                             <div className="absolute -top-3 -left-2 bg-slate-700 text-xs px-2 py-0.5 rounded border border-slate-500">Giurato {idx+1}</div>
                                             <img src={juror.img} className="w-16 h-16 rounded-full mb-2 object-cover grayscale"/>
                                             <div className="font-bold text-xs mb-2 truncate w-full text-center">{juror.name}</div>
                                             
                                             <div className={`w-full py-2 rounded font-black text-center text-sm ${isRevealed ? 'bg-white text-black animate-in flip-in-x' : 'bg-black text-slate-500'}`}>
                                                 {isRevealed ? voteForName : "?"}
                                             </div>
                                         </div>
                                     )
                                 })}
                             </div>

                             {isHost && lobby.juryData.stage === 'revealing' && (
                                 <button 
                                    onClick={advanceGame} 
                                    className="mt-12 bg-yellow-500 hover:bg-yellow-400 text-black font-black text-2xl py-4 px-12 rounded-full shadow-[0_0_30px_rgba(234,179,8,0.5)] animate-pulse flex items-center gap-3"
                                 >
                                    <Vote size={32}/> {lobby.juryData.revealedCount < lobby.juryData.jurors.length ? "LEGGI UN VOTO" : "PROCLAMA VINCITORE"}
                                 </button>
                             )}
                         </div>
                     )}

                     {lobby.phase === 'voting' && (
                         <div className="flex flex-col items-center">
                             {lobby.twistData?.type === 'killer' ? (
                                 <div className="bg-red-600/90 text-white p-6 rounded-2xl mb-8 text-center shadow-[0_0_30px_rgba(220,38,38,0.5)] border-4 border-red-500 animate-bounce">
                                     <div className="flex items-center justify-center gap-4 mb-2">
                                        <Gavel size={48} className="text-white"/>
                                        <h2 className="text-4xl font-black uppercase tracking-widest">POTERE DEL KILLER</h2>
                                        <Gavel size={48} className="text-white scale-x-[-1]"/>
                                     </div>
                                     <p className="text-xl">Solo <span className="font-bold text-yellow-300 text-2xl">{lobby.players.find(p => p.uid === lobby.twistData.killerId)?.name}</span> può votare stasera!</p>
                                 </div>
                             ) : (
                                 <h2 className="text-3xl font-black mb-2 flex items-center gap-2"><Vote /> CHI VUOI ELIMINARE?</h2>
                             )}
                             
                             {lobby.twistData?.type === 'joint_ceremony' && (
                                 <div className="bg-purple-900/80 border-2 border-purple-500 p-4 rounded-xl mb-6 text-center shadow-[0_0_20px_rgba(168,85,247,0.4)] animate-in slide-in-from-top duration-500">
                                     <h3 className="text-2xl font-black text-purple-300 uppercase flex items-center justify-center gap-2 mb-2">
                                        <Users2 className="animate-pulse"/> CERIMONIA CONGIUNTA!
                                     </h3>
                                     <p className="text-white text-lg leading-tight">
                                         Colpo di scena! Anche il team vincente partecipa al voto.<br/>
                                         <span className="text-purple-200 text-sm">Aiuta ad eliminare un membro del team <strong className="text-red-400 uppercase">{lobby.losingTeam}</strong>!</span>
                                     </p>
                                 </div>
                             )}

                             {lobby.twistData?.type === 'purge' && (
                                 <div className="bg-red-900/80 border-2 border-red-500 p-4 rounded-xl mb-6 text-center shadow-[0_0_20px_rgba(220,38,38,0.4)] animate-in slide-in-from-top duration-500">
                                     <h3 className="text-2xl font-black text-red-300 uppercase flex items-center justify-center gap-2 mb-2">
                                        <Skull className="animate-pulse"/> LA NOTTE DEL GIUDIZIO!
                                     </h3>
                                     <p className="text-white text-lg leading-tight">
                                         Puoi votare SOLO i giocatori che hanno fatto il punteggio più basso nella sfida di oggi!
                                     </p>
                                 </div>
                             )}
                             
                             {!isMerge && myPlayer.team !== lobby.losingTeam && lobby.twistData?.type !== 'joint_ceremony' ? (
                                 <div className="mt-8 bg-green-600/20 border-2 border-green-500 p-8 rounded-2xl text-center animate-in zoom-in">
                                     <Coffee size={48} className="mx-auto mb-4 text-green-400" />
                                     <h3 className="text-2xl font-black text-green-400 mb-2">SEI SALVO!</h3>
                                     <p className="text-slate-300">Non devi votare stasera. Rilassati e guarda il team <span className="font-bold text-red-400">{lobby.losingTeam}</span> scannarsi al falò.</p>
                                 </div>
                             ) : (
                                <>
                                 {lobby.twistData?.type !== 'killer' && <p className="mb-4 text-slate-400">Clicca sul concorrente per votarlo. Il voto è segreto.</p>}

                                 {/* --- INTERFACCIA VOTO EXTRA --- */}
                                 {lobby.idolData?.inventory?.extraVotes?.[user.uid] > 0 && lobby.twistData?.type !== 'killer' && myPlayer.status !== 'eliminated' && (
                                     <div className="mb-6 bg-slate-800 p-4 rounded-xl border border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.3)] animate-in slide-in-from-top w-full max-w-md">
                                         <div className="flex items-center justify-between">
                                             <div className="flex items-center gap-3">
                                                 <Vote className="text-green-400" size={32}/>
                                                 <div>
                                                     <h3 className="font-bold text-green-400 text-lg">HAI IL VOTO EXTRA</h3>
                                                     <p className="text-xs text-slate-400">Ne hai {lobby.idolData.inventory.extraVotes[user.uid]}. Usane uno (+1 Voto).</p>
                                                 </div>
                                             </div>
                                             <button 
                                                onClick={() => { setUseExtraVote(!useExtraVote); setUseVoteSteal(false); }}
                                                className={`px-4 py-2 rounded-lg font-bold transition-all ${useExtraVote ? 'bg-green-500 text-black shadow-lg scale-105' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}
                                             >
                                                 {useExtraVote ? "ATTIVO (+1)" : "NON USARE"}
                                             </button>
                                         </div>
                                     </div>
                                 )}

                                 {/* --- INTERFACCIA RUBA-VOTO --- */}
                                 {lobby.idolData?.inventory?.voteSteals?.[user.uid] > 0 && lobby.twistData?.type !== 'killer' && myPlayer.status !== 'eliminated' && (
                                     <div className="mb-6 bg-slate-800 p-4 rounded-xl border border-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.3)] animate-in slide-in-from-top w-full max-w-md">
                                         <div className="flex flex-col gap-3">
                                             <div className="flex items-center justify-between">
                                                 <div className="flex items-center gap-3">
                                                     <UserMinus className="text-cyan-400" size={32}/>
                                                     <div>
                                                         <h3 className="font-bold text-cyan-400 text-lg">HAI IL RUBA-VOTO</h3>
                                                         <p className="text-xs text-slate-400">Ne hai {lobby.idolData.inventory.voteSteals[user.uid]}. Annulla un voto nemico.</p>
                                                     </div>
                                                 </div>
                                                 <button 
                                                    onClick={() => { setUseVoteSteal(!useVoteSteal); setUseExtraVote(false); }}
                                                    className={`px-4 py-2 rounded-lg font-bold transition-all ${useVoteSteal ? 'bg-cyan-500 text-black shadow-lg scale-105' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}
                                                 >
                                                     {useVoteSteal ? "ATTIVO (+1)" : "NON USARE"}
                                                 </button>
                                             </div>
                                             
                                             {useVoteSteal && (
                                                 <div className="mt-2">
                                                     <label className="text-sm font-bold text-cyan-300">Chi vuoi derubare del voto?</label>
                                                     <select 
                                                         className="w-full mt-1 bg-slate-900 border border-cyan-500 text-white rounded p-2"
                                                         value={voteStealVictim}
                                                         onChange={(e) => setVoteStealVictim(e.target.value)}
                                                     >
                                                         <option value="">-- Seleziona un bersaglio --</option>
                                                         {activePlayers.filter(p => p.uid !== user.uid && (isMerge || lobby.twistData?.type === 'joint_ceremony' || p.team === lobby.losingTeam)).map(p => (
                                                             <option key={p.uid} value={p.uid}>{p.name}</option>
                                                         ))}
                                                     </select>
                                                 </div>
                                             )}
                                         </div>
                                     </div>
                                 )}

                                 {/* --- INTERFACCIA SALVACONDOTTO --- */}
                                 {lobby.idolData?.inventory?.safeties?.[user.uid] > 0 && lobby.twistData?.type !== 'killer' && myPlayer.status !== 'eliminated' && (
                                     <div className="mb-6 bg-slate-800 p-4 rounded-xl border border-teal-500 shadow-[0_0_15px_rgba(20,184,166,0.3)] animate-in slide-in-from-top w-full max-w-md">
                                         <div className="flex items-center justify-between">
                                             <div className="flex items-center gap-3">
                                                 <DoorOpen className="text-teal-400" size={32}/>
                                                 <div>
                                                     <h3 className="font-bold text-teal-400 text-lg">HAI IL SALVACONDOTTO</h3>
                                                     <p className="text-xs text-slate-400">Ne hai {lobby.idolData.inventory.safeties[user.uid]}. Salta il falò e salvati.</p>
                                                 </div>
                                             </div>
                                             <button 
                                                onClick={() => setShowSafetyModal(true)}
                                                className="px-4 py-2 rounded-lg font-bold transition-all bg-teal-600 hover:bg-teal-500 text-white shadow-lg hover:scale-105"
                                             >
                                                 USA ORA
                                             </button>
                                         </div>
                                     </div>
                                 )}
                                 
                                 {lobby.twistData?.type === 'killer' && user.uid !== lobby.twistData.killerId ? (
                                     <div className="text-2xl text-red-500 font-black bg-black/50 px-8 py-4 rounded-xl animate-pulse">
                                         NON PUOI VOTARE. Il tuo destino è nelle mani del Killer.
                                     </div>
                                 ) : myPlayer.status === 'eliminated' ? (
                                     <div className="text-xl text-red-500 font-bold">SEI STATO ELIMINATO, NON PUOI VOTARE.</div>
                                 ) : lobby.idolData?.activeEffects?.safetyUsedRound === lobby.round && lobby.idolData?.activeEffects?.safetyHolder === user.uid ? (
                                     <div className="text-xl text-teal-400 font-bold bg-teal-900/40 p-4 rounded-xl border border-teal-500">HAI USATO IL SALVACONDOTTO E ABBANDONATO LA CERIMONIA. SEI SALVO MA NON PUOI VOTARE.</div>
                                 ) : (
                                     <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-5">
                                         {activePlayers.map(p => {
                                             let canVoteFor = (!isMerge && p.team === lobby.losingTeam) || (isMerge && !(lobby.immunity || []).includes(p.uid));
                                             if (lobby.twistData?.type === 'purge') {
                                                 canVoteFor = lobby.twistData.targets.includes(p.uid);
                                             }

                                             const myTeamActivePlayers = activePlayers.filter(ap => ap.team === myPlayer.team);
                                             const isOnlyMember = !isMerge && myTeamActivePlayers.length === 1 && p.team === lobby.losingTeam;
                                             
                                             if (!canVoteFor || (p.uid === user.uid && !isOnlyMember && lobby.twistData?.type !== 'purge')) return null;
                                             if (lobby.idolData?.activeEffects?.safetyUsedRound === lobby.round && lobby.idolData?.activeEffects?.safetyHolder === p.uid) return null;
                                             
                                             const iVotedFor = lobby.votes?.[user.uid] === p.uid;
                                             
                                             const ringClass = (useExtraVote || useVoteSteal)
                                                ? 'hover:ring-4 hover:ring-green-500 cursor-crosshair' 
                                                : iVotedFor ? 'ring-4 ring-red-600 scale-105' : lobby.twistData?.type === 'purge' ? 'ring-2 ring-red-500 hover:ring-4 hover:scale-105' : 'hover:scale-105';

                                             return (
                                                 <button 
                                                    key={p.uid} 
                                                    onClick={() => submitVote(p.uid)}
                                                    disabled={lobby.twistData?.type === 'killer' && user.uid !== lobby.twistData.killerId}
                                                    className={`relative group rounded-xl overflow-hidden aspect-[3/4] transition-all opacity-80 hover:opacity-100 ${ringClass} ${lobby.twistData?.type === 'killer' && user.uid !== lobby.twistData.killerId ? 'cursor-not-allowed opacity-50' : ''}`}
                                                 >
                                                     <img src={p.character.img} className="w-full h-full object-cover"/>
                                                     
                                                     <div className={`absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity font-black text-xl tracking-widest bg-black/60 ${(useExtraVote || useVoteSteal) ? 'text-green-400' : 'text-red-500'}`}>
                                                         {(useExtraVote || useVoteSteal) ? "+1 VOTO" : "VOTA"}
                                                     </div>
                                                     
                                                     {!(useExtraVote || useVoteSteal) && iVotedFor && <div className="absolute inset-0 flex items-center justify-center bg-red-600/50 font-black text-white">VOTATO</div>}
                                                 </button>
                                             )
                                         })}
                                     </div>
                                 )}
                                 <div className="mt-8 text-slate-500 italic">Attendi che l'host chiuda le votazioni...</div>
                               </>
                             )}
                         </div>
                     )}

                     {lobby.phase === 'ceremony' && lobby.ceremonyData && (
                         <div className="flex flex-col items-center justify-center min-h-[50vh]">
                             {lobby.ceremonyData.tieMatch ? (
                                 <div className="text-center">
                                     <h2 className="text-3xl font-black text-red-500 mb-4 animate-bounce">PAREGGIO!</h2>
                                     <p className="mb-6">Spareggio dadi: Chi fa il numero più basso ESCE.</p>
                                     
                                     {(lobby.ceremonyData.tieMatch.candidates || []).includes(user.uid) && !lobby.ceremonyData.tieMatch.rolls[user.uid] && (
                                         <button onClick={handleTieBreakRoll} className="bg-red-600 text-white px-8 py-4 rounded-xl font-black text-xl mb-8 animate-pulse shadow-xl">
                                             LANCIA DADO SALVEZZA
                                         </button>
                                     )}

                                     <div className="flex gap-8 justify-center">
                                         {lobby.ceremonyData.tieMatch.candidates.map(uid => {
                                             const p = lobby.players.find(pl => pl.uid === uid);
                                             if (!p) return null; // FIX SCHERMO NERO
                                             const roll = lobby.ceremonyData.tieMatch.rolls[uid];
                                             return (
                                                 <div key={uid} className="bg-slate-800 p-6 rounded-xl flex flex-col items-center border-2 border-slate-600">
                                                     <img src={p.character.img} className="w-24 h-24 rounded-full mb-4 border-4 border-slate-500 object-cover"/>
                                                     <div className="text-xl font-bold mb-2">{p.name}</div>
                                                     {roll ? (
                                                         <div className="text-4xl font-black text-yellow-400">{roll}</div>
                                                     ) : (
                                                         <div className="text-slate-500 italic animate-pulse">Sta lanciando...</div>
                                                     )}
                                                 </div>
                                             )
                                         })}
                                     </div>
                                 </div>
                             ) : (
                                 <>
                                 {/* POPUP IDOLO GIGANTE */}
                                 {lobby.ceremonyData.idolPlayedBy && lobby.ceremonyData.finalReveal && (
                                     <div className="absolute inset-0 z-50 flex items-center justify-center pointer-events-none">
                                         <div className="bg-gradient-to-b from-yellow-300 to-yellow-600 p-12 rounded-[3rem] border-8 border-white shadow-[0_0_100px_rgba(250,204,21,1)] text-center animate-[bounce_2s_infinite] transform scale-125">
                                             <Gem size={100} className="text-white mx-auto mb-4 drop-shadow-md"/>
                                             <h2 className="text-5xl font-black text-white uppercase drop-shadow-xl leading-tight" style={{ WebkitTextStroke: '2px #b45309' }}>IDOLO<br/>GIOCATO!</h2>
                                             <p className="mt-4 text-yellow-900 font-bold text-xl uppercase bg-white/80 px-4 py-1 rounded-full">I VOTI SONO ANNULLATI!</p>
                                         </div>
                                     </div>
                                 )}

                                 <Flame size={64} className="text-orange-500 animate-pulse mb-4" />
                                 {lobby.ceremonyData.isDoubleElimination && <div className="text-3xl font-black text-red-500 mb-2">DOPPIA ELIMINAZIONE!</div>}
                                 {lobby.ceremonyData.isOpenVote && <div className="text-xl font-black text-red-400 mb-2 bg-black/40 px-4 rounded animate-pulse">VOTI PALESI</div>}
                                 <h2 className="text-3xl font-black text-white mb-6">IL FUOCO DECIDE</h2>
                                 
                                 <div className="flex flex-wrap justify-center gap-2 mb-8 max-w-3xl">
                                     {lobby.ceremonyData.safe.slice(0, lobby.ceremonyData.revealedCount).map(uid => {
                                         const p = lobby.players.find(pl => pl.uid === uid);
                                         if (!p) return null; // FIX SCHERMO NERO
                                         const votes = lobby.ceremonyData.voteCounts?.[uid] || 0;
                                         return (
                                             <div key={uid} className="bg-green-600/20 border border-green-500 p-2 rounded flex flex-col items-center min-w-[80px] animate-in fade-in zoom-in">
                                                 <div className="flex items-center gap-2 mb-1">
                                                     <img src={p.character.img} className="w-8 h-8 rounded-full object-cover"/>
                                                     <span className="font-bold text-sm">{p.name}</span>
                                                 </div>
                                                 <div className="text-xs bg-black/40 px-2 rounded-full text-slate-300">
                                                     {votes} voti
                                                 </div>
                                             </div>
                                         );
                                     })}
                                 </div>
                                 
                                 {lobby.ceremonyData.revealedCount >= lobby.ceremonyData.safe.length && (
                                     <div className="flex gap-8 items-center mt-4">
                                         {lobby.ceremonyData.bottomTwo.map(uid => {
                                             const p = lobby.players.find(pl => pl.uid === uid);
                                             if (!p) return null; // FIX SCHERMO NERO
                                             const isEliminated = lobby.ceremonyData.finalReveal && ((Array.isArray(lobby.ceremonyData.eliminated) && lobby.ceremonyData.eliminated.includes(uid)) || (uid === lobby.ceremonyData.eliminated));
                                             
                                             let isSavedByIdol = false;
                                             if (lobby.ceremonyData.finalReveal && lobby.idolData?.activeEffects?.idolPlayedThisRound) {
                                                isSavedByIdol = lobby.idolData.activeEffects.idolPlayedThisRound.includes(uid);
                                             } else if (lobby.ceremonyData.finalReveal && lobby.ceremonyData.idolPlayedBy === uid) {
                                                isSavedByIdol = true;
                                             }

                                             const isSafe = lobby.ceremonyData.finalReveal && !isEliminated && !isSavedByIdol;
                                             const votes = lobby.ceremonyData.voteCounts?.[uid] || 0;
                                             const showVotes = isEliminated || (isSafe && lobby.ceremonyData.finalReveal) || isSavedByIdol;
                                             const isMe = p.uid === user.uid;

                                             return (
                                                 <div key={uid} className={`flex flex-col items-center transition-all duration-1000 ${isEliminated ? 'opacity-50 grayscale scale-90' : isSavedByIdol ? 'scale-110 ring-8 ring-yellow-400 rounded-xl z-40' : isSafe ? 'scale-110 ring-4 ring-green-500 rounded-xl' : ''}`}>
                                                     <img src={p.character.img} className="w-32 h-32 object-cover rounded-xl border-4 border-white shadow-2xl"/>
                                                     <div className={`font-black text-xl mt-2 px-2 rounded bg-black/50`}>{p.name} {isMe && "(TU)"}</div>
                                                     <div className={`font-mono font-bold mt-1 text-lg ${isSavedByIdol ? 'text-slate-500 line-through decoration-red-500 decoration-4' : 'text-yellow-400'}`}>
                                                         {showVotes ? `${votes} voti` : "?"}
                                                     </div>
                                                     {showVotes && lobby.ceremonyData.isOpenVote && lobby.ceremonyData.votersMap?.[uid] && (
                                                         <div className="text-[10px] text-slate-300 max-w-[120px] text-center mt-1 bg-black/50 p-1 rounded animate-in zoom-in">
                                                             <span className="text-red-400 font-bold">Votato da:</span><br/>
                                                             {lobby.ceremonyData.votersMap[uid].join(", ")}
                                                         </div>
                                                     )}
                                                     {isEliminated && <div className="text-red-500 font-black text-2xl mt-2 rotate-12 border-4 border-red-500 px-4 rounded-xl bg-black">ELIMINATO</div>}
                                                 </div>
                                             )
                                         })}
                                     </div>
                                 )}
                                 </>
                             )}
                         </div>
                     )}

                     {lobby.phase === 'final_showdown' && lobby.finalData && (
                         <div className="flex flex-col items-center h-full">
                             <h1 className="text-4xl font-black text-yellow-400 mb-8 uppercase tracking-widest">GRAN FINALE</h1>
                             
                             <div className="flex items-center justify-center gap-12 w-full max-w-4xl mb-12">
                                 <div className="text-center">
                                     <img src={activePlayers[0].character.img} className="w-32 h-32 rounded-full border-4 border-blue-500 object-cover mb-4"/>
                                     <h2 className="text-2xl font-bold">{activePlayers[0].name}</h2>
                                     
                                     {lobby.finalData.currentRolls?.[activePlayers[0].uid] ? (
                                         <div className="text-4xl font-black text-white bg-blue-600 p-4 rounded-xl mt-4 animate-in zoom-in">
                                             {lobby.finalData.currentRolls[activePlayers[0].uid]}
                                         </div>
                                     ) : (
                                         <div className="text-slate-500 mt-4 italic animate-pulse">Lancio in corso...</div>
                                     )}

                                     <div className="text-6xl font-black mt-2 text-blue-400">{lobby.finalData.p1Score}</div>
                                 </div>
                                 
                                 <div className="text-4xl font-black text-slate-600">VS</div>

                                 <div className="text-center">
                                     <img src={activePlayers[1].character.img} className="w-32 h-32 rounded-full border-4 border-red-500 object-cover mb-4"/>
                                     <h2 className="text-2xl font-bold">{activePlayers[1].name}</h2>
                                     
                                     {lobby.finalData.currentRolls?.[activePlayers[1].uid] ? (
                                         <div className="text-4xl font-black text-white bg-red-600 p-4 rounded-xl mt-4 animate-in zoom-in">
                                             {lobby.finalData.currentRolls[activePlayers[1].uid]}
                                         </div>
                                     ) : (
                                         <div className="text-slate-500 mt-4 italic animate-pulse">Lancio in corso...</div>
                                     )}

                                     <div className="text-6xl font-black mt-2 text-red-400">{lobby.finalData.p2Score}</div>
                                 </div>
                             </div>

                             {activePlayers.find(p => p.uid === user.uid) && !lobby.finalData.currentRolls?.[user.uid] && (
                                 <button onClick={handleFinalRoll} className="bg-gradient-to-r from-yellow-500 to-orange-500 text-black font-black text-2xl py-4 px-12 rounded-full shadow-lg hover:scale-105 transition flex items-center gap-4 animate-bounce">
                                     <Dices size={32}/> LANCIA IL TUO DADO
                                 </button>
                             )}
                             
                             {isHost && 
                              lobby.finalData.currentRolls && 
                              Object.keys(lobby.finalData.currentRolls).length >= 2 && (
                                 <button onClick={resolveFinalRound} className="bg-green-600 text-white font-black text-xl py-3 px-8 rounded-full shadow-lg hover:scale-105 transition flex items-center gap-2 mt-8 animate-pulse">
                                     <Award size={24}/> ASSEGNA PUNTO
                                 </button>
                             )}

                             <div className="mt-4 text-slate-400">Vince chi arriva prima a 3 vittorie!</div>
                         </div>
                     )}

                     {lobby.phase === 'game_over' && (
                         <div className="flex flex-col items-center h-full justify-center">
                             <h1 className="text-5xl font-black text-yellow-400 mb-8">CLASSIFICA FINALE</h1>
                             
                             <div className="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-7xl h-[70vh]">
                                 <div className="flex-1 bg-slate-800 rounded-xl overflow-hidden shadow-2xl border border-slate-700 flex flex-col">
                                     <div className="bg-slate-700/50 p-4 border-b border-slate-600 text-center font-bold text-yellow-400 uppercase tracking-widest sticky top-0">
                                         Piazzamenti
                                     </div>
                                     <div className="flex-1 overflow-y-auto no-scrollbar">
                                         {lobby.rankings.slice().reverse().map((r, i) => {
                                             const charImg = ROSTER.find(c => c.name === r.name)?.img || "";
                                             return (
                                                 <div key={i} className={`flex items-center justify-between p-4 border-b border-slate-700 ${i === 0 ? 'bg-gradient-to-r from-yellow-500/20 to-transparent' : 'hover:bg-slate-700/50'}`}>
                                                     <div className="flex items-center gap-4">
                                                         <div className={`font-black text-xl w-8 text-center flex-shrink-0 ${i === 0 ? 'text-yellow-400 scale-125' : 'text-slate-500'}`}>
                                                            {i === 0 ? <Crown size={24} className="mx-auto"/> : i+1}
                                                         </div>
                                                         
                                                         <div className="w-12 h-12 rounded-full overflow-hidden border-2 border-slate-600 flex-shrink-0">
                                                            {charImg && <img src={charImg} className="w-full h-full object-cover"/>}
                                                         </div>

                                                         <div>
                                                             <div className={`font-bold text-lg ${i === 0 ? 'text-yellow-100' : 'text-white'}`}>{r.name}</div>
                                                             <div className="text-xs text-slate-400 uppercase flex items-center gap-2">
                                                                <span>{r.season} • {r.team}</span>
                                                             </div>
                                                         </div>
                                                     </div>
                                                 </div>
                                             )
                                         })}
                                     </div>
                                 </div>

                                 <div className="flex-1 bg-slate-800 rounded-xl overflow-hidden shadow-2xl border border-slate-700 flex flex-col">
                                     <div className="bg-slate-700/50 p-4 border-b border-slate-600 text-center font-bold text-red-400 uppercase tracking-widest sticky top-0 flex items-center justify-center gap-2">
                                         <Target size={20}/> Classifica Bersagli (Voti)
                                     </div>
                                     <div className="flex-1 overflow-y-auto no-scrollbar">
                                         {(() => {
                                            const sortedByVotes = [...lobby.rankings].sort((a, b) => (b.votes || 0) - (a.votes || 0));
                                            
                                            return sortedByVotes.map((r, i) => {
                                                const charImg = ROSTER.find(c => c.name === r.name)?.img || "";
                                                return (
                                                 <div key={i} className="flex items-center justify-between p-4 border-b border-slate-700 hover:bg-slate-700/50">
                                                     <div className="flex items-center gap-4">
                                                         <div className="font-bold text-slate-500 w-6 text-center">{i+1}</div>
                                                         <div className="w-10 h-10 rounded-full overflow-hidden border border-slate-600 flex-shrink-0 grayscale opacity-80">
                                                            {charImg && <img src={charImg} className="w-full h-full object-cover"/>}
                                                         </div>
                                                         <div className="font-bold text-white">{r.name}</div>
                                                     </div>
                                                     <div className="font-black text-xl text-red-400 flex items-center gap-1">
                                                         {r.votes} <Vote size={16}/>
                                                     </div>
                                                 </div>
                                                )
                                            })
                                         })()}
                                     </div>
                                 </div>

                                 <div className="flex-1 bg-slate-800 rounded-xl overflow-hidden shadow-2xl border border-slate-700 flex flex-col">
                                     <div className="bg-slate-700/50 p-4 border-b border-slate-600 text-center font-bold text-green-400 uppercase tracking-widest sticky top-0 flex items-center justify-center gap-2">
                                         <Shield size={20}/> Classifica Bestie (Immunità)
                                     </div>
                                     <div className="flex-1 overflow-y-auto no-scrollbar">
                                         {(() => {
                                            const sortedByWins = [...lobby.rankings].sort((a, b) => (b.immunities || 0) - (a.immunities || 0));
                                            
                                            return sortedByWins.map((r, i) => {
                                                if ((r.immunities || 0) === 0) return null; 
                                                const charImg = ROSTER.find(c => c.name === r.name)?.img || "";
                                                return (
                                                 <div key={i} className="flex items-center justify-between p-4 border-b border-slate-700 hover:bg-slate-700/50">
                                                     <div className="flex items-center gap-4">
                                                         <div className="font-bold text-slate-500 w-6 text-center">{i+1}</div>
                                                         <div className="w-10 h-10 rounded-full overflow-hidden border border-slate-600 flex-shrink-0">
                                                            {charImg && <img src={charImg} className="w-full h-full object-cover"/>}
                                                         </div>
                                                         <div className="font-bold text-white">{r.name}</div>
                                                     </div>
                                                     <div className="font-black text-xl text-green-400 flex items-center gap-1">
                                                         {r.immunities} <Trophy size={16}/>
                                                     </div>
                                                 </div>
                                                )
                                            })
                                         })()}
                                     </div>
                                 </div>

                             </div>
                         </div>
                     )}

                  </div> {/* Chiude l'area scrollabile delle fasi */}
               </div> {/* Chiude la colonna centrale del gioco */}

               {/* SIDEBAR DELLA CHAT (visibile durante tutta la partita) */}
               <div className="hidden md:flex w-80 bg-slate-900/90 border-l border-slate-700 flex-col z-20 flex-shrink-0 h-full">
                  <div className="p-3 bg-slate-800/90 border-b border-slate-700 font-bold flex items-center gap-2">
                     <MessageSquare size={18} /> Chat dell'Isola
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar" ref={chatRef}>
                     {lobby.chat.map((msg, i) => (
                        <div key={i} className={`flex flex-col ${msg.sender === myPlayer.name ? 'items-end' : 'items-start'}`}>
                           <div className="text-[10px] text-slate-400 mb-1">{msg.sender} • {msg.team}</div>
                           <div className={`px-3 py-2 rounded-xl text-sm max-w-[85%] ${msg.sender === myPlayer.name ? 'bg-blue-600 text-white rounded-br-none shadow-md' : 'bg-slate-700 text-slate-200 rounded-bl-none shadow-md'}`}>
                              {msg.text}
                           </div>
                        </div>
                     ))}
                  </div>
                  {myPlayer && (
                     <form onSubmit={sendChat} className="p-3 bg-slate-800/90 border-t border-slate-700 flex gap-2">
                        <input 
                            type="text" 
                            value={chatInput} 
                            onChange={e => setChatInput(e.target.value)} 
                            placeholder="Scrivi al gruppo..." 
                            className="flex-1 bg-slate-900 border border-slate-600 rounded-full px-4 py-2 text-sm focus:border-yellow-500 outline-none text-white transition-colors" 
                            maxLength={100}
                        />
                        <button 
                            type="submit" 
                            disabled={!chatInput.trim()} 
                            className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 w-10 h-10 rounded-full flex items-center justify-center transition-colors text-white shadow-lg"
                        >
                           <Send size={16} />
                        </button>
                     </form>
                  )}
               </div>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
