                const nominatedTeams = lobbyState.losingTeam || [];
                activeTeams.forEach(t => {
                    const isBotTeam = lobbyState.players.filter(p => p.team === t && p.status === 'active').every(p => p.isBot);
                    if (isBotTeam) {
                        const validTargets = nominatedTeams.filter(nom => nom !== t);
                        if (validTargets.length > 0) {
                            votes[t] = validTargets[Math.floor(Math.random() * validTargets.length)];
                        }
                    }
                });
                return votes;
            }

            let activeBots = lobbyState.players.filter(p => { 
                if (!p.isBot || p.status !== 'active') return false;
                if (lobbyState.idolData?.activeEffects?.safetyUsedRound === lobbyState.round && lobbyState.idolData.activeEffects.safetyHolder === p.uid) return false;
                if (isMerge || lobbyState.twistData?.type === 'joint_ceremony') return true; 
                return p.team === lobbyState.losingTeam;
            });

            if (lobbyState.twistData?.type === 'killer') {
                const killerId = lobbyState.twistData.killerId;
                const killerBot = activeBots.find(b => b.uid === killerId);
                if (!killerBot) return {};
                activeBots = [killerBot];
            }

            let candidates = [];
            
            if (lobbyState.twistData?.type === 'purge') {
                candidates = lobbyState.players.filter(p => p.status === 'active' && lobbyState.twistData.targets.includes(p.uid) && !p.legacyImmunityActive);
            } else if (isMerge) {
                candidates = lobbyState.players.filter(p => p.status === 'active' && !(lobbyState.immunity || []).includes(p.uid) && !p.legacyImmunityActive);
            } else {
                candidates = lobbyState.players.filter(p => p.status === 'active' && p.team === lobbyState.losingTeam && !(lobbyState.immunity || []).includes(p.uid) && !p.legacyImmunityActive);
            }

            if (lobbyState.idolData?.activeEffects?.safetyUsedRound === lobbyState.round) {
                candidates = candidates.filter(p => p.uid !== lobbyState.idolData.activeEffects.safetyHolder);
            }

            activeBots.forEach(bot => {
                let targets = candidates.filter(t => t.uid !== bot.uid);
                
                if (targets.length === 0 && candidates.length > 0) targets = [bot]; 
                if (targets.length === 0) return;

                targets.sort(() => Math.random() - 0.5);

                const targetsWithScore = targets.map(t => ({
                    uid: t.uid,
                    score: bot.relationships[t.uid] || 0
                }));

                const minScore = Math.min(...targetsWithScore.map(t => t.score));
                const potentialVictims = targetsWithScore.filter(t => t.score === minScore);
                const victim = potentialVictims[Math.floor(Math.random() * potentialVictims.length)];
                
                if (victim) {
                    votes[bot.uid] = victim.uid; 
                }
            });
            return votes;
          };

          const calculateCeremonyResults = (lobbyState, currentVotes, isMerge, isDoubleElimination = false) => {
              const counts = {};
              const activePlayers = lobbyState.players.filter(p => p.status === 'active');
              
              let validTargetIds = [];
              if (lobbyState.twistData?.type === 'purge') {
                  validTargetIds = lobbyState.twistData.targets.filter(id => lobbyState.players.find(p => p.uid === id)?.status === 'active');
              } else {
                  validTargetIds = isMerge 
                    ? activePlayers.filter(p => !(lobbyState.immunity || []).includes(p.uid)).map(p => p.uid)
                    : activePlayers.filter(p => p.team === lobbyState.losingTeam).map(p => p.uid);
              }

              validTargetIds = validTargetIds.filter(id => !lobbyState.players.find(p => p.uid === id)?.legacyImmunityActive);

              if (lobbyState.idolData?.activeEffects?.safetyUsedRound === lobbyState.round) {
                  validTargetIds = validTargetIds.filter(id => id !== lobbyState.idolData.activeEffects.safetyHolder);
              }

              if (validTargetIds.length === 0) {
                  // FIX SCHERMO NERO: Se non c'è più nessuno votabile (es. tutti immuni), annulla per evitare il crash
                  return { safe: shuffledTargets, bottomTwo: [], eliminated: [], voteCounts: counts, tie: null };
              }

              const voteStealUsed = lobbyState.idolData?.activeEffects?.voteStealUsedRound === lobbyState.round;
              const voteStealHolder = lobbyState.idolData?.activeEffects?.voteStealHolder;
              const voteStealVictim = lobbyState.idolData?.activeEffects?.voteStealVictim;

              Object.entries(currentVotes).forEach(([voterId, tId]) => {
                  if (voteStealUsed && voterId === voteStealVictim) {
                      return; 
                  }

                  if (validTargetIds.includes(tId)) {
                      counts[tId] = (counts[tId] || 0) + 1;

                      const voterObj = lobbyState.players.find(p => p.uid === voterId);
                      if (voterObj?.legacyDoubleVoteActive) {
                          counts[tId] += 1;
                      }

                      if (lobbyState.idolData?.activeEffects?.extraVoteUsedRound === lobbyState.round &&
                          (lobbyState.idolData?.activeEffects?.extraVoteUsers || []).includes(voterId)) {
                              counts[tId] += 1;
                      }

                      if (voteStealUsed && voterId === voteStealHolder) {
                          counts[tId] += 1;
                      }
                  }
              });

              let shuffledTargets = [...validTargetIds];
              for (let i = shuffledTargets.length - 1; i > 0; i--) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [shuffledTargets[i], shuffledTargets[j]] = [shuffledTargets[j], shuffledTargets[i]];
              }

              let victims = Object.keys(counts);
              for (let i = victims.length - 1; i > 0; i--) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [victims[i], victims[j]] = [victims[j], victims[i]];
              }
              const sortedVictims = victims.sort((a, b) => counts[b] - counts[a]);
              
              if (sortedVictims.length === 0 && validTargetIds.length > 0) {
                  const rnd = shuffledTargets[0];
                  let bottomTwo = [rnd];
                  if (shuffledTargets.length > 1) bottomTwo.push(shuffledTargets[1]);
                  return { safe: shuffledTargets.filter(id => !bottomTwo.includes(id)), bottomTwo, eliminated: [rnd], voteCounts: counts, tie: null };
              }

              const maxVotes = counts[sortedVictims[0]];
              const ties = sortedVictims.filter(id => counts[id] === maxVotes);
              
              if (ties.length > 1) {
                  if (!isDoubleElimination || (isDoubleElimination && ties.length > 2)) { 
                     let tieBottom = [...ties];
                     let safe = shuffledTargets.filter(id => !tieBottom.includes(id));
                     safe.sort((a, b) => (counts[a] || 0) - (counts[b] || 0));
                     return { safe, bottomTwo: tieBottom, eliminated: null, voteCounts: counts, tie: ties };
                  }
              }

              if (isDoubleElimination && sortedVictims.length >= 2) {
                   const elim1 = sortedVictims[0];
                   const elim2 = sortedVictims[1];
                   
                   let bottomTwo = sortedVictims.slice(0, 2);
                   const safe = shuffledTargets.filter(id => !bottomTwo.includes(id));
                   safe.sort((a, b) => (counts[a] || 0) - (counts[b] || 0));

                   if(ties.length === 2 && counts[sortedVictims[2]] < ties[0]) {
                      return { safe, bottomTwo: ties, eliminated: ties, voteCounts: counts, tie: null };
                   } else {
                       return { safe, bottomTwo, eliminated: [elim1, elim2], voteCounts: counts, tie: null };
                   }
              }

              const elimId = sortedVictims[0];
              let bottomTwo = sortedVictims.slice(0, 2);
              
              if (bottomTwo.length < 2 && shuffledTargets.length >= 2) {
                  const zeroVotePerson = shuffledTargets.find(id => id !== elimId);
                  if (zeroVotePerson) bottomTwo.push(zeroVotePerson);
              } else if (elimId && !bottomTwo.includes(elimId)) {
                  bottomTwo.push(elimId); 
              }
              
              let safe = shuffledTargets.filter(id => !bottomTwo.includes(id));
              safe.sort((a, b) => (counts[a] || 0) - (counts[b] || 0)); 
              
              for (let i = bottomTwo.length - 1; i > 0; i--) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [bottomTwo[i], bottomTwo[j]] = [bottomTwo[j], bottomTwo[i]];
              }
              
              return { safe, bottomTwo, eliminated: [elimId], voteCounts: counts, tie: null };
          };

          const handleInteraction = async (type, payload = null) => { 
              const targetId = selectedPlayer?.uid;
              if (!targetId || lobby.phase !== 'social' || hasActed || myPlayer.status === 'eliminated') return;
              
              let msg = "";
              let updatedPlayers = [...lobby.players];
              const targetIdx = updatedPlayers.findIndex(p => p.uid === targetId);
              const myIdx = updatedPlayers.findIndex(p => p.uid === user.uid); 
              const targetName = updatedPlayers[targetIdx].name; 
              const actorName = myPlayer.name;
              
              if (type === 'friend') {
                  if (Math.random() > 0.5) {
                      const newVal = Math.min(5, (updatedPlayers[targetIdx].relationships[user.uid] || 0) + 1);
                      updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [user.uid]: newVal };
                      msg = `Hai stretto amicizia con ${updatedPlayers[targetIdx].name}.`;
                  } else msg = `${updatedPlayers[targetIdx].name} ti ha ignorato.`;
              } 
              else if (type === 'rumor') {
                  const victimId = payload;
                  const victim = updatedPlayers.find(p => p.uid === victimId);
                  
                  if (!victim) {
                       msg = "Errore: bersaglio non trovato.";
                  } else {
                      if (Math.random() > 0.5) {
                          const currentRel = updatedPlayers[targetIdx].relationships[victimId] || 0;
                          updatedPlayers[targetIdx].relationships = { 
                              ...updatedPlayers[targetIdx].relationships, 
                              [victimId]: Math.max(-5, currentRel - 1) 
                          };
                          msg = `🤫 Pssst! Hai messo zizzania con successo. ${targetName} ora guarda male ${victim.name} (-1).`;
                      } else {
                          const currentRel = updatedPlayers[targetIdx].relationships[user.uid] || 0;
                          updatedPlayers[targetIdx].relationships = { 
                              ...updatedPlayers[targetIdx].relationships, 
                              [user.uid]: Math.max(-5, currentRel - 1) 
                          };
                          msg = `😓 Hai provato a spettegolare su ${victim.name}, ma ${targetName} ti ha scoperto! (Relazione -1)`;
                      }
                  }
              }
              else if (type === 'sabotage') {
                  if (!isMerge) return; 

                  if (Math.random() < 0.5) {
                      updatedPlayers[targetIdx].nextRollNerf = true;
                      msg = `🔧 Hai sabotato l'attrezzatura di ${targetName}! Alla prossima sfida avrà difficoltà (Roll 1-4).`;
                  } else {
                      updatedPlayers[myIdx].nextRollNerf = true;
                      updatedPlayers[targetIdx].relationships[user.uid] = (updatedPlayers[targetIdx].relationships[user.uid] || 0) - 3;
                      msg = `💥 Disastro! ${targetName} ti ha beccato a sabotare! Per ritorsione ha rotto la TUA attrezzatura (Roll 1-4 per te).`;
                  }
              }
              else if (type === 'alliance_trio') {
                  const thirdId = payload;
                  const thirdIdx = updatedPlayers.findIndex(p => p.uid === thirdId);
                  const thirdName = updatedPlayers[thirdIdx].name;

                  if (Math.random() < 0.30) {
                      const myAllies = [...(updatedPlayers[myIdx].alliances || []), targetId, thirdId];
                      const targetAllies = [...(updatedPlayers[targetIdx].alliances || []), user.uid, thirdId];
                      const thirdAllies = [...(updatedPlayers[thirdIdx].alliances || []), user.uid, targetId];

                      updatedPlayers[myIdx].alliances = [...new Set(myAllies)];
                      updatedPlayers[targetIdx].alliances = [...new Set(targetAllies)];
                      updatedPlayers[thirdIdx].alliances = [...new Set(thirdAllies)];

                      updatedPlayers[myIdx].relationships[targetId] = (updatedPlayers[myIdx].relationships[targetId] || 0) + 3;
                      updatedPlayers[targetIdx].relationships[user.uid] = (updatedPlayers[targetIdx].relationships[user.uid] || 0) + 3;
                      
                      updatedPlayers[myIdx].relationships[thirdId] = (updatedPlayers[myIdx].relationships[thirdId] || 0) + 3;
                      updatedPlayers[thirdIdx].relationships[user.uid] = (updatedPlayers[thirdIdx].relationships[user.uid] || 0) + 3;

                      updatedPlayers[targetIdx].relationships[thirdId] = (updatedPlayers[targetIdx].relationships[thirdId] || 0) + 3;
                      updatedPlayers[thirdIdx].relationships[targetId] = (updatedPlayers[thirdIdx].relationships[targetId] || 0) + 3;

                      msg = `🤝 PATTO DI SANGUE! Hai formato una POTENTE Alleanza a 3 con ${targetName} e ${thirdName}! (Tutti +3 Relazione)`;
                  } else {
                      updatedPlayers[targetIdx].relationships[user.uid] = (updatedPlayers[targetIdx].relationships[user.uid] || 0) - 1; 
                      updatedPlayers[thirdIdx].relationships[user.uid] = (updatedPlayers[thirdIdx].relationships[user.uid] || 0) - 1; 
                      
                      msg = `💔 Hai proposto un trio a ${targetName} e ${thirdName}, ma non si fidano abbastanza. È stato imbarazzante. (-1 Relazione)`;
                  }
              }
              else if (type === 'suckup') {
                  if (Math.random() < 0.60) {
                      const currentRel = updatedPlayers[targetIdx].relationships[user.uid] || 0;
                      updatedPlayers[targetIdx].relationships = { 
                          ...updatedPlayers[targetIdx].relationships, 
                          [user.uid]: Math.min(10, currentRel + 2) 
                      };
                      msg = `👅 Hai fatto il leccapiedi con ${targetName}. I tuoi complimenti esagerati hanno funzionato! (+2 Relazione)`;
                  } else {
                      const tRel = updatedPlayers[targetIdx].relationships[user.uid] || 0;
                      updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [user.uid]: tRel - 1 };

                      let potentialWitnesses = updatedPlayers.filter(p => p.isBot && p.uid !== targetId && p.uid !== user.uid && p.status === 'active');
                      potentialWitnesses.sort(() => Math.random() - 0.5); 
                      
                      const numWitnesses = Math.floor(Math.random() * 2) + 2; 
                      const witnesses = potentialWitnesses.slice(0, numWitnesses);
                      
                      const witnessNames = [];
                      witnesses.forEach(w => {
                          const wIdx = updatedPlayers.findIndex(p => p.uid === w.uid);
                          const wRel = updatedPlayers[wIdx].relationships[user.uid] || 0;
                          updatedPlayers[wIdx].relationships = { ...updatedPlayers[wIdx].relationships, [user.uid]: wRel - 1 };
                          witnessNames.push(w.name);
                      });

                      msg = `😬 Che imbarazzo! ${targetName} non ha abboccato, e ${witnessNames.join(", ")} ti hanno visto fare il viscido! (-1 Relazione con tutti)`;
                  }
              }
              else if (type === 'flirt') {
                  if (Math.random() < 0.40) {
                      updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [user.uid]: 15 };
                      updatedPlayers[myIdx].relationships = { ...updatedPlayers[myIdx].relationships, [targetId]: 15 };
                      
                      const p1Allies = [...(updatedPlayers[targetIdx].alliances || []), user.uid];
                      const p2Allies = [...(updatedPlayers[myIdx].alliances || []), targetId];
                      
                      updatedPlayers[targetIdx].alliances = [...new Set(p1Allies)];
                      updatedPlayers[myIdx].alliances = [...new Set(p2Allies)];

                      msg = `😍 Incredibile! Hai flirtato con ${targetName} ed è andata alla grande! Ora siete FIDANZATI e Alleati! (Relazione +15)`;
                  } else {
                      const currentRel = updatedPlayers[targetIdx].relationships[user.uid] || 0;
                      updatedPlayers[targetIdx].relationships = { 
                          ...updatedPlayers[targetIdx].relationships, 
                          [user.uid]: Math.max(-10, currentRel - 1) 
                      };
                      msg = `😳 Hai provato a flirtare con ${targetName}... che imbarazzo! Ti ha respinto. (Relazione -1)`;
                  }
              }
              else if (type === 'callout') {
                  if (Math.random() > 0.4) {
                     const randomOther = updatedPlayers.find(p => p.isBot && p.uid !== targetId && p.uid !== user.uid);
                     if (randomOther) {
                         const rIdx = updatedPlayers.findIndex(p => p.uid === randomOther.uid);
                         updatedPlayers[rIdx].relationships = { ...updatedPlayers[rIdx].relationships, [targetId]: Math.max(-5, (updatedPlayers[rIdx].relationships[targetId] || 0) - 2) };
                         msg = `📢 ${targetName}! ${actorName} ha fatto un Call Out contro di te (Riuscito)!`;
                     } else msg = `Call Out di ${actorName}: nessuno ha ascoltato.`;
                  } else { 
                     updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [user.uid]: Math.max(-5, (updatedPlayers[targetIdx].relationships[user.uid] || 0) - 2) };
                     msg = `📢 ${targetName}! ${actorName} ha provato un Call Out contro di te (Fallito)!`;
                  }
              }
              else if (type === 'threaten') {
                  const myThreats = updatedPlayers[myIdx].threatenedPlayers || [];
                  
                  if (myThreats.includes(targetId)) {
                      return; 
                  }

                  updatedPlayers[myIdx] = {
                      ...updatedPlayers[myIdx],
                      threatenedPlayers: [...myThreats, targetId]
                  };

                  if (Math.random() < 0.30) {
                      updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [user.uid]: 10 };
                      msg = `☠️ Hai minacciato ${targetName}! (SUCCESSO) Per paura, ti obbedirà ciecamente (Relazione +10).`;
                  } else {
                      updatedPlayers[targetIdx].relationships = { ...updatedPlayers[targetIdx].relationships, [user.uid]: -10 };
                      msg = `💢 La minaccia è fallita! ${targetName} non ha paura di te e ora ti vuole fuori (Relazione -10).`;
                  }
              }
              else if (type === 'alliance') {
                 if ((updatedPlayers[targetIdx].relationships[user.uid] || 0) <= 0) {
                     msg = `${updatedPlayers[targetIdx].name} ha rifiutato l'alleanza. (Devi essere amico!)`;
                 }
                 
                 const currentAlliances = Array.isArray(updatedPlayers[targetIdx].alliances) ? updatedPlayers[targetIdx].alliances : [];
                 const myAlliances = Array.isArray(myPlayer.alliances) ? myPlayer.alliances : [];

                 if ((updatedPlayers[targetIdx].relationships[user.uid] || 0) > 0 && Math.random() > 0.5) {
                     const p1Allies = [...currentAlliances, user.uid];
                     const p2Allies = [...myAlliances, targetId];
                     
                     updatedPlayers[targetIdx].alliances = [...new Set(p1Allies)];
                     updatedPlayers.find(p => p.uid === user.uid).alliances = [...new Set(p2Allies)];
                     
                     msg = `Alleanza formata con ${updatedPlayers[targetIdx].name}!`;
                 } else if ((updatedPlayers[targetIdx].relationships[user.uid] || 0) > 0) {
                    msg = `${updatedPlayers[targetIdx].name} ha rifiutato l'alleanza.`;
                 }
              }
              // --- NUOVE ABILITÀ DI FAZIONE ---
              else if (type === 'doppio_gioco') {
                  const [t1Id, t2Id] = payload;
                  const t1Idx = updatedPlayers.findIndex(p => p.uid === t1Id);
                  const t2Idx = updatedPlayers.findIndex(p => p.uid === t2Id);
                  
                  let msgParts = [];
                  let failed = false;
                  
                  if (Math.random() < 0.6) {
                      updatedPlayers[t1Idx].relationships[user.uid] = Math.min(10, (updatedPlayers[t1Idx].relationships[user.uid] || 0) + 2);
                      msgParts.push(`Successo con ${updatedPlayers[t1Idx].name} (+2)`);
                  } else {
                      updatedPlayers[t1Idx].relationships[user.uid] = Math.max(-10, (updatedPlayers[t1Idx].relationships[user.uid] || 0) - 1);
                      msgParts.push(`Fallimento con ${updatedPlayers[t1Idx].name} (-1)`);
                      failed = true;
                  }
                  
                  if (Math.random() < 0.6) {
                      updatedPlayers[t2Idx].relationships[user.uid] = Math.min(10, (updatedPlayers[t2Idx].relationships[user.uid] || 0) + 2);
                      msgParts.push(`Successo con ${updatedPlayers[t2Idx].name} (+2)`);
                  } else {
                      updatedPlayers[t2Idx].relationships[user.uid] = Math.max(-10, (updatedPlayers[t2Idx].relationships[user.uid] || 0) - 1);
                      msgParts.push(`Fallimento con ${updatedPlayers[t2Idx].name} (-1)`);
                      failed = true;
                  }
                  
                  setImbroglioResult(msgParts.join("\n"));
                  
                  let updates = { players: updatedPlayers };
                  if (failed) {
                      updates.logs = arrayUnion(`⚖️ ${actorName} ha tentato il Doppio Gioco ma è stato scoperto da qualcuno!`);
                  }
                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
                  return;
              }
              else if (type === 'imbroglio') {
                  let updates = { players: updatedPlayers };
                  if (Math.random() < 0.6) {
                      const hasAlliances = (updatedPlayers[targetIdx].alliances || []).length > 0;
                      setImbroglioResult(`L'Imbroglio ha rivelato che ${targetName} ${hasAlliances ? "HA ALLEANZE SEGRETE ATTIVE!" : "NON HA NESSUNA ALLEANZA."}`);
                  } else {
                      setImbroglioResult(`L'Imbroglio è fallito. Non sei riuscito a scoprire i segreti di ${targetName}.`);
                      updates.logs = arrayUnion(`🦹 ${actorName} ha provato a usare Imbroglio su ${targetName}, ma è stato scoperto!`);
                  }
                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
                  return;
              }
              else if (type === 'pugnalata') {
                  let updates = { players: updatedPlayers };
                  if (Math.random() < 0.5) {
                      const victimAllies = updatedPlayers[targetIdx].alliances || [];
                      victimAllies.forEach(allyId => {
                          const aIdx = updatedPlayers.findIndex(p => p.uid === allyId);
                          if (aIdx !== -1 && updatedPlayers[aIdx].alliances) {
                              updatedPlayers[aIdx].alliances = updatedPlayers[aIdx].alliances.filter(id => id !== targetId);
                          }
                      });
                      updatedPlayers[targetIdx].alliances = [];
                      setImbroglioResult(`🔪 PUGNALATA ALLE SPALLE RIUSCITA!\nHai distrutto la rete sociale di ${targetName}!`);
                  } else {
                      updatedPlayers[targetIdx].relationships[user.uid] = Math.max(-10, (updatedPlayers[targetIdx].relationships[user.uid] || 0) - 1);
                      setImbroglioResult(`🔪 FALLIMENTO!\n${targetName} si è accorto che stavi complottando contro di lui (-1 Relazione).`);
                      updates.logs = arrayUnion(`🔪 ATTENZIONE! ${actorName} ha tentato di pugnalare alle spalle ${targetName} ma è stato scoperto!`);
                  }
                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
                  return;
              }
              else if (type === 'atto_eroico') {
                  const indices = payload.map(id => updatedPlayers.findIndex(p => p.uid === id));
                  indices.sort(() => Math.random() - 0.5); 

                  const [bestIdx, midIdx, worstIdx] = indices;
                  
                  updatedPlayers[bestIdx].relationships[user.uid] = Math.min(10, (updatedPlayers[bestIdx].relationships[user.uid] || 0) + 2);
                  updatedPlayers[midIdx].relationships[user.uid] = Math.min(10, (updatedPlayers[midIdx].relationships[user.uid] || 0) + 1);
                  updatedPlayers[worstIdx].relationships[user.uid] = Math.max(-10, (updatedPlayers[worstIdx].relationships[user.uid] || 0) - 1);

                  setImbroglioResult(`🦸 ATTO EROICO COMPLETATO!\n${updatedPlayers[bestIdx].name}: +2\n${updatedPlayers[midIdx].name}: +1\n${updatedPlayers[worstIdx].name}: -1 (Invidioso)`);
                  
                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                      players: updatedPlayers
                  });
                  return;
              }

              // SE NON È UNA SKILL DI FAZIONE, AGGIORNA NORMALE
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  players: updatedPlayers,
                  logs: arrayUnion(msg)
              });
              setHasActed(true);
              setSelectedPlayer(null);
              setShowRumorSelector(false); 
              setShowTrioSelector(false); 
              setSpecialSkillType(null);
          };

          const submitVote = async (targetId) => {
              if (!targetId || lobby.phase !== 'voting') return;
              
              if (lobby.twistData?.type === 'killer' && user.uid !== lobby.twistData.killerId) {
                  return;
              }

              if (lobby.idolData?.activeEffects?.safetyUsedRound === lobby.round && lobby.idolData?.activeEffects?.safetyHolder === user.uid) {
                  return;
              }

              const myTeam = myPlayer.team;
              const losingTeam = lobby.losingTeam;
              
              if (!isMerge && myTeam !== losingTeam && lobby.twistData?.type !== 'joint_ceremony') {
                  return;
              }

              let updates = {
                  [`votes.${user.uid}`]: targetId
              };

              if (useExtraVote && lobby.idolData?.inventory?.extraVotes?.[user.uid] > 0) {
                  updates[`idolData.inventory.extraVotes.${user.uid}`] = lobby.idolData.inventory.extraVotes[user.uid] - 1;
                  updates[`idolData.activeEffects.extraVoteUsedRound`] = lobby.round;
                  updates[`idolData.activeEffects.extraVoteUsers`] = arrayUnion(user.uid);
              }

              if (useVoteSteal && lobby.idolData?.inventory?.voteSteals?.[user.uid] > 0) {
                  if (!voteStealVictim) return; 
                  updates[`idolData.inventory.voteSteals.${user.uid}`] = lobby.idolData.inventory.voteSteals[user.uid] - 1;
                  updates[`idolData.activeEffects.voteStealUsedRound`] = lobby.round;
                  updates[`idolData.activeEffects.voteStealVictim`] = voteStealVictim;
                  updates[`idolData.activeEffects.voteStealHolder`] = user.uid;
              }

              if (lobby.twistData?.type !== 'killer') {
                  const myAllies = lobby.players.filter(p => 
                      p.isBot && 
                      p.status === 'active' && 
                      Array.isArray(p.alliances) && 
                      p.alliances.includes(user.uid)
                  );

                  myAllies.forEach(ally => {
                      const canVote = isMerge || lobby.twistData?.type === 'joint_ceremony' || ally.team === losingTeam;
                      if (canVote) {
                          if (Math.random() < 0.40) {
                              updates[`votes.${ally.uid}`] = targetId;
                          }
                      }
                  });
              }

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), updates);
              setUseExtraVote(false);
              setUseVoteSteal(false);
          };

          const teams = useMemo(() => {
             const groups = {};
             if (isMerge) {
                 groups["MERGE"] = activePlayers;
             } else {
                 let currentTeamNames = DEFAULT_TEAM_NAMES;
                 if (lobby.config.theme === 'Villain Edition') {
                     currentTeamNames = VILLAIN_TEAM_NAMES;
                 } else if (lobby.config.theme === 'Brains vs Beauties vs Brawns') {
                     currentTeamNames = ["Brains", "Beauties", "Brawns"];
                 } else if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') {
                     currentTeamNames = ["Eroi", "Villains", "Neutrali"];
                 }
                 
                 if (lobby.config.numTeams > 0) {
                     currentTeamNames.slice(0, lobby.config.numTeams).forEach(t => groups[t] = []);
                 }
                 activePlayers.forEach(p => { 
                     if (p.team) {
                         if (!groups[p.team]) groups[p.team] = []; 
                         groups[p.team].push(p); 
                     }
                 });
             }
             return groups;
          }, [activePlayers, isMerge, lobby.config.numTeams, lobby.config.theme]);

          const pendingVotesCount = useMemo(() => {
              if (lobby.phase !== 'voting') return 0;

              if (lobby.twistData?.type === 'killer') {
                  const killerId = lobby.twistData.killerId;
                  const killer = lobby.players.find(p => p.uid === killerId);
                  if (killer && !killer.isBot && !lobby.votes?.[killerId]) {
                      return 1;
                  }
                  return 0;
              }

              const isJoint = lobby.twistData?.type === 'joint_ceremony';
              
              const voters = (isMerge || isJoint)
                  ? activePlayers 
                  : activePlayers.filter(p => p.team === lobby.losingTeam);
                  
              return voters.filter(p => {
                   if (p.isBot || lobby.votes?.[p.uid]) return false;
                   if (lobby.idolData?.activeEffects?.safetyUsedRound === lobby.round && lobby.idolData.activeEffects.safetyHolder === p.uid) return false;
                   return true;
              }).length;
          }, [lobby.phase, lobby.votes, isMerge, activePlayers, lobby.losingTeam, lobby.twistData, lobby.idolData, lobby.round]);

          const pendingReadyCount = useMemo(() => {
              if (lobby.phase !== 'social') return 0;
              const humans = activePlayers.filter(p => !p.isBot);
              const ready = lobby.readyPlayers || [];
              return humans.filter(h => !ready.includes(h.uid)).length;
          }, [lobby.phase, lobby.readyPlayers, activePlayers]);

          const pendingJuryVotesCount = useMemo(() => {
              if (lobby.phase !== 'jury_vote' || lobby.juryData?.stage !== 'voting') return 0;
              return lobby.juryData.jurors.length - Object.keys(lobby.juryData.votes || {}).length;
          }, [lobby.phase, lobby.juryData]);

          const pendingSpeechesCount = useMemo(() => {
              if (lobby.phase !== 'jury_speeches' || !lobby.juryData) return 0;
              const f1HasSpeech = !!lobby.juryData.speeches?.[lobby.juryData.finalist1];
              const f2HasSpeech = !!lobby.juryData.speeches?.[lobby.juryData.finalist2];
              return (f1HasSpeech ? 0 : 1) + (f2HasSpeech ? 0 : 1);
          }, [lobby.phase, lobby.juryData]);


          return (
            <div className="flex h-screen bg-cover bg-center text-white overflow-hidden font-sans" style={{ backgroundImage: `url('${currentBg}')` }}>
               <div className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
               
               {/* MODALE DRONE SPIA */}
               {showSpyDroneModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-indigo-500 max-w-sm w-full relative p-6">
                           <button onClick={() => { setShowSpyDroneModal(false); setSpyDroneResult(null); setSpyDroneTarget(""); }} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-4 text-indigo-400 flex items-center gap-2"><Eye/> DRONE SPIA</h2>
                           
                           {spyDroneResult ? (
                               <div className="bg-slate-800 p-4 rounded-xl text-sm whitespace-pre-line text-slate-300 font-mono">
                                   {spyDroneResult}
                               </div>
                           ) : (
                               <>
                               <p className="text-sm text-slate-400 mb-4">Scegli chi spiare per scoprire i suoi segreti.</p>
                               <select 
                                   className="w-full mb-4 bg-slate-800 border border-indigo-500 text-white rounded p-2"
                                   value={spyDroneTarget}
                                   onChange={(e) => setSpyDroneTarget(e.target.value)}
                               >
                                   <option value="">-- Seleziona bersaglio --</option>
                                   {activePlayers.filter(p => p.uid !== user.uid).map(p => (
                                       <option key={p.uid} value={p.uid}>{p.name}</option>
                                   ))}
                               </select>
                               <button 
                                   onClick={handleUseSpyDrone} 
                                   disabled={!spyDroneTarget}
                                   className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 text-white font-bold py-2 rounded-xl transition"
                               >
                                   INVIA DRONE
                               </button>
                               </>
                           )}
                       </div>
                    </div>
                )}

               {/* MODALE AMMUTINAMENTO */}
               {showMutinyModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-orange-500 max-w-sm w-full relative p-6">
                           <button onClick={() => { setShowMutinyModal(false); setMutinyTarget(""); }} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-4 text-orange-400 flex items-center gap-2"><RefreshCw/> AMMUTINAMENTO</h2>
                           
                           <p className="text-sm text-slate-400 mb-4">Scambia la tua squadra con quella di un avversario.</p>
                           <select 
                               className="w-full mb-4 bg-slate-800 border border-orange-500 text-white rounded p-2"
                               value={mutinyTarget}
                               onChange={(e) => setMutinyTarget(e.target.value)}
                           >
                               <option value="">-- Seleziona bersaglio --</option>
                               {activePlayers.filter(p => p.uid !== user.uid && p.team !== myPlayer.team).map(p => (
                                   <option key={p.uid} value={p.uid}>{p.name} (Team: {p.team})</option>
                               ))}
                           </select>
                           <button 
                               onClick={handleUseMutiny} 
                               disabled={!mutinyTarget}
                               className="w-full bg-orange-600 hover:bg-orange-500 disabled:bg-slate-700 text-white font-bold py-2 rounded-xl transition"
                           >
                               SCAMBIA SQUADRA
                           </button>
                       </div>
                    </div>
                )}

                {/* MODALE TESTAMENTO */}
                {showLegacyModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-amber-600 max-w-sm w-full relative p-6">
                           <button onClick={() => { setShowLegacyModal(false); setLegacyTarget(""); }} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-4 text-amber-500 flex items-center gap-2"><Scroll/> SCRIVI TESTAMENTO</h2>
                           
                           <p className="text-sm text-slate-300 mb-4">Scegli il tuo Erede in segreto. Se verrai eliminato stasera, riceverà l'<strong className="text-green-400">Immunità</strong> e il <strong className="text-yellow-400">Doppio Voto</strong> per il suo prossimo falò!</p>
                           <select 
                               className="w-full mb-4 bg-slate-800 border border-amber-600 text-white rounded p-2 font-bold"
                               value={legacyTarget}
                               onChange={(e) => setLegacyTarget(e.target.value)}
                           >
                               <option value="">-- Scegli il tuo Erede --</option>
                               {activePlayers.filter(p => p.uid !== user.uid).map(p => (
                                   <option key={p.uid} value={p.uid}>{p.name}</option>
                               ))}
                           </select>
                           <button 
                               onClick={handleUseLegacy} 
                               disabled={!legacyTarget}
                               className="w-full bg-amber-700 hover:bg-amber-600 disabled:bg-slate-700 text-white font-bold py-3 rounded-xl transition shadow-[0_0_15px_rgba(217,119,6,0.4)]"
                           >
                               CONFERMA TESTAMENTO
                           </button>
                       </div>
                    </div>
                )}

                {/* MODALE SALVACONDOTTO */}
               {showSafetyModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                       <div className="bg-slate-900 rounded-2xl border-2 border-teal-500 max-w-sm w-full relative p-6">
                           <button onClick={() => setShowSafetyModal(false)} className="absolute top-2 right-2 bg-black/50 p-2 rounded-full"><X size={20}/></button>
                           <h2 className="text-2xl font-black mb-4 text-teal-400 flex items-center gap-2"><DoorOpen/> SALVACONDOTTO</h2>
                           
                           <p className="text-sm text-slate-300 mb-6">Se usi questo vantaggio abbandonerai la cerimonia. Sarai immune ai voti e ti salverai di sicuro, ma **non potrai votare** stasera.</p>
                           
                           <button 
                               onClick={handleUseSafety} 
                               className="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-xl transition shadow-[0_0_15px_rgba(20,184,166,0.4)]"
                           >
                               USA SALVACONDOTTO ORA
                           </button>
                       </div>
                    </div>
                )}

               {/* MODALE LADRO DI COLLANE */}
               {showImmunityStealModal && (

                                    'Avvoltoi Volanti': { bg: 'bg-purple-900/40', border: 'border-purple-500', text: 'text-purple-400' },
                                    'Tigri Selvaggi': { bg: 'bg-orange-900/40', border: 'border-orange-500', text: 'text-orange-400' },
                                    'Orsi Polari': { bg: 'bg-cyan-900/40', border: 'border-cyan-500', text: 'text-cyan-400' },
                                    'Lupi Mannari': { bg: 'bg-indigo-900/40', border: 'border-indigo-500', text: 'text-indigo-400' },
                                    'Serpenti A Sonagli': { bg: 'bg-emerald-900/40', border: 'border-emerald-500', text: 'text-emerald-400' },

                                    'Avvoltoi Malvagi': { bg: 'bg-zinc-900/80', border: 'border-purple-800', text: 'text-purple-500' },
                                    'Corvi Cruenti': { bg: 'bg-black/80', border: 'border-red-900', text: 'text-red-700' },
                                    'Draghi Diabolici': { bg: 'bg-stone-900/80', border: 'border-orange-900', text: 'text-orange-700' },
                                    'Piedini Rosa': { bg: 'bg-pink-900/40', border: 'border-pink-500', text: 'text-pink-400' },
                                    'Vipere Velenose': { bg: 'bg-green-950/80', border: 'border-emerald-800', text: 'text-emerald-600' },
                                    'Iene Spietate': { bg: 'bg-yellow-950/80', border: 'border-yellow-800', text: 'text-yellow-600' },
                                    'Tarantole Tossiche': { bg: 'bg-indigo-950/80', border: 'border-indigo-800', text: 'text-indigo-600' },
                                    'Pipistrelli Predatori': { bg: 'bg-gray-900/80', border: 'border-gray-600', text: 'text-gray-400' },

                                    'Brains': { bg: 'bg-blue-900/40', border: 'border-blue-500', text: 'text-blue-400' },
                                    'Beauties': { bg: 'bg-pink-900/40', border: 'border-pink-500', text: 'text-pink-400' },
                                    'Brawns': { bg: 'bg-orange-900/40', border: 'border-orange-500', text: 'text-orange-400' },

                                    'Eroi': { bg: 'bg-blue-900/40', border: 'border-blue-500', text: 'text-blue-400' },
                                    'Villains': { bg: 'bg-red-900/40', border: 'border-red-500', text: 'text-red-400' },

                                    'MERGE': { bg: 'bg-yellow-600/30', border: 'border-yellow-400', text: 'text-yellow-300' }

                                         <Users size={24} />

                                         {!isMerge && lobby.phase === 'social' && lobby.losingTeam === teamName && (
                                             <span className="bg-red-600 text-white text-xs px-3 py-1 rounded-full flex items-center gap-1 shadow-[0_0_10px_rgba(220,38,38,0.8)] animate-pulse ml-2">

                                             </span>

                                         {!isMerge && lobby.phase === 'social' && lobby.immunity?.length > 0 && teamPlayers.some(p => lobby.immunity.includes(p.uid)) && (
                                             <span className="bg-green-600 text-white text-xs px-3 py-1 rounded-full flex items-center gap-1 shadow-[0_0_10px_rgba(22,163,74,0.8)] ml-2">
                                                 <Shield size={14}/> IMMUNI

                                         {teamPlayers.map(p => (

                                                 onClick={() => {
                                                     if (p.uid !== user.uid) setSelectedPlayer(p);
                                                 }}
                                                 disabled={p.status === 'eliminated'}
                                                 className={`relative rounded-lg overflow-hidden border-2 aspect-[3/4] transition-all ${p.status === 'eliminated' ? 'opacity-30 grayscale cursor-not-allowed border-slate-800' : `${colors.border} hover:border-yellow-400 hover:scale-105 hover:shadow-xl hover:z-10`}`}
                                             >
                                                 <img src={p.character.img} className="w-full h-full object-cover"/>
                                                 <div className={`absolute bottom-0 w-full bg-black/80 text-[10px] sm:text-xs font-bold py-1.5 truncate px-1 text-center text-white`}>
                                                     {p.name}
                                                 </div>
                                                 
                                                 <div className="absolute top-1 right-1 flex flex-col gap-1 items-end z-10">
                                                     {lobby.immunity?.includes(p.uid) && (
                                                         <div className="bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-full p-1.5 shadow-[0_0_10px_rgba(234,179,8,0.8)] border border-yellow-200">

                                                         </div>
                                                     )}
                                                     
                                                     {/* INDICATORE RELAZIONI (AMICIZIA/ODIO) */}
                                                     {p.uid !== user.uid && (p.relationships?.[user.uid] || 0) !== 0 && (
                                                         <div className={`flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-black shadow-lg backdrop-blur-md border ${
                                                             (p.relationships?.[user.uid] || 0) === 15 ? 'bg-pink-900/90 border-pink-400 text-pink-300 shadow-[0_0_8px_rgba(236,72,153,0.8)]' :
                                                             (p.relationships?.[user.uid] || 0) > 0 ? 'bg-green-900/90 border-green-400 text-green-300 shadow-[0_0_8px_rgba(34,197,94,0.8)]' : 
                                                             'bg-red-900/90 border-red-400 text-red-300 shadow-[0_0_8px_rgba(239,68,68,0.8)]'
                                                         }`}>
                                                             <Heart size={12} fill={(p.relationships?.[user.uid] || 0) > 0 ? "currentColor" : "none"} className={ (p.relationships?.[user.uid] || 0) === 15 ? "animate-pulse" : "" } />

                                                         </div>
                                                     )}

                                                     {p.uid !== user.uid && Array.isArray(p.alliances) && p.alliances.includes(user.uid) && (
                                                         <div className="flex items-center justify-center px-2 py-1 rounded-full shadow-lg backdrop-blur-md border bg-blue-900/90 border-blue-400 text-blue-300 shadow-[0_0_8px_rgba(59,130,246,0.8)]" title="Siete Alleati!">
                                                             <Swords size={12} />
                                                         </div>
                                                     )}
                                                 </div>
                                             </button>
                                         ))}
                                     </div>
                                 </div>
                             )})}
                         </div>

                     {lobby.phase === 'idol_hunt' && lobby.idolData && (

                                {lobby.idolData.crates.map(c => {
                                    const isMine = c.owner === user.uid;
                                    const isTaken = c.owner !== null;
                                    const isRevealed = lobby.idolData.stage === 'reveal';
                                    
                                    const itemType = lobby.idolData.itemDistribution?.[c.id];
                                    const hasIdol = itemType === 'idol';
                                    const hasExtraVote = itemType === 'extraVote';
                                    const hasAdvantage = itemType === 'advantage';
                                    const hasVoteSteal = itemType === 'voteSteal'; 
                                    const hasSpyDrone = itemType === 'spyDrone';
                                    const hasMutiny = itemType === 'mutiny';
                                    const hasSafety = itemType === 'safety';
                                    const hasImmunitySteal = itemType === 'immunitySteal';
                                    const hasLegacy = itemType === 'legacy';

                                    const ownerName = isTaken ? lobby.players.find(p => p.uid === c.owner)?.name : "";

                                    return (
                                        <button 
                                            key={c.id} 
                                            onClick={() => claimCrate(c.id)}

                                                    ? 'border-yellow-400 bg-yellow-500/20 scale-110 shadow-[0_0_15px_rgba(250,204,21,0.5)]' 
                                                    : isTaken 
                                                        ? 'border-slate-700 bg-slate-800 opacity-60' 
                                                        : 'border-slate-500 bg-slate-700 hover:bg-slate-600 hover:scale-105 cursor-pointer'}

                                            {isRevealed && isMine ? (
                                                hasIdol ? (
                                                    <Gem size={40} className="text-purple-400 animate-bounce drop-shadow-lg" />

                                                    <Vote size={40} className="text-green-400 animate-bounce drop-shadow-lg" />

                                                    <Zap size={40} className="text-yellow-400 animate-bounce drop-shadow-lg" />
                                                ) : hasVoteSteal ? (
                                                    <UserMinus size={40} className="text-cyan-400 animate-bounce drop-shadow-lg" />
                                                ) : hasSpyDrone ? (
                                                    <Eye size={40} className="text-indigo-400 animate-bounce drop-shadow-lg" />
                                                ) : hasMutiny ? (
                                                    <RefreshCw size={40} className="text-orange-400 animate-bounce drop-shadow-lg" />
                                                ) : hasSafety ? (
                                                    <DoorOpen size={40} className="text-teal-400 animate-bounce drop-shadow-lg" />
                                                ) : hasImmunitySteal ? (
                                                    <Link size={40} className="text-rose-400 animate-bounce drop-shadow-lg" />
                                                ) : hasLegacy ? (
                                                    <Scroll size={40} className="text-amber-500 animate-bounce drop-shadow-lg" />
                                                ) : (
                                                    <Skull size={40} className="text-slate-500" />
                                                )
                                            ) : (
                                                <Package size={32} className={isMine ? 'text-yellow-400' : 'text-slate-400'} />
                                            )}

                                            {isTaken && !isRevealed && (
                                                <div className="absolute inset-0 flex items-center justify-center bg-black/50 rounded-xl">
                                                    <Lock size={16} className="text-slate-400"/>
                                                </div>

                                            {isRevealed && isMine && (
                                                <div className={`absolute -bottom-6 text-[10px] font-bold ${hasIdol ? 'text-purple-400' : hasExtraVote ? 'text-green-400' : hasAdvantage ? 'text-yellow-400' : hasVoteSteal ? 'text-cyan-400' : hasSpyDrone ? 'text-indigo-400' : hasMutiny ? 'text-orange-400' : hasSafety ? 'text-teal-400' : hasImmunitySteal ? 'text-rose-400' : hasLegacy ? 'text-amber-500' : 'text-slate-500'}`}>
                                                    {hasIdol ? "IMMUNITÀ!" : hasExtraVote ? "VOTO EXTRA!" : hasAdvantage ? "BONUS +3!" : hasVoteSteal ? "RUBA-VOTO!" : hasSpyDrone ? "DRONE SPIA!" : hasMutiny ? "AMMUTINAMENTO!" : hasSafety ? "SALVACONDOTTO!" : hasImmunitySteal ? "LADRO COLLANE!" : hasLegacy ? "TESTAMENTO!" : "VUOTO"}
                                                </div>
                                            )}
                                            
                                            {isTaken && !isMine && (
                                               <div className="absolute -bottom-4 text-[9px] text-slate-500 truncate w-full text-center px-1">
                                                   {ownerName}
                                               </div>
                                            )}
                                        </button>
                                    )
                                })}
                            </div>

                            {lobby.idolData.stage === 'reveal' && (
                                <div className="mt-8 text-center animate-in slide-in-from-bottom">
                                    <div className="text-2xl font-bold mb-2">Tutte le casse sono state aperte!</div>
                                    <p className="text-slate-400">Controlla la tua cassa. I vantaggi sono segreti e ne potresti avere più di uno!</p>
                                    {isHost && <div className="mt-4 text-yellow-400 animate-pulse">Premi AVANTI per iniziare l'Episodio 1</div>}
                                </div>
                            )}
                         </div>
                     )}
                     
                     {lobby.phase === 'redemption' && lobby.redemptionData && (
                         <div className="flex flex-col items-center justify-center min-h-full">
                             <div className="text-center mb-8">
                                 <h1 className="text-5xl font-black text-orange-500 mb-2 uppercase tracking-widest drop-shadow-md">Redemption Island</h1>
                                 <p className="text-slate-300 text-xl">Chi merita una seconda chance?</p>
                             </div>

                             {lobby.redemptionData.stage === 'selection' ? (
                                 <div className="bg-slate-800 p-8 rounded-2xl border-2 border-orange-500 max-w-4xl w-full">
                                     <h3 className="text-2xl font-bold mb-4 flex items-center gap-2">
                                         {isHost ? "Seleziona i Candidati (2-4)" : "L'Host sta scegliendo i candidati..."}
                                     </h3>
                                     
                                     {isHost ? (
                                         <>
                                         <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4 mb-8">
                                             {lobby.players.filter(p => p.status === 'eliminated').map(p => {
                                                 const isSelected = selectedRedemptionCandidates.includes(p.uid);
                                                 return (
                                                     <button 
                                                         key={p.uid}
                                                         onClick={() => {
                                                             if(isSelected) setSelectedRedemptionCandidates(prev => prev.filter(id => id !== p.uid));
                                                             else if(selectedRedemptionCandidates.length < 4) setSelectedRedemptionCandidates(prev => [...prev, p.uid]);
                                                         }}
                                                         className={`relative rounded-xl overflow-hidden aspect-[3/4] transition-all ${isSelected ? 'ring-4 ring-orange-500 scale-105' : 'opacity-60 hover:opacity-100'}`}
                                                     >
                                                         <img src={p.character.img} className="w-full h-full object-cover"/>
                                                         <div className="absolute bottom-0 w-full bg-black/60 text-xs py-1 truncate">{p.name}</div>
                                                     </button>
                                                 )
                                             })}

                                             className="w-full bg-orange-600 hover:bg-orange-500 disabled:bg-slate-700 text-white font-black py-4 rounded-xl text-xl shadow-lg transition"
                                         >
                                             INIZIA SFIDA (Selezionati: {selectedRedemptionCandidates.length})
                                         </button>
                                         </>

                                         <div className="text-center py-12 text-slate-500 italic">In attesa dell'Host...</div>
                                     )}
                                 </div>

                                 <div className="flex flex-col items-center w-full max-w-5xl">
                                     <div className="flex flex-wrap gap-8 justify-center mb-12">

                                             const rolls = lobby.redemptionData.rolls || {};

                                                     <div className="text-xl font-bold mb-2 text-center leading-tight">{p.name}</div>
                                                     
                                                     {roll ? (

                                                         <div className="text-slate-500 italic animate-pulse py-4">Lancio...</div>

                                         >
                                             <Award size={24}/> RISOLVI SFIDA
                                         </button>
                                     )}
                                 </div>
                             )}

                    {lobby.phase === 'season_setup' && isHost && nextSeasonConfig && (

                                            <input 
                                                type="range" 
                                                min={Math.max(2, lobby.players.filter(p => !p.isBot).length)}

                                                onChange={e => setNextSeasonConfig({...nextSeasonConfig, returningCount: parseInt(e.target.value)})} 
                                                className="flex-1 accent-yellow-500"

                                            <span className="text-2xl font-bold w-12 text-center">{nextSeasonConfig.returningCount}</span>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-slate-400 font-bold mb-2">Nuovo Numero di Squadre (2 - 8)</label>

                                            <input

                                                min="2" 
                                                max="8" 
                                                value={nextSeasonConfig.numTeams}

                                                className="flex-1 accent-blue-500" 
                                            />
                                            <span className="text-2xl font-bold w-12 text-center">{nextSeasonConfig.numTeams}</span>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-slate-400 font-bold mb-2 flex justify-between items-center">

                                        </label>

                                            <input 
                                                type="range" 
                                                min="2" 
                                                max={nextSeasonConfig.returningCount} 
                                                value={nextSeasonConfig.mergeSize} 
                                                onChange={e => setNextSeasonConfig({...nextSeasonConfig, mergeSize: parseInt(e.target.value)})} 
                                                className="flex-1 accent-red-500" 
                                            />

                                        >
                                            INIZIA STAGIONE {lobby.currentSeasonIndex + 2}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                     
                     {lobby.phase === 'challenge' && (
                        <div className="flex flex-col items-center justify-center min-h-[60vh]">
                            {lobby.twistData?.type === 'team_swap' && (
                                 <div className="bg-orange-600/90 text-white p-8 rounded-2xl mb-8 text-center shadow-[0_0_30px_rgba(234,88,12,0.5)] border-4 border-orange-500 animate-bounce max-w-3xl z-50">
                                     <div className="flex items-center justify-center gap-4 mb-4">
                                        <Shuffle size={48} className="text-white"/>
                                        <h2 className="text-4xl font-black uppercase tracking-widest">CAMBIO SQUADRA!</h2>
                                        <Shuffle size={48} className="text-white scale-x-[-1]"/>
                                     </div>
                                     <div className="text-2xl mb-4">
                                         <span className="font-bold text-yellow-300 text-4xl drop-shadow-md">{lobby.twistData.victimName}</span>
                                     </div>
                                     <div className="flex items-center justify-center gap-4 text-xl font-bold bg-black/30 p-4 rounded-xl">
                                         <span className="text-red-300">{lobby.twistData.fromTeam}</span>
                                         <ArrowRight size={32} className="text-white" />
                                         <span className="text-green-300">{lobby.twistData.toTeam}</span>
                                     </div>
                                     <p className="mt-4 text-orange-200 italic">"Mai mettersi troppo comodi!" - Chris</p>
                                 </div>

                            {isMerge && lobby.challengeData && (
                                lobby.challengeData.type === 'popularity_vote' ? (
                                    <div className="text-center animate-in zoom-in w-full max-w-5xl">

                                                 {myPlayer.status === 'eliminated' ? (
                                                     <div className="text-2xl font-black text-red-500 mb-8 bg-red-900/40 p-4 rounded-xl inline-block">SEI ELIMINATO, NON PUOI VOTARE</div>

                                                     <div className="text-2xl font-black text-green-400 mb-8 bg-green-900/40 p-4 rounded-xl inline-block flex items-center justify-center gap-2 max-w-sm mx-auto">

                                                     </div>
                                                 ) : (
                                                     <div className="mb-8">
                                                         <div className="bg-slate-800 p-6 rounded-3xl border-4 border-pink-500 shadow-[0_0_40px_rgba(236,72,153,0.4)] relative mb-4">
                                                             <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-pink-600 text-white font-black px-6 py-1 rounded-full text-sm uppercase">Seleziona 2 Giocatori</div>

                                                             <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-4">
                                                                 {activePlayers
                                                                     .filter(p => p.uid !== user.uid)
