<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total Drama Online</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map per React e Firebase -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0"
      }
    }
    </script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { -webkit-overflow-scrolling: touch; } 
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .speech-bubble {
            position: relative;
            background: #f8fafc;
            border-radius: .4em;
            color: #0f172a;
            padding: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 15px solid transparent;
            border-top-color: #f8fafc;
            border-bottom: 0;
            margin-left: -15px;
            margin-bottom: -15px;
        }

        /* --- STILI COSMETICI AVANZATI & PREMIUM --- */
        
        /* Regola globale per permettere agli elementi 3D (corone, spade, emoji) di uscire dai bordi */
        [class*="cosmetic-"] {
            overflow: visible !important;
            z-index: 10;
        }
        /* Mantiene la foto del personaggio con i bordi arrotondati correttamente sotto l'aura */
        [class*="cosmetic-"] img {
            border-radius: inherit;
            position: relative;
            z-index: 1; 
        }

        /* 1. Campione: Bordo dorato spesso, Corona gigante in cima al centro */
        .cosmetic-campione {
            border: 3px solid #fbbf24 !important;
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.8), inset 0 0 15px rgba(251, 191, 36, 0.5) !important;
        }
        .cosmetic-campione::before {
            content: '👑';
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            z-index: 20;
            animation: crownFloat 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.7));
        }

        /* 2. Veterano: Bordo mimetico/smeraldo spesso, medaglia al valore */
        .cosmetic-veterano {
            border: 3px solid #10b981 !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.7), inset 0 0 15px rgba(52, 211, 153, 0.5) !important;
        }
        .cosmetic-veterano::before {
            content: '🎖️';
            position: absolute;
            bottom: -15px;
            right: -10px;
            font-size: 32px;
            z-index: 20;
            animation: pulseMedal 2s infinite;
        }

        /* 3. Pugnalatore: Bordo rosso sangue, coltello enorme e gocce di sangue */
        .cosmetic-pugnalatore {
            border: 3px solid #991b1b !important;
            box-shadow: 0 0 20px rgba(153, 27, 27, 0.8), inset 0 0 20px rgba(220, 38, 38, 0.6) !important;
        }
        .cosmetic-pugnalatore::before {
            content: '🔪';
            position: absolute;
            top: 20%;
            left: -20px;
            font-size: 32px;
            z-index: 20;
            transform: rotate(-45deg);
            animation: stab 1.5s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
        }
        .cosmetic-pugnalatore::after {
            content: '🩸';
            position: absolute;
            bottom: -10px;
            right: 0;
            font-size: 24px;
            z-index: 20;
            animation: dripBlood 2s infinite;
        }

        /* 4. Sopravvissuto: Bordo infuocato, fuoco alla base */
        .cosmetic-sopravvissuto {
            border: 3px solid #ea580c !important;
            box-shadow: 0 0 25px rgba(234, 88, 12, 0.8), inset 0 0 20px rgba(249, 115, 22, 0.6) !important;
        }
        .cosmetic-sopravvissuto::before {
            content: '🔥';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            z-index: 20;
            animation: burn 1s infinite alternate;
        }
        .cosmetic-sopravvissuto::after {
            content: '🩹';
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 24px;
            z-index: 20;
            transform: rotate(25deg);
        }

        /* 5. Dolcezza: Bordo rosa, fiocco gigante, cuoricini */
        .cosmetic-bow {
            border: 3px solid #f472b6 !important;
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.8), inset 0 0 15px rgba(244, 114, 182, 0.4) !important;
        }
        .cosmetic-bow::before {
            content: '🎀';
            position: absolute;
            top: -15px;
            right: -15px;
            font-size: 34px;
            z-index: 20;
            transform: rotate(15deg);
            animation: bowBounce 2s infinite;
        }
        .cosmetic-bow::after {
            content: '💖';
            position: absolute;
            bottom: -10px;
            left: -10px;
            font-size: 24px;
            z-index: 20;
            animation: floatHeart 2.5s ease-in infinite;
        }

        /* 6. MVP: Bordo ciano neon tech, bagliore elettrico */
        .cosmetic-mvp {
            border: 3px solid #06b6d4 !important;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.9), inset 0 0 15px rgba(34, 211, 238, 0.5) !important;
        }
        .cosmetic-mvp::before {
            content: '⚡';
            position: absolute;
            top: -15px;
            left: -15px;
            font-size: 32px;
            z-index: 20;
            animation: shockMVP 0.5s infinite alternate;
        }
        .cosmetic-mvp::after {
            content: '🏅';
            position: absolute;
            bottom: -12px;
            right: -12px;
            font-size: 28px;
            z-index: 20;
            filter: drop-shadow(0 0 5px #06b6d4);
            animation: pulseMedal 3s infinite alternate;
        }

        /* 7. Idolo: Bordo magenta, Tiki */
        .cosmetic-idolo {
            border: 3px solid #d946ef !important;
            box-shadow: 0 0 25px rgba(217, 70, 239, 0.8), inset 0 0 20px rgba(192, 38, 211, 0.6) !important;
        }
        .cosmetic-idolo::before {
            content: '🗿';
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            z-index: 20;
            animation: floatTiki 3s ease-in-out infinite;
        }

        /* 8. Agente 007: Radar verde e Pistola */
        .cosmetic-agente007 {
            border: 3px solid #22c55e !important;
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.8), inset 0 0 15px rgba(74, 222, 128, 0.5) !important;
        }
        .cosmetic-agente007::before {
            content: '👁️‍🗨️';
            position: absolute;
            top: -12px;
            right: -12px;
            font-size: 30px;
            z-index: 20;
            animation: blinkSpy 4s infinite;
        }
        .cosmetic-agente007::after {
            content: '🔫';
            position: absolute;
            bottom: -12px;
            left: -12px;
            font-size: 26px;
            z-index: 20;
            transform: scaleX(-1);
        }

        /* 9. Mi Brucia la Mano: Bordo rosso infuocato */
        .cosmetic-fire {
            border: 3px solid #ef4444 !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.8) !important;
        }
        .cosmetic-fire::before {
            content: '🔥';
            position: absolute;
            bottom: -18px;
            right: -15px;
            font-size: 34px;
            z-index: 20;
            animation: firePulse 0.5s infinite alternate;
        }

        /* 10. Mano Incandescente: Bordo giallo/bianco accecante */
        .cosmetic-incandescente {
            border: 3px solid #fef08a !important;
            box-shadow: 0 0 35px rgba(250, 204, 21, 1), inset 0 0 25px rgba(253, 224, 71, 0.8) !important;
        }
        .cosmetic-incandescente::before {
            content: '☀️';
            position: absolute;
            top: -20px;
            left: -20px;
            font-size: 38px;
            z-index: 20;
            animation: superFirePulse 0.2s infinite alternate;
        }

        /* 11. Ladro di Palcoscenico: Ombra rotante e maschera */
        .cosmetic-shadow {
            border: 3px solid #1e293b !important;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(15, 23, 42, 0.8) !important;
        }
        .cosmetic-shadow::before {
            content: '🦹';
            position: absolute;
            bottom: -15px;
            left: -15px;
            font-size: 34px;
            z-index: 20;
            animation: floatGhost 3s infinite alternate;
        }

        /* 12. Fantasma: Teal aura, ghost */
        .cosmetic-ghost {
            border: 3px solid #2dd4bf !important;
            box-shadow: 0 0 25px rgba(45, 212, 191, 0.8), inset 0 0 20px rgba(20, 184, 166, 0.5) !important;
        }
        .cosmetic-ghost::before {
            content: '👻';
            position: absolute;
            top: -18px;
            right: -15px;
            font-size: 34px;
            z-index: 20;
            animation: floatGhost 2s ease-in-out infinite alternate;
        }

        /* 13. Cacciatore: Diamante e cassa */
        .cosmetic-diamond {
            border: 3px solid #22d3ee !important;
            box-shadow: 0 0 25px rgba(34, 211, 238, 0.8), inset 0 0 15px rgba(103, 232, 249, 0.4) !important;
        }
        .cosmetic-diamond::before {
            content: '💎';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            z-index: 20;
            animation: twinkleStar 1.5s infinite alternate;
        }
        .cosmetic-diamond::after {
            content: '📦';
            position: absolute;
            bottom: -12px;
            right: -12px;
            font-size: 28px;
            z-index: 20;
            filter: drop-shadow(0 0 5px rgba(34,211,238,0.5));
        }

        /* 14. Farfalla: Farfalle animazione */
        .cosmetic-butterfly {
            border: 3px solid #f472b6 !important;
            box-shadow: 0 0 25px rgba(244, 114, 182, 0.8), inset 0 0 15px rgba(251, 113, 133, 0.4) !important;
        }
        .cosmetic-butterfly::before {
            content: '🦋';
            position: absolute;
            top: -15px;
            left: -15px;
            font-size: 34px;
            z-index: 20;
            animation: flutter 3s infinite alternate;
        }
        .cosmetic-butterfly::after {
            content: '🌸';
            position: absolute;
            bottom: -12px;
            right: -12px;
            font-size: 26px;
            z-index: 20;
        }

        /* 15. Drama Queen: Tossico */
        .cosmetic-toxic {
            border: 3px solid #84cc16 !important;
            box-shadow: 0 0 25px rgba(132, 204, 22, 0.8), inset 0 0 20px rgba(101, 163, 13, 0.5) !important;
        }
        .cosmetic-toxic::before {
            content: '🐍';
            position: absolute;
            bottom: -18px;
            left: -15px;
            font-size: 36px;
            z-index: 20;
            animation: floatBubbles 3s infinite;
        }
        .cosmetic-toxic::after {
            content: '🎭';
            position: absolute;
            top: -12px;
            right: -12px;
            font-size: 26px;
            z-index: 20;
            transform: rotate(15deg);
        }

        /* 16. Ti Sei Offeso: Ghiaccio */
        .cosmetic-ice {
            border: 3px solid #38bdf8 !important;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.8), inset 0 0 20px rgba(186, 230, 253, 0.4) !important;
        }
        .cosmetic-ice::before {
            content: '❄️';
            position: absolute;
            top: -18px;
            right: -15px;
            font-size: 36px;
            z-index: 20;
            animation: spinIce 4s linear infinite;
        }

        /* 17. Moschettieri: Spade */
        .cosmetic-moschettieri {
            border: 3px solid #3b82f6 !important;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.8), inset 0 0 15px rgba(96, 165, 250, 0.4) !important;
        }
        .cosmetic-moschettieri::before {
            content: '⚔️';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 38px;
            z-index: 20;
            animation: clash 2s infinite alternate;
        }

        /* 18. Ineluttabile: Thanos */
        .cosmetic-ineluttabile {
            border: 3px solid #a855f7 !important;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.9), inset 0 0 20px rgba(147, 51, 234, 0.7) !important;
        }
        .cosmetic-ineluttabile::before {
            content: '🧤';
            position: absolute;
            top: -18px;
            right: -18px;
            font-size: 36px;
            z-index: 20;
            animation: rotateInfinity 4s infinite linear;
        }

        /* 19. Donne al Potere: Rossetto/Nails e Scintille */
        .cosmetic-donnealpotere {
            border: 3px solid #ec4899 !important;
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.8), inset 0 0 15px rgba(244, 114, 182, 0.4) !important;
        }
        .cosmetic-donnealpotere::before {
            content: '💅';
            position: absolute;
            top: -18px;
            left: -15px;
            font-size: 34px;
            z-index: 20;
            animation: floatCrown 2.5s ease-in-out infinite alternate;
        }
        .cosmetic-donnealpotere::after {
            content: '✨';
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 26px;
            z-index: 20;
            animation: twinkleStar 2s infinite alternate;
        }

        /* 20. Spotlight: VIP */
        .cosmetic-spotlight {
            border: 3px solid #fde047 !important;
            box-shadow: 0 0 30px rgba(253, 224, 71, 0.8), inset 0 0 20px rgba(250, 204, 21, 0.6) !important;
        }
        .cosmetic-spotlight::before {
            content: '⭐';
            position: absolute;
            top: -20px;
            left: -15px;
            font-size: 34px;
            z-index: 20;
            animation: twinkleStar 1.5s ease-in-out infinite alternate;
        }
        .cosmetic-spotlight::after {
            content: '📸';
            position: absolute;
            bottom: -15px;
            right: -15px;
            font-size: 28px;
            z-index: 20;
            animation: flashCamera 2s infinite;
        }

        /* 21. Tu sì che sei un perdente: Aura Abissale */
        .cosmetic-schiappa {
            border: 3px solid #0f172a !important;
            box-shadow: 0 0 35px rgba(0, 0, 0, 1), inset 0 0 25px rgba(88, 28, 135, 0.9) !important;
            filter: contrast(1.2) brightness(0.8);
        }
        .cosmetic-schiappa::before {
            content: '👁️‍🗨️';
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 38px;
            z-index: 20;
            animation: voidFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(88, 28, 135, 1));
        }
        .cosmetic-schiappa::after {
            content: '🌑';
            position: absolute;
            bottom: -12px;
            right: -12px;
            font-size: 28px;
            z-index: 20;
            animation: pulseVoid 2s infinite alternate;
        }

        /* --- STILI COSMETICI DI LIVELLO --- */
        .cosmetic-level-rame { border: 3px solid #b87333 !important; box-shadow: 0 0 10px rgba(184, 115, 51, 0.5) !important; }
        .cosmetic-level-ferro { border: 3px solid #94a3b8 !important; box-shadow: 0 0 10px rgba(148, 163, 184, 0.5) !important; }
        .cosmetic-level-bronzo { border: 3px solid #cd7f32 !important; box-shadow: 0 0 15px rgba(205, 127, 50, 0.6) !important; }
        .cosmetic-level-argento { border: 3px solid #e2e8f0 !important; box-shadow: 0 0 20px rgba(226, 232, 240, 0.7), inset 0 0 10px rgba(255,255,255,0.5) !important; }
        .cosmetic-level-oro { border: 3px solid #fbbf24 !important; box-shadow: 0 0 25px rgba(251, 191, 36, 0.8), inset 0 0 15px rgba(251, 191, 36, 0.5) !important; }
        .cosmetic-level-diamante { border: 3px solid #67e8f9 !important; box-shadow: 0 0 30px rgba(103, 232, 249, 0.9), inset 0 0 20px rgba(165, 243, 252, 0.6) !important; }
        .cosmetic-level-ascendente { border: 3px solid #34d399 !important; box-shadow: 0 0 30px rgba(52, 211, 153, 0.9), inset 0 0 20px rgba(16, 185, 129, 0.6) !important; }
        
        /* PRO TIER (Effetti energetici Rossi) */
        .cosmetic-level-pro1 { border: 3px solid #f87171 !important; box-shadow: 0 0 30px rgba(248, 113, 113, 0.9) !important; }
        .cosmetic-level-pro1::after { content: '✦'; position: absolute; top: -15px; right: -10px; color: #fca5a5; font-size: 24px; filter: drop-shadow(0 0 8px #f87171); animation: floatParticle 2s ease-in-out infinite; z-index: 20; pointer-events: none; }

        .cosmetic-level-pro2 { border: 3px solid #ef4444 !important; box-shadow: 0 0 35px rgba(239, 68, 68, 1) !important; animation: pulseBorderRed 2s infinite; }
        .cosmetic-level-pro2::before { content: ''; position: absolute; inset: -8px; border: 2px solid transparent; border-top-color: #ef4444; border-bottom-color: #ef4444; border-radius: 50%; animation: rotateRing 3s linear infinite; z-index: 20; filter: drop-shadow(0 0 5px #ef4444); pointer-events: none; }
        .cosmetic-level-pro2::after { content: '✦'; position: absolute; bottom: -10px; left: -10px; color: #fca5a5; font-size: 20px; filter: drop-shadow(0 0 8px #ef4444); animation: floatParticle 1.5s ease-in-out infinite alternate; z-index: 20; pointer-events: none; }

        .cosmetic-level-pro3 { border: 3px solid #dc2626 !important; box-shadow: 0 0 40px rgba(220, 38, 38, 1), inset 0 0 20px rgba(220, 38, 38, 0.8) !important; animation: pulseBorderRed 1.5s infinite; }
        .cosmetic-level-pro3::before { content: ''; position: absolute; inset: -12px; border: 2px dashed #dc2626; border-radius: 50%; animation: rotateRingReverse 4s linear infinite; z-index: 20; filter: drop-shadow(0 0 8px #dc2626); pointer-events: none; }
        .cosmetic-level-pro3::after { content: '❂'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: #fca5a5; font-size: 28px; filter: drop-shadow(0 0 15px #dc2626); animation: firePulse 1s infinite alternate; z-index: 20; pointer-events: none; }

        /* CAMPIONE TIER (Magia oscura/Viola) */
        .cosmetic-level-campione1 { border: 3px solid #c084fc !important; box-shadow: 0 0 35px rgba(192, 132, 252, 0.9) !important; }
        .cosmetic-level-campione1::before { content: '⟡'; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); color: #d8b4fe; font-size: 28px; filter: drop-shadow(0 0 10px #c084fc); animation: floatParticle 2.5s infinite ease-in-out; z-index: 20; pointer-events: none; }

        .cosmetic-level-campione2 { border: 3px solid #a855f7 !important; box-shadow: 0 0 40px rgba(168, 85, 247, 1) !important; animation: pulseBorderPurple 2s infinite; }
        .cosmetic-level-campione2::before { content: ''; position: absolute; inset: -10px; border: 2px dotted #a855f7; border-radius: 50%; animation: rotateRing 5s linear infinite; z-index: 20; filter: drop-shadow(0 0 8px #a855f7); pointer-events: none; }
        .cosmetic-level-campione2::after { content: '⟡'; position: absolute; top: -15px; right: -15px; color: #d8b4fe; font-size: 26px; filter: drop-shadow(0 0 12px #a855f7); animation: floatParticle 2s infinite ease-in-out reverse; z-index: 20; pointer-events: none; }

        .cosmetic-level-campione3 { border: 3px solid #9333ea !important; box-shadow: 0 0 45px rgba(147, 51, 234, 1), inset 0 0 20px rgba(147, 51, 234, 0.8) !important; animation: pulseBorderPurple 1.5s infinite; }
        .cosmetic-level-campione3::before { content: ''; position: absolute; inset: -14px; border: 3px double #9333ea; border-radius: 50%; border-left-color: transparent; border-right-color: transparent; animation: rotateRingReverse 3s linear infinite; z-index: 20; filter: drop-shadow(0 0 10px #9333ea); pointer-events: none; }
        .cosmetic-level-campione3::after { content: '✧'; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: #e9d5ff; font-size: 34px; filter: drop-shadow(0 0 15px #9333ea) drop-shadow(0 0 30px #7e22ce); animation: pulseVoid 1.5s infinite alternate; z-index: 20; pointer-events: none; }

        /* MASTER TIER (Aura Divina/Fucsia) */
        .cosmetic-level-master { border: 3px solid #ec4899 !important; box-shadow: 0 0 50px rgba(236, 72, 153, 1), inset 0 0 30px rgba(236, 72, 153, 0.8) !important; animation: masterGlow 1s infinite alternate; }
        .cosmetic-level-master::before { content: ''; position: absolute; inset: -18px; border: 4px dashed #ec4899; border-radius: 50%; border-top-color: #8b5cf6; border-bottom-color: #3b82f6; animation: rotateRing 4s linear infinite; z-index: 20; filter: drop-shadow(0 0 15px #ec4899); pointer-events: none; }
        .cosmetic-level-master::after { content: '🜲'; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); color: #fdf2f8; font-size: 44px; filter: drop-shadow(0 0 20px #ec4899) drop-shadow(0 0 40px #db2777); animation: floatCrown 2s infinite ease-in-out; z-index: 20; pointer-events: none; }

        /* --- ANIMAZIONI PER TUTTI I COSMETICI --- */
        @keyframes rotateRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotateRingReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes floatParticle { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; } 50% { transform: translateY(-10px) scale(1.2); opacity: 1; } }
        @keyframes pulseBorderRed { 0%, 100% { border-color: #ef4444; } 50% { border-color: #fca5a5; } }
        @keyframes pulseBorderPurple { 0%, 100% { border-color: #a855f7; } 50% { border-color: #d8b4fe; } }

                style: "bg-gradient-to-r from-orange-400 via-amber-500 to-orange-600 bg-clip-text text-transparent drop-shadow-[0_2px_4px_rgba(245,158,11,0.4)] tracking-widest font-black text-[11px]"
            },
            "Megara": {
                name: "Donna Libera",
                style: "bg-gradient-to-r from-purple-500 via-fuchsia-500 to-pink-500 bg-clip-text text-transparent drop-shadow-[0_2px_4px_rgba(217,70,239,0.4)] tracking-widest font-black text-[11px]"
            },
            "Sypha": {
                name: "Voce degli Elementi",
                style: "bg-gradient-to-r from-blue-400 via-amber-400 to-cyan-500 bg-clip-text text-transparent drop-shadow-[0_2px_4px_rgba(56,189,248,0.4)] tracking-widest font-black text-[11px]"
            },
            "Banana Barbara": {
                name: "Banana",
                style: "bg-gradient-to-r from-yellow-300 via-yellow-500 to-amber-600 bg-clip-text text-transparent drop-shadow-[0_2px_4px_rgba(245,158,11,0.4)] tracking-widest font-black text-[11px]"
            },
            "Tefè": {
                name: "Elementale",
                style: "bg-gradient-to-r from-green-500 via-emerald-600 to-lime-500 bg-clip-text text-transparent drop-shadow-[0_2px_4px_rgba(16,185,129,0.4)] tracking-widest font-black text-[11px]"
            },
            "Robert": {
                name: "Misterioso",
                style: "bg-gradient-to-r from-slate-300 via-slate-400 to-slate-500 bg-clip-text text-transparent drop-shadow-[0_2px_4px_rgba(148,163,184,0.4)] tracking-widest font-black text-[11px]"
            },
            "Livewire": {
                name: "Scioccante",
                style: "bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-500 bg-clip-text text-transparent drop-shadow-[0_2px_4px_rgba(59,130,246,0.4)] tracking-widest font-black text-[11px]"
            }
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [nickname, setNickname] = useState(() => localStorage.getItem('td_nickname') || '');
          const [currentView, setCurrentView] = useState('auth');
          const [lobbies, setLobbies] = useState([]);
          const [currentLobbyId, setCurrentLobbyId] = useState(null);
          const [lobbyData, setLobbyData] = useState(null);
          const [errorMsg, setErrorMsg] = useState('');
          const [muted, setMuted] = useState(false);
          const [topCharacters, setTopCharacters] = useState(null);
          const [isReconnecting, setIsReconnecting] = useState(true); // NUOVO STATO
          
          // STATO COSMETICO EQUIPAGGIATO
          const [equippedCosmetic, setEquippedCosmetic] = useState(() => localStorage.getItem('td_equipped_cosmetic') || null);
          const [equippedTitle, setEquippedTitle] = useState(() => localStorage.getItem('td_equipped_title') || null);

          // --- STATISTICHE PERSONALI UTENTE ---
          const [personalStats, setPersonalStats] = useState({
              stagioniGiocate: 0,
              stagioniVinte: 0,
              episodiSopravvissuti: 0,
              immunitaVinte: 0,
              votiRicevuti: 0,
              amicizie: 0,
              idoliTrovati: 0,
              exp: 0,
              personaggiGiocati: {}
          });

          // Fetch Statistiche Personali
          useEffect(() => {
              if (!user || !db) return;
              const statsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'stats', 'main');
              const unsub = onSnapshot(statsRef, (docSnap) => {
                  if (docSnap.exists()) {
                      setPersonalStats(docSnap.data());
                  }
              }, (err) => console.error("Errore fetch stats personali:", err));
              return () => unsub();
          }, [user, db, appId]);

          const updatePersonalStats = async (newStats, charPlayed = null) => {
              if (!user || !db) return;
              const statsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'stats', 'main');
              
              const updates = {};
              Object.entries(newStats).forEach(([key, val]) => {
                  if (val > 0) updates[key] = increment(val);
              });
              
              if (charPlayed) {
                  updates[`personaggiGiocati.${charPlayed}`] = increment(1);
              }
              
              if (Object.keys(updates).length > 0) {
                  await setDoc(statsRef, updates, { merge: true });
              }
          };

          // --- GESTIONE ACHIEVEMENTS E COSMETICI (LOCAL STORAGE) ---
          const [achievements, setAchievements] = useState(() => {
              // Impostiamo la base pulita a zero per tutti
              const defaultAchievements = {
                  pugnalatore: { progress: 0, unlocked: false },
                  sopravvissuto: { progress: 0, unlocked: false },
                  campione: { progress: 0, unlocked: false },
                  veterano: { progress: 0, unlocked: false },
                  mvp: { progress: 0, unlocked: false },
                  idolo: { progress: 0, unlocked: false },
                  agente007: { progress: 0, unlocked: false },
                  dolcezza: { progress: 0, unlocked: false },
                  mibrucialamano: { progress: 0, unlocked: false },
                  manoincandescente: { progress: 0, unlocked: false },
                  ladrodipalcoscenico: { progress: 0, unlocked: false },
                  fantasmadereccellenza: { progress: 0, unlocked: false },
                  cacciatoredivantaggi: { progress: 0, unlocked: false },
                  farfallasociale: { progress: 0, unlocked: false },
                  dramaqueen: { progress: 0, unlocked: false },
                  tiseioffeso: { progress: 0, unlocked: false },
                  itremoschettieri: { progress: 0, unlocked: false },
                  ineluttabile: { progress: 0, unlocked: false },
                  donnealpotere: { progress: 0, unlocked: false },
                  spotlight: { progress: 0, unlocked: false },
                  schiappa: { progress: 0, unlocked: false },
                  title_Marinette: { progress: 0, unlocked: false }
              };
              
              // Recupera i tuoi VERI progressi salvati (se esistono)
              const saved = localStorage.getItem('td_achievements');
              let parsed = saved ? JSON.parse(saved) : {};
              
              // Unisce i tuoi salvataggi sopra la base a zero, così non perdi nulla!
              return { 
                  ...defaultAchievements, 
                  ...parsed 
              };
          });

          const updateAchievement = (id, amount = 1, max = 1) => {
              setAchievements(prev => {
                  if (prev[id]?.unlocked) return prev;
                  const newProgress = Math.min((prev[id]?.progress || 0) + amount, max);
                  const unlocked = newProgress >= max;
                  if (unlocked && (!prev[id] || !prev[id].unlocked)) {
                      setTimeout(() => playSound('success'), 500);
                      console.log(`🏆 Achievement Sbloccato: ${id}!`);
                  }
                  const nextState = { ...prev, [id]: { progress: newProgress, unlocked } };
                  localStorage.setItem('td_achievements', JSON.stringify(nextState));
                  return nextState;
              });
          };

          const setAchievementProgress = (id, progress, max) => {
              setAchievements(prev => {
                  if (prev[id]?.unlocked) return prev;
                  const unlocked = progress >= max;
                  if (unlocked && (!prev[id] || !prev[id].unlocked)) {
                      setTimeout(() => playSound('success'), 500);
                      console.log(`🏆 Achievement Sbloccato: ${id}!`);
                  }
                  const nextState = { ...prev, [id]: { progress: progress, unlocked } };
                  localStorage.setItem('td_achievements', JSON.stringify(nextState));
                  return nextState;
              });
          };

          const toggleEquipCosmetic = async (cosmeticId) => {
              const newCosmetic = equippedCosmetic === cosmeticId ? null : cosmeticId;
              setEquippedCosmetic(newCosmetic);
              localStorage.setItem('td_equipped_cosmetic', newCosmetic || '');

              // Se siamo in una lobby, aggiorniamo Firebase così gli altri lo vedono in tempo reale
              if (currentLobbyId && user && db && lobbyData) {
                  const updatedPlayers = lobbyData.players.map(p => 
                      p.uid === user.uid ? { ...p, equippedCosmetic: newCosmetic } : p
                  );
                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', currentLobbyId), {
                      players: updatedPlayers
                  });
              }
          };

          const toggleEquipTitle = async (charName) => {
              const newTitle = equippedTitle === charName ? null : charName;
              setEquippedTitle(newTitle);
              localStorage.setItem('td_equipped_title', newTitle || '');

              if (currentLobbyId && user && db && lobbyData) {
                  const updatedPlayers = lobbyData.players.map(p => 
                      p.uid === user.uid ? { ...p, equippedTitle: newTitle } : p
                  );
                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', currentLobbyId), {
                      players: updatedPlayers
                  });
              }
          };

          const toggleMute = () => {
              isGlobalMuted = !isGlobalMuted;
              setMuted(isGlobalMuted);
          };

          // AUTH SETUP
          useEffect(() => {
            const initAuth = async () => {
              if (!auth) return;
              try {
                 // Usa il token di sicurezza dell'ambiente se disponibile
                 if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                     await signInWithCustomToken(auth, __initial_auth_token);
                 } else {
                     await signInAnonymously(auth);
                 }
              } catch (e) {
                 console.error("Errore Autenticazione:", e);
              }
            };
            
            initAuth();
            
            if (auth) {
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }
          }, []);

          // RICONNESSIONE AUTOMATICA
          useEffect(() => {
              const tryReconnect = async () => {
                  if (!user || !db) return;
                  
                  const savedLobbyId = localStorage.getItem('td_current_lobby');
                  if (savedLobbyId) {
                      try {
                          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', savedLobbyId);
                          const snap = await getDoc(docRef);
                          if (snap.exists()) {
                              const data = snap.data();
                              // Verifica se l'utente faceva effettivamente parte di questa lobby
                              if (data.players.some(p => p.uid === user.uid)) {
                                  setCurrentLobbyId(savedLobbyId);
                                  // Se la partita era già iniziata, portalo dritto in gioco!
                                  setCurrentView(data.status === 'playing' ? 'game' : 'lobby');
                                  setIsReconnecting(false);
                                  return;
                              }
                          }
                          // Se la lobby non esiste più o l'utente è stato buttato fuori
                          localStorage.removeItem('td_current_lobby');
                      } catch (e) {
                          console.error("Errore durante la riconnessione:", e);
                      }
                  }
                  setIsReconnecting(false);
              };
              
              tryReconnect();
          }, [user]);

          // FETCH LOBBIES E CLEANUP
          useEffect(() => {
            if (!user || !db) return;
            
            const cleanupOldLobbies = async () => {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'lobbies'));
                const now = Date.now();
                
                querySnapshot.docs.forEach(async (docSnap) => {
                    const data = docSnap.data();
                    if (data.status === 'waiting' && data.timestamp) {
                        const docTime = data.timestamp.toMillis();
                        if (docTime < (now - TEN_MINUTES_MS)) {
                            try {
                                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', docSnap.id));
                                console.log(`Lobby ${docSnap.id} eliminata per inattività.`);
                            } catch(e) {
                                console.error("Errore eliminazione lobby inattiva:", e);
                            }
                        }
                    }
                });
            };

            cleanupOldLobbies();

            const q = collection(db, 'artifacts', appId, 'public', 'data', 'lobbies');
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const now = Date.now();
              
              const activeLobbies = snapshot.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(l => {
                     if (l.status !== 'waiting') return false;
                     if (!l.timestamp) return false;
                     return l.timestamp.toMillis() > (now - TEN_MINUTES_MS);
                });

              activeLobbies.sort((a, b) => b.timestamp.toMillis() - a.timestamp.toMillis());
              setLobbies(activeLobbies);
            }, (error) => {
                console.error("Errore fetch lobbies:", error);
                setErrorMsg("Errore di connessione al database. Controlla le regole Firestore.");
            });
            return () => unsubscribe();
          }, [user]);

          // FETCH GLOBAL STATS (TOP 10 PRESENZE)
          useEffect(() => {
              if (!user || !db) return; // Aspetta l'autenticazione
              const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_stats', 'character_usage');
              const unsub = onSnapshot(statsRef, (docSnap) => {
                  if (docSnap.exists()) {
                      const data = docSnap.data();
                      const sorted = Object.entries(data)
                          .map(([name, count]) => ({ name, count }))
                          .sort((a, b) => b.count - a.count)
                          .slice(0, 10);
                      setTopCharacters(sorted);
                  } else {
                      setTopCharacters([]); // Documento non esiste ancora, mostra lista vuota
                  }
              }, (error) => {
                  console.error("Errore fetch global stats:", error);
                  setTopCharacters([]); // In caso di errore smetti di caricare
              });
              return () => unsub();
          }, [user]); 

          // SYNC LOBBY
          useEffect(() => {
            if (!user || !currentLobbyId || !db) return;
            const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', currentLobbyId), (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                setLobbyData(data);
                if (data.status === 'playing') setCurrentView('game');
              } else {
                setLobbyData(null);
                setCurrentLobbyId(null);
                setCurrentView('browser');
                localStorage.removeItem('td_current_lobby'); // Rimuove se la lobby viene chiusa
              }
            });
            return () => unsub();
          }, [currentLobbyId, user]);

          const createLobby = async (config) => {
            if (!user || !db) return;
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            const newLobbyRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'lobbies'));
            
            const initialData = {
              hostId: user.uid,
              hostName: nickname,
              code: code,
              status: 'waiting',
              config: {
                ...config,
                redemption: config.redemption || { enabled: false, count: 0, episodes: [] },
                theme: config.theme || 'Tutti'
              }, 
              currentSeasonIndex: 0,
              seasonWinners: [],
              rankings: [], 
              players: [{
                uid: user.uid,
                name: nickname,
                character: null,
                isBot: false,
                status: 'active',
                team: null,
                relationships: {},
                alliances: [],
                diceRoll: null,
                immunityWins: 0,
                totalVotesReceived: 0,
                nextRollNerf: false,
                equippedCosmetic: equippedCosmetic,
                equippedTitle: equippedTitle,
                level: getLevelInfo(personalStats?.exp || 0).level
              }],
              round: 0,
              phase: 'setup',
              logs: [`Lobby creata da ${nickname}. Codice: ${code}`],
              chat: [], 
              votes: {},
              readyPlayers: [], 
              immunity: [],
              losingTeam: null,
              ceremonyData: null,
              challengeData: null, 
              finalData: null, 
              redemptionData: null,
              idolData: null,
              twistData: null,
              timestamp: serverTimestamp()
            };

            await setDoc(newLobbyRef, initialData);
            setCurrentLobbyId(newLobbyRef.id);
            localStorage.setItem('td_current_lobby', newLobbyRef.id); // Salva ID Lobby
            setCurrentView('lobby');
          };

          const joinLobby = async (lobbyId) => {
            if (!user || !db) return;
            const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId);
            const snap = await getDoc(lobbyRef);
            if (!snap.exists()) return;
            const data = snap.data();
            
            if (data.players.length >= data.config.maxPlayers) return setErrorMsg("Lobby piena.");

            await updateDoc(lobbyRef, {
              players: arrayUnion({
                uid: user.uid,
                name: nickname,
                character: null,
                isBot: false,
                status: 'active',
                team: null,
                relationships: {},
                alliances: [],
                diceRoll: null,
                immunityWins: 0,
                totalVotesReceived: 0,
                nextRollNerf: false,
                equippedCosmetic: equippedCosmetic,
                equippedTitle: equippedTitle,
                level: getLevelInfo(personalStats?.exp || 0).level
              })
            });
            setCurrentLobbyId(lobbyId);
            localStorage.setItem('td_current_lobby', lobbyId); // Salva ID Lobby
            setCurrentView('lobby');
          };

          if (!app) {
              return (
                  <div className="flex items-center justify-center h-screen bg-slate-900 text-white p-8 text-center">
                      <div>
                          <h1 className="text-3xl font-bold text-red-500 mb-4">Caricamento Firebase...</h1>
                      </div>
                  </div>
              );
          }

          if (isReconnecting && user) {
              return (
                  <div className="flex items-center justify-center h-screen bg-slate-900 text-white p-8 text-center">
                      <div className="animate-pulse">
                          <h1 className="text-3xl font-black text-yellow-400 mb-4 tracking-widest uppercase">Riconnessione...</h1>
                          <p className="text-slate-400">Sto recuperando il tuo show...</p>
                      </div>
                  </div>
              );
          }

          const handleAuthEnter = () => {
              localStorage.setItem('td_nickname', nickname);
              setCurrentView('browser');
          };

          return (
            <div className="min-h-screen bg-slate-900 text-slate-100 font-sans relative">
              <button onClick={toggleMute} className="fixed top-4 left-4 z-[9999] bg-black/70 p-3 rounded-full text-white hover:bg-black transition border border-white/20 shadow-lg" title={muted ? "Attiva Suoni" : "Disattiva Suoni"}>
                  {muted ? <VolumeX size={20}/> : <Volume2 size={20}/>}
              </button>
              {currentView === 'auth' && (
                <AuthScreen nickname={nickname} setNickname={setNickname} onEnter={handleAuthEnter} />
              )}
              {currentView === 'browser' && (
                <BrowserScreen 
                  user={user} nickname={nickname} lobbies={lobbies} 
                  onCreate={createLobby} onJoin={joinLobby} errorMsg={errorMsg}
                  topCharacters={topCharacters}
                  achievements={achievements}
                  equippedCosmetic={equippedCosmetic}
                  toggleEquipCosmetic={toggleEquipCosmetic}
                  equippedTitle={equippedTitle}
                  toggleEquipTitle={toggleEquipTitle}
                  personalStats={personalStats}
                />
              )}
              {currentView === 'lobby' && lobbyData && (
                <LobbyRoom 
                  lobby={lobbyData} user={user} lobbyId={currentLobbyId} 
                  onLeave={() => { localStorage.removeItem('td_current_lobby'); setCurrentLobbyId(null); setCurrentView('browser'); }} 
                />
              )}
              {currentView === 'game' && lobbyData && (
                <GameRoom 
                  lobby={lobbyData} user={user} lobbyId={currentLobbyId} 
                  onLeave={() => { localStorage.removeItem('td_current_lobby'); setCurrentLobbyId(null); setCurrentView('browser'); }}
                  updateAchievement={updateAchievement}
                  setAchievementProgress={setAchievementProgress}
                  updatePersonalStats={updatePersonalStats}
                />
              )}
            </div>
          );
        };

        // --- SCREENS ---

        const AuthScreen = ({ nickname, setNickname, onEnter }) => (
          <div className="flex flex-col items-center justify-center min-h-screen bg-[url('https://i.pinimg.com/originals/2b/96/96/2b969635546059637841555541578508.jpg')] bg-cover bg-center">
            <div className="bg-slate-900/90 p-8 rounded-2xl shadow-2xl backdrop-blur-sm max-w-md w-full text-center border-2 border-yellow-500">
              <h1 className="text-5xl font-black text-yellow-400 mb-2 drop-shadow-lg" style={{ WebkitTextStroke: '2px black' }}>TOTAL DRAMA</h1>
              <h2 className="text-2xl font-bold text-white mb-6 uppercase tracking-widest">Online Survivor</h2>
              <input
                type="text"
                placeholder="Il tuo Nickname"
                className="w-full bg-slate-800 border-2 border-slate-600 rounded-xl p-4 text-white text-center text-xl font-bold mb-4 focus:border-yellow-500 outline-none"
                value={nickname}
                onChange={e => setNickname(e.target.value)}
                maxLength={15}
              />
              <button
                onClick={onEnter}
                disabled={nickname.length < 2}
                className="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl text-xl uppercase transition shadow-lg disabled:opacity-50 transform hover:scale-105"
              >
                Entra nel Reality
              </button>
            </div>
          </div>
        );

        // --- CALCOLO LIVELLO ---
        const getLevelInfo = (exp) => {
            const totalExp = exp || 0;
            const level = Math.floor(Math.sqrt(totalExp / 100)) + 1;
            const currentLevelBaseExp = Math.pow(level - 1, 2) * 100;
            const nextLevelBaseExp = Math.pow(level, 2) * 100;
            const expIntoLevel = totalExp - currentLevelBaseExp;
            const expNeeded = nextLevelBaseExp - currentLevelBaseExp;
            const progressPercent = (expIntoLevel / expNeeded) * 100;
            return { level, progressPercent, expIntoLevel, expNeeded, nextLevelBaseExp };
        };

        const BrowserScreen = ({ user, nickname, lobbies, onCreate, onJoin, errorMsg, topCharacters, achievements, equippedCosmetic, toggleEquipCosmetic, equippedTitle, toggleEquipTitle, personalStats }) => {
          const [showConfig, setShowConfig] = useState(false);
          const [showAchievementsModal, setShowAchievementsModal] = useState(false);
          const [showTitlesModal, setShowTitlesModal] = useState(false);
          const [showStatsModal, setShowStatsModal] = useState(false);
          const [showLevelCosmeticsModal, setShowLevelCosmeticsModal] = useState(false);
          const [titlesSearchQuery, setTitlesSearchQuery] = useState("");
          const [config, setConfig] = useState({ 
              maxPlayers: 22, 
              numTeams: 2, 
              numSeasons: 1, 
              mergeSize: 11,
              jurySize: 7, 
              theme: 'Tutti',
              difficulty: 'Normale',
              finaleType: 'Casuale',
              redemption: { enabled: false, count: 1, episodes: "" },
              advantages: { idol: 1, extraVote: 1, advantage: 1, voteSteal: 1, spyDrone: 1, mutiny: 1, safety: 1, immunitySteal: 1, legacy: 1, crystalBall: 1 }
          });
          const [joinCode, setJoinCode] = useState('');

          // Calcolo del personaggio preferito
          const favChar = useMemo(() => {
              if (!personalStats.personaggiGiocati) return { name: "Nessuno", count: 0 };
              const entries = Object.entries(personalStats.personaggiGiocati);
              if (entries.length === 0) return { name: "Nessuno", count: 0 };
              entries.sort((a, b) => b[1] - a[1]); // Ordina in modo decrescente
              return { name: entries[0][0], count: entries[0][1] };
          }, [personalStats.personaggiGiocati]);

          return (
            <div className="max-w-7xl mx-auto p-4 py-8 flex flex-col lg:flex-row gap-8 items-start">
              <div className="flex-1 w-full">
                  {!showConfig ? (
                    <>
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 bg-slate-800 p-6 rounded-2xl border border-slate-700 gap-4">
                        <div>
                          <h2 className="text-3xl font-black text-yellow-400">LOBBY BROWSER</h2>
                          <div className="flex flex-col sm:flex-row sm:items-center gap-3 mt-2">
                              <p className="text-slate-400">Giocatore: <span className="text-white font-bold">{nickname}</span></p>
                              
                              {/* BARRA EXP */}
                              <div className="flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-xl border border-slate-700 shadow-inner">
                                  <div 
                                      onClick={() => setShowLevelCosmeticsModal(true)}
                                      className="bg-gradient-to-r from-purple-500 to-indigo-500 text-white text-[10px] font-black px-2 py-0.5 rounded shadow-[0_0_10px_rgba(168,85,247,0.5)] border border-purple-400/50 cursor-pointer hover:scale-110 transition-transform"
                                      title="Clicca per vedere i Cosmetici di Livello!"
                                  >
                                      LV {getLevelInfo(personalStats.exp).level}
                                  </div>
                                  <div className="w-32 sm:w-40 bg-slate-800 rounded-full h-2.5 overflow-hidden shadow-inner border border-slate-950">
                                      <div

                               <ul className="list-disc pl-4 mt-2 space-y-2">

                                   <li><strong className="text-green-400">Riconnessione Automatica:</strong> Se ricarichi la pagina per sbaglio o cade la connessione, il gioco si ricorderà di te e ti riporterà automaticamente all'interno della tua partita in corso (saltando il login)!</li>
                                   <li><strong className="text-orange-400">Sfida a Coppie 2.0:</strong> La coppia peggiore andrà a rischio eliminazione, ma il componente col punteggio più alto della coppia vincente dovrà nominare un <strong className="text-white">bersaglio extra</strong>! Aggiunti anche i bordi di colore dinamici ai mini-team.</li>
                                   <li><strong className="text-red-400">Sicurezza (Guardrails):</strong> Prevenuti potenziali bug di softlock a fine gioco! I twist "Sfida a Coppie" e "Doppia Eliminazione" verranno saltati se si raggiungono rispettivamente la Top 4 o la Top 3.</li>

                                  setConfig({...config, theme: val, numTeams: 4});

                            {n}

                                    episodes: parsedEpisodes

                                              {index + 1}
                                          </div>
                                          
                                          <div className={`w-10 h-10 rounded-full overflow-hidden flex-shrink-0 border-2 ${index === 0 ? 'border-yellow-400 shadow-[0_0_10px_rgba(250,204,21,0.5)]' : 'border-slate-600'}`}>

        const LobbyRoom = ({ lobby, user, lobbyId, onLeave }) => {
          const isHost = lobby.hostId === user.uid;

          // STATI PER LA MODALITÀ CUSTOM E SKIN
          const [skinModalChar, setSkinModalChar] = useState(null);
          const [showCustomModal, setShowCustomModal] = useState(false);
          const [customTeams, setCustomTeams] = useState([]);
          const [selectedCustomTeam, setSelectedCustomTeam] = useState("");
          const [customAssignments, setCustomAssignments] = useState({});

          const selectCharacter = async (char, selectedSkin = null) => {
            if (lobby.players.some(p => p.character?.name === char.name)) return;
            
            let finalChar = { ...char };
            if (selectedSkin) {
                finalChar.img = selectedSkin.img;
                finalChar.skinName = selectedSkin.name;
                if (["Rubino", "Zaffiro", "Shinichi", "Girly", "Wendy", "Larry", "Lila", "Cerise"].includes(selectedSkin.name)) {
                    finalChar.name = selectedSkin.name;
                }
            }

            const updatedPlayers = lobby.players.map(p => p.uid === user.uid ? { ...p, character: finalChar } : p);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), { players: updatedPlayers });
            setSkinModalChar(null);
          };

          const handleCharacterClick = (char) => {
              if (char.skins && char.skins.length > 0) {
                  setSkinModalChar(char);
              } else {
                  selectCharacter(char);
              }
          };

          const startSeason = async () => {
            let currentPlayers = [...lobby.players];
            const usedNames = new Set(currentPlayers.map(p => p.character?.name).filter(Boolean));
            
            // FUNZIONE FILTRO TEMA STAGIONE
            const themeFilter = (r) => {
                if (lobby.config.theme === 'Villain Edition') return r.alignment === 'villain';
                if (lobby.config.theme === 'Girly pop') return FEMALES.includes(r.name);
                if (lobby.config.theme === 'Brains vs Beauties vs Brawns') return BRAINS.includes(r.name) || BEAUTIES.includes(r.name) || BRAWNS.includes(r.name);
                if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') return HEROES.includes(r.name) || VILLAINS_LIST.includes(r.name) || NEUTRALS.includes(r.name);
                return true; 
            };

            currentPlayers = currentPlayers.map(p => {
              if (!p.character) {
                const available = ROSTER.filter(r => !usedNames.has(r.name) && themeFilter(r));
                // FALLBACK DI SICUREZZA: se la lista filtrata è vuota, pesca da tutti
                let random = available.length > 0 
                    ? available[Math.floor(Math.random() * available.length)]
                    : ROSTER[Math.floor(Math.random() * ROSTER.length)];
                
                usedNames.add(random.name);
                
                let finalBotChar = { ...randomChar };
                // Assegna una skin casuale anche ai bot se disponibili!
                if (finalBotChar.skins && finalBotChar.skins.length > 0) {
                    const randomSkin = finalBotChar.skins[Math.floor(Math.random() * finalBotChar.skins.length)];
                    finalBotChar.img = randomSkin.img;
                    finalBotChar.skinName = randomSkin.name;
                    if (["Rubino", "Zaffiro", "Shinichi", "Girly", "Wendy", "Larry", "Lila", "Cerise"].includes(randomSkin.name)) {
                        finalBotChar.name = randomSkin.name;
                    }
                }
                
                return { ...p, character: finalBotChar };
              }
              return p;
            });

            while (currentPlayers.length < lobby.config.maxPlayers) {
              let randomChar;
              let botName;

              if (lobby.config.theme === 'Brains vs Beauties vs Brawns' || lobby.config.theme === 'Eroi vs Villains vs Neutrali') {
                  const isTheme1 = lobby.config.theme === 'Brains vs Beauties vs Brawns';
                  
                  // Conta quanti membri ci sono attualmente per ogni fazione
                  let count1 = 0, count2 = 0, count3 = 0;
                  currentPlayers.forEach(p => {
                      const cName = p.character?.name;
                      if (isTheme1) {
                          if (BRAINS.includes(cName)) count1++;
                          else if (BEAUTIES.includes(cName)) count2++;
                          else if (BRAWNS.includes(cName)) count3++;
                      } else {
                          if (HEROES.includes(cName)) count1++;
                          else if (VILLAINS_LIST.includes(cName)) count2++;
                          else if (NEUTRALS.includes(cName)) count3++;
                      }
                  });

                  // Trova la fazione con meno membri
                  const counts = isTheme1 ? [
                      { cat: 'Brains', count: count1, arr: BRAINS },
                      { cat: 'Beauties', count: count2, arr: BEAUTIES },
                      { cat: 'Brawns', count: count3, arr: BRAWNS }
                  ] : [
                      { cat: 'Eroi', count: count1, arr: HEROES },
                      { cat: 'Villains', count: count2, arr: VILLAINS_LIST },
                      { cat: 'Neutrali', count: count3, arr: NEUTRALS }
                  ];
                  counts.sort((a, b) => a.count - b.count);

                  // Cerca un personaggio disponibile nella fazione più svantaggiata
                  let availableInCat = [];
                  for (let i = 0; i < counts.length; i++) {
                      availableInCat = ROSTER.filter(r => !usedNames.has(r.name) && counts[i].arr.includes(r.name));
                      if (availableInCat.length > 0) break;
                  }

                  if (availableInCat.length > 0) {
                      randomChar = availableInCat[Math.floor(Math.random() * availableInCat.length)];
                      botName = randomChar.name;
                      usedNames.add(botName);
                  } else {
                      // Fallback se una fazione è completamente esaurita
                      const available = ROSTER.filter(r => !usedNames.has(r.name) && themeFilter(r));
                      if (available.length > 0) {
                          randomChar = available[Math.floor(Math.random() * available.length)];
                          botName = randomChar.name;
                          usedNames.add(botName);
                      } else {
                          randomChar = ROSTER[Math.floor(Math.random() * ROSTER.length)];
                          botName = `${randomChar.name} ${Math.floor(Math.random() * 999)}`;
                      }
                  }
              } else {
                  // LOGICA NORMALE (Tutti o Villain Edition)
                  const available = ROSTER.filter(r => !usedNames.has(r.name) && themeFilter(r));
                  if (available.length > 0) {
                      randomChar = available[Math.floor(Math.random() * available.length)];
                      botName = randomChar.name;
                      usedNames.add(botName);
                  } else {
                      // FALLBACK DI SICUREZZA: cloni casuali se finiscono i personaggi
                      randomChar = ROSTER[Math.floor(Math.random() * ROSTER.length)];
                      botName = `${randomChar.name} ${Math.floor(Math.random() * 999)}`;
                  }
              }
              
              let finalBotChar = { ...randomChar };
              if (finalBotChar.skins && finalBotChar.skins.length > 0) {
                  const randomSkin = finalBotChar.skins[Math.floor(Math.random() * finalBotChar.skins.length)];
                  finalBotChar.img = randomSkin.img;
                  finalBotChar.skinName = randomSkin.name;
                  if (["Rubino", "Zaffiro", "Shinichi", "Girly", "Wendy", "Larry", "Lila", "Cerise"].includes(randomSkin.name)) {
                      finalBotChar.name = randomSkin.name;
                      if (botName === randomChar.name) {
                          botName = randomSkin.name;
                      } else {
                          botName = botName.replace(randomChar.name, randomSkin.name);
                      }
                  }
              }

              const botId = `bot_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
              currentPlayers.push({
                uid: botId,
                name: botName,
                character: finalBotChar,
                isBot: true,
                status: 'active',
                team: null,
                relationships: {},
                alliances: [],
                diceRoll: null,
                immunityWins: 0,
                totalVotesReceived: 0,
                nextRollNerf: false,
                equippedCosmetic: null,
                equippedTitle: null,
                level: Math.floor(Math.random() * 50) + 1
              });
            }

            const numTeams = lobby.config.numTeams;
            const currentTeamNames = lobby.config.theme === 'Villain Edition' ? VILLAIN_TEAM_NAMES : lobby.config.theme === 'Girly pop' ? ["Girly pop", "Amazzoni", "Yuri", "Dive"] : DEFAULT_TEAM_NAMES;

            if (lobby.config.theme === 'Brains vs Beauties vs Brawns') {
                currentPlayers = currentPlayers.map(p => {
                    let team = "Brains";
                    if (BEAUTIES.includes(p.character?.name)) team = "Beauties";
                    else if (BRAWNS.includes(p.character?.name)) team = "Brawns";
                    else if (BRAINS.includes(p.character?.name)) team = "Brains";
                    else {
                        const hash = p.character?.name ? p.character.name.length : 0;
                        if (hash % 3 === 0) team = "Brains";
                        else if (hash % 3 === 1) team = "Beauties";
                        else team = "Brawns";
                    }
                    return { ...p, team };
                });
            } else if (lobby.config.theme === 'Eroi vs Villains vs Neutrali') {
                currentPlayers = currentPlayers.map(p => {
                    let team = "Eroi";
                    if (VILLAINS_LIST.includes(p.character?.name) || p.character?.alignment === 'villain') team = "Villains";
                    else if (NEUTRALS.includes(p.character?.name)) team = "Neutrali";
                    else if (HEROES.includes(p.character?.name)) team = "Eroi";
                    else {
                        const hash = p.character?.name ? p.character.name.length : 0;
                        if (hash % 3 === 0) team = "Eroi";
                        else if (hash % 3 === 1) team = "Villains";
                        else team = "Neutrali";
                    }
                    return { ...p, team };
                });
            } else if (lobby.config.theme === 'La Notte del Giudizio' || lobby.config.theme === 'Popolarità') {
                currentPlayers = currentPlayers.map(p => ({ ...p, team: "MERGE" }));
            } else {
                for (let i = currentPlayers.length - 1; i > 0; i--) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [currentPlayers[i], currentPlayers[j]] = [currentPlayers[j], currentPlayers[i]];
                }
                currentPlayers = currentPlayers.map((p, idx) => ({
                  ...p,
                  team: currentTeamNames[idx % numTeams]
                }));
            }

            // --- SISTEMA INVENTARIO MULTIPLO ---
            const advantageConfig = lobby.config.advantages || { idol: 1, extraVote: 1, advantage: 1, voteSteal: 1, spyDrone: 1, mutiny: 1, safety: 1, immunitySteal: 1, legacy: 1 };
            
            let itemPool = [];
            Object.entries(advantageConfig).forEach(([key, count]) => {
                for(let i=0; i<count; i++) itemPool.push(key);
            });
            
            itemPool.sort(() => Math.random() - 0.5);
            
            const totalCrates = currentPlayers.length;
            let availableIndices = Array.from({length: totalCrates}, (_, i) => i).sort(() => Math.random() - 0.5);
            
            let itemDistribution = {};
            for (let i=0; i<itemPool.length && availableIndices.length > 0; i++) {
                itemDistribution[availableIndices.pop()] = itemPool[i];
            }

            const initialCrates = Array.from({length: totalCrates}, (_, i) => ({ id: i, owner: null }));

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
              players: currentPlayers,
              status: 'playing',
              phase: 'idol_hunt', 
              idolData: {
                  active: true,
                  itemDistribution,
                  inventory: { idols: {}, extraVotes: {}, advantages: {}, voteSteals: {}, spyDrones: {}, mutinies: {}, safeties: {}, immunitySteals: {}, legacies: {}, crystalBalls: {} },
                  activeEffects: { legacyDesignations: {} },
                  crates: initialCrates,
                  stage: 'selection'
              },
              round: 0,
              logs: arrayUnion(`--- CACCIA AI VANTAGGI (Inizia la ricerca delle casse!) ---`)
            });
          };

          // --- LOGICA MODALITÀ CUSTOM ---
          const initCustomSetup = () => {
              const initialTeams = ALL_AVAILABLE_TEAMS.slice(0, lobby.config.numTeams);
              setCustomTeams(initialTeams);
              setSelectedCustomTeam(initialTeams[0]);
              
              const initialAssignments = {};
              // Assegna tutti gli umani attuali al primo team per evitare che restino fuori
              lobby.players.forEach(p => {
                  initialAssignments[p.uid] = initialTeams[0];
              });
              setCustomAssignments(initialAssignments);
              setShowCustomModal(true);
          };

          const handleCustomTeamNameChange = (index, newName) => {
              if (customTeams.includes(newName)) return; // Evita nomi duplicati
              const oldName = customTeams[index];
              const newTeams = [...customTeams];
              newTeams[index] = newName;
              setCustomTeams(newTeams);
              
              if (selectedCustomTeam === oldName) setSelectedCustomTeam(newName);
              
              const newAssignments = {...customAssignments};
              Object.keys(newAssignments).forEach(k => {
                  if (newAssignments[k] === oldName) newAssignments[k] = newName;
              });
              setCustomAssignments(newAssignments);
          };

          const togglePlayerAssignment = (id) => {
              const newAssignments = {...customAssignments};
              const isHuman = lobby.players.some(p => p.uid === id);

              if (newAssignments[id] === selectedCustomTeam) {
                  // Se è già nel team attualmente selezionato
                  if (!isHuman) {
                      // I bot possono essere rimossi dal gioco cliccandoli
                      delete newAssignments[id];
                  }
              } else {
                  // Se non è assegnato, o se è in un ALTRO team, spostalo in quello selezionato
                  if (!newAssignments[id]) {
                      // Se è un nuovo bot, controlla che ci sia spazio
                      const totalAssigned = Object.keys(newAssignments).length;
                      if (totalAssigned >= lobby.config.maxPlayers) {
                          return; // Limite massimo raggiunto
                      }
                  }
                  // Sposta (o aggiungi) l'umano o il bot nel nuovo team selezionato
                  newAssignments[id] = selectedCustomTeam;
              }
              
              setCustomAssignments(newAssignments);
          };

          const startCustomSeason = async () => {
              const totalAssigned = Object.keys(customAssignments).length;
              if (totalAssigned !== lobby.config.maxPlayers) return;

              let finalPlayers = [];
              const usedNames = new Set();

              // 1. Inserisci Giocatori Umani
              lobby.players.forEach(p => {
                  let charObj = p.character;
                  // Assegna un personaggio casuale se l'umano non l'ha scelto
              if (!charObj) {
                  const available = ROSTER.filter(r => !usedNames.has(r.name) && !Object.keys(customAssignments).includes(r.name));
                  charObj = available[Math.floor(Math.random() * available.length)];
                  
                  let finalCharObj = { ...charObj };
                  if (finalCharObj.skins && finalCharObj.skins.length > 0) {
                      const randomSkin = finalCharObj.skins[Math.floor(Math.random() * finalCharObj.skins.length)];
                      finalCharObj.img = randomSkin.img;
                      finalCharObj.skinName = randomSkin.name;
                      if (["Rubino", "Zaffiro", "Shinichi", "Girly", "Wendy", "Larry", "Lila", "Cerise"].includes(randomSkin.name)) {
                          finalCharObj.name = randomSkin.name;
                      }
                  }
                  charObj = finalCharObj;
              }
              usedNames.add(charObj.name);
                  finalPlayers.push({
                      ...p,
                      character: charObj,
                      team: customAssignments[p.uid]
                  });
              });

              // 2. Inserisci i Bot scelti manualmente
              Object.entries(customAssignments).forEach(([id, teamName]) => {
                  if (!lobby.players.find(p => p.uid === id)) {
                      const charData = ROSTER.find(r => r.name === id);
                      let finalBotChar = { ...charData };
                      let botName = finalBotChar.name;
                      
                      if (finalBotChar.skins && finalBotChar.skins.length > 0) {
                          const randomSkin = finalBotChar.skins[Math.floor(Math.random() * finalBotChar.skins.length)];
                          finalBotChar.img = randomSkin.img;
                          finalBotChar.skinName = randomSkin.name;
                          if (["Rubino", "Zaffiro", "Shinichi", "Girly", "Wendy", "Larry", "Lila", "Cerise"].includes(randomSkin.name)) {
                              finalBotChar.name = randomSkin.name;
                              botName = randomSkin.name;
                          }
                      }
                      
                      const botId = `bot_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
                      finalPlayers.push({
                          uid: botId,
                          name: botName,
                          character: finalBotChar,
                          isBot: true,
                          status: 'active',
                          team: teamName,
                          relationships: {},
                          alliances: [],
                          diceRoll: null,
                          immunityWins: 0,
                          totalVotesReceived: 0,
                          nextRollNerf: false,
                          equippedCosmetic: null,
                          equippedTitle: null,
                          level: Math.floor(Math.random() * 50) + 1
                      });
                  }
              });

              finalPlayers.sort(() => Math.random() - 0.5); // Mescola per non far capire subito chi è umano e chi no

              // 3. Distribuzione Vantaggi (identica a startSeason)
              const advantageConfig = lobby.config.advantages || { idol: 1, extraVote: 1, advantage: 1, voteSteal: 1, spyDrone: 1, mutiny: 1, safety: 1, immunitySteal: 1, legacy: 1 };
              let itemPool = [];
              Object.entries(advantageConfig).forEach(([key, count]) => {
                  for(let i=0; i<count; i++) itemPool.push(key);
              });
              itemPool.sort(() => Math.random() - 0.5);
              const totalCrates = finalPlayers.length;
              let availableIndices = Array.from({length: totalCrates}, (_, i) => i).sort(() => Math.random() - 0.5);
              let itemDistribution = {};
              for (let i=0; i<itemPool.length && availableIndices.length > 0; i++) {
                  itemDistribution[availableIndices.pop()] = itemPool[i];
              }
              const initialCrates = Array.from({length: totalCrates}, (_, i) => ({ id: i, owner: null }));

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', lobbyId), {
                  players: finalPlayers,
                  status: 'playing',
                  phase: 'idol_hunt', 
                  idolData: {
                      active: true,
                      itemDistribution,
                      inventory: { idols: {}, extraVotes: {}, advantages: {}, voteSteals: {}, spyDrones: {}, mutinies: {}, safeties: {}, immunitySteals: {}, legacies: {}, crystalBalls: {} },
                      activeEffects: { legacyDesignations: {} },
                      crates: initialCrates,
                      stage: 'selection'
                  },
                  round: 0,
                  logs: arrayUnion(`--- CACCIA AI VANTAGGI (Inizia la ricerca delle casse!) ---`)
              });
          };

          return (
            <div className="flex flex-col h-screen overflow-hidden">
              <header className="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center z-10 flex-shrink-0">
                <div>
                  <h2 className="text-xl font-bold text-white">Lobby: {lobby.hostName}</h2>
                  <p className="text-slate-400 text-sm">Codice: {lobby.code} | Max: {lobby.config.maxPlayers} | Teams: {lobby.config.numTeams}</p>
                </div>
                <button onClick={onLeave} className="text-red-400 font-bold text-sm">Esci</button>
              </header>

              <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                <div className="w-full md:w-64 bg-slate-900 p-4 overflow-y-auto border-r border-slate-800 flex-shrink-0">
                  <h3 className="font-bold text-slate-300 mb-2 uppercase text-xs">Giocatori ({lobby.players.length}/{lobby.config.maxPlayers})</h3>
                  <div className="space-y-2">
                    {lobby.players.map(p => (
                      <div key={p.uid} className="bg-slate-800 p-2 rounded flex items-center gap-2">
                        <div className={`w-8 h-8 rounded-full bg-slate-700 overflow-hidden flex-shrink-0 ${getCosmeticClasses(p.equippedCosmetic)}`}>
                           {p.character ? <img src={p.character.img} className="w-full h-full object-cover" /> : <div className="animate-pulse bg-slate-600 w-full h-full"/>}
                        </div>
                        <div className="flex flex-col overflow-hidden w-full">
                            <div className="truncate text-sm font-bold leading-tight flex items-center justify-between">
                                <span>{p.name}</span>
                                {p.level && <span className="text-[9px] text-purple-400 bg-purple-900/50 px-1.5 py-0.5 rounded ml-1 whitespace-nowrap">LV {p.level}</span>}
                            </div>
                            {(() => {
                                const titleData = p.equippedTitle ? CHARACTER_TITLES[p.equippedTitle] : null;
                                if (!p.isBot && titleData) {
                                    return (
                                        <div className={`truncate leading-tight ${titleData.style} !text-sm drop-shadow-none`}>
                                            {titleData.name}
                                        </div>
                                    )
                                }
                                return null;
                            })()}
                        </div>
                      </div>
                    ))}
                  </div>
                  {isHost && (
                    lobby.config.theme === 'Custom' ? (
